version: 1
canonical_owner: ".agents/skills/story/4-Validation/_shared/validation-dimension-registry.yaml"
purpose: "validation 维度、drafting 即时审计 hook、终验 mandatory 规则的单一真源"
policies:
  drafting_inline:
    step_failure_order:
      - "优先在当前 step 本地修复后重跑当前 hook"
      - "若 issue 指向更早 step，则回退到最早受影响 step 并从该 step onward 重跑"
      - "若 issue 指向 source_layer_owner=0-Init|1-Cards|2-Planning，则立即停止 drafting，转 source-contract 修复"
    candidate_final_gate: "8-润色完成且该 step 对应 inline hooks 全部通过"
  final_acceptance:
    final_pass_gate: "仅当 4-Validation 聚合 JSON 判定 PASS 时，当前章才算 validated final draft"
dimensions:
  - role_id: "structure-validator"
    dimension: "structure"
    skill_path: ".agents/skills/story/4-Validation/结构兑现"
    report_filename: "结构兑现.md"
    final_acceptance:
      mandatory: true
      weight: 0.20
    drafting_inline:
      enabled: true
      checkpoints:
        - step_id: "1-单章叙事起盘"
          fail_action: "block_and_rewrite_current_or_earliest"
        - step_id: "7-追读力强化"
          fail_action: "rewind_to_earliest_rework_step"
        - step_id: "8-润色"
          fail_action: "regression_guard"
    default_rework_targets:
      - "1-单章叙事起盘"
      - "7-追读力强化"
    upstream_source_owners:
      - "2-Planning"
  - role_id: "continuity-validator"
    dimension: "continuity"
    skill_path: ".agents/skills/story/4-Validation/连续性"
    report_filename: "连续性.md"
    final_acceptance:
      mandatory: true
      weight: 0.20
    drafting_inline:
      enabled: true
      checkpoints:
        - step_id: "1-单章叙事起盘"
          fail_action: "block_and_rewrite_current_or_earliest"
        - step_id: "2-节奏优化"
          fail_action: "block_and_rewrite_current_or_earliest"
        - step_id: "8-润色"
          fail_action: "regression_guard"
    default_rework_targets:
      - "1-单章叙事起盘"
      - "2-节奏优化"
    upstream_source_owners: []
  - role_id: "logic-validator"
    dimension: "logic"
    skill_path: ".agents/skills/story/4-Validation/逻辑自洽校验"
    report_filename: "逻辑自洽校验.md"
    final_acceptance:
      mandatory: true
      weight: 0.20
    drafting_inline:
      enabled: true
      checkpoints:
        - step_id: "1-单章叙事起盘"
          fail_action: "block_and_rewrite_current_or_route_source_fix"
        - step_id: "4-角色形象刻画"
          fail_action: "rewind_to_earliest_rework_step"
        - step_id: "8-润色"
          fail_action: "regression_guard"
    default_rework_targets:
      - "1-单章叙事起盘"
    upstream_source_owners:
      - "1-Cards"
      - "2-Planning"
  - role_id: "character-validator"
    dimension: "character"
    skill_path: ".agents/skills/story/4-Validation/人物一致性"
    report_filename: "人物一致性.md"
    final_acceptance:
      mandatory: true
      weight: 0.20
    drafting_inline:
      enabled: true
      checkpoints:
        - step_id: "4-角色形象刻画"
          fail_action: "block_and_rewrite_current_or_earliest"
        - step_id: "5-对白优化"
          fail_action: "block_and_rewrite_current_or_earliest"
        - step_id: "6-心理活动描写"
          fail_action: "block_and_rewrite_current_or_earliest"
        - step_id: "8-润色"
          fail_action: "regression_guard"
    default_rework_targets:
      - "4-角色形象刻画"
      - "5-对白优化"
      - "6-心理活动描写"
    upstream_source_owners:
      - "1-Cards"
  - role_id: "timeline-validator"
    dimension: "timeline"
    skill_path: ".agents/skills/story/4-Validation/时间线"
    report_filename: "时间线.md"
    final_acceptance:
      mandatory: true
      weight: 0.20
    drafting_inline:
      enabled: true
      checkpoints:
        - step_id: "1-单章叙事起盘"
          fail_action: "block_and_rewrite_current_or_earliest"
        - step_id: "2-节奏优化"
          fail_action: "block_and_rewrite_current_or_earliest"
        - step_id: "8-润色"
          fail_action: "regression_guard"
    default_rework_targets:
      - "1-单章叙事起盘"
      - "2-节奏优化"
    upstream_source_owners:
      - "2-Planning"
  - role_id: "task-convergence-validator"
    dimension: "task_convergence"
    skill_path: ".agents/skills/story/4-Validation/任务汇聚"
    report_filename: "任务汇聚.md"
    final_acceptance:
      mandatory: true
      weight: 0.20
    drafting_inline:
      enabled: false
      checkpoints: []
    default_rework_targets:
      - "source-contract-fix"
      - "1-单章叙事起盘"
      - "7-追读力强化"
    upstream_source_owners:
      - "2-Planning"
fast_extension_rule:
  add_or_adjust_dimension:
    - "先更新本 registry：role_id、skill_path、drafting_inline checkpoints、final_acceptance mandatory/weight"
    - "再新增或修改对应子技能包 `SKILL.md + CONTEXT.md`"
    - "若结构化字段变化，最后同步 `checker-output-schema.md`"
  no_silent_duplication:
    - "drafting step hooks 不允许在 7 个 child skill 中各自静默复制一份维度列表"
    - "4-Validation 父层与 3-Drafting 父层都必须回指本 registry，而不是各自维护第二张路由表"
