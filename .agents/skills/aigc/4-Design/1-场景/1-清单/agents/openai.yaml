interface:
  display_name: "AIGC 4-Design 场景清单"
  short_description: "把 3-Detail episode JSON 收束为可供场景设计继续消费的场景清单与镜头映射"
  default_prompt: "Use $aigc-design-scene-list to read `projects/<项目名>/3-Detail/第N集.json`, extract `scene_name + scene_variant + group_scene_map`, and write the episode scene catalog to `projects/<项目名>/4-Design/1-场景/1-清单/第N集/第N集.json`."
