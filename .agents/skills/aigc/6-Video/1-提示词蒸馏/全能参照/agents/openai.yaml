interface:
  display_name: "AIGC 全能参照"
  short_description: "按知行合一节点网把分镜组蒸馏为视频请求 JSON、TXT 与 manifest。"
  default_prompt: "Use $aigc-video-seedance2 to read `projects/aigc/<项目名>/3-Detail/第N集.json` only when `metadata.document_phase=ready`, and refuse to continue if any target group still has `分镜切换 != len(分镜明细[])`. Treat each 分镜组 as one group-level request packet, preserve `剧本正文` and `全局风格` verbatim, and follow `.agents/skills/aigc/6-Video/_shared/image-to-video-prompt-principles.md` plus `prompt-assembly-spec.md` as the canonical sentence sources. Keep the overall style closer to image-to-video best practice: subject/clothing anchors first, then camera kickoff, visible action and spatial relation, then atmosphere/light and visual focus, while still using only the current upstream fields. Keep each shot anchored with the current group-local `xx秒-xx秒`, never write `分镜ID 的 xx秒-xx秒`, preserve natural flow without field titles, and write `第N集.json`, `第N集.txt`, and `_manifest.json` without inventing reference images or upstream facts."
