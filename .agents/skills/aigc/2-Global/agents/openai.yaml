interface:
  display_name: "AIGC 2-Global"
  short_description: "像 `3-Detail` 一样围绕 `.agents/skills/aigc/2-Global/_shared/episode_root.json` 直接填好 `2-Global/episode_root.json`，并在需要时只消费前置监制 advisory。"
  default_prompt: "Use $aigc-global to read the current episode grouping plus init presets, treat `.agents/skills/aigc/2-Global/_shared/episode_root.json` as the only fill template, write project-level and group-level fields directly into `projects/aigc/<项目名>/2-Global/episode_root.json`, then write `projects/aigc/<项目名>/2-Global/validation-report.md`. If project-root `team.yaml` enables `roles.supervision`, consume that role only as pre-draft advisory; do not run post-write supervision refine from this stage contract. Compatibility Markdown files, if needed, must only be derived from the confirmed JSON."
