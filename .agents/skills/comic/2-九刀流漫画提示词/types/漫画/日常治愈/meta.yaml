pack_id: 日常治愈
aliases:
  - 日常治愈
  - 日常
  - 治愈
  - 温馨
  - slice of life
semantic_tags:
  - small-gesture
  - seasonal-rhythm
  - gentle-conflict
  - comfort
stage_projection:
  script_adaptation:
    focus:
      - 小事成章
      - 情绪缓释
      - 关系微变
  nine_blade_prompting:
    layout_bias:
      - breathing space
      - object detail
      - weather beat
  image_generation:
    render_bias:
      - soft environment
      - domestic texture
      - gesture clarity
  animation_generation:
    motion_bias:
      - quiet linger
      - natural loop
      - tiny movement
  episode_poster:
    poster_bias:
      - 今天也还不错
      - 回家路上
      - 一起吃饭吧
control_surface:
  conflict_engine:
    premise: 小事、小动作和长期陪伴中的微小变化构成真正推进。
    escalation_loop: 日常重复 -> 细微偏差 -> 情绪被看见 -> 关系缓慢松动。
    payoff: 题材成立依赖“昨天和今天不完全一样”，而不是大事件翻盘。
  role_matrix:
    protagonist: 带着轻微缺口但仍然过日子的人。
    rival_or_counterforce: 孤独、迟缓、家庭习惯、季节变化和现实小难题。
    allies: 家人、邻居、同学、店主、宠物负责让日常产生层次。
    observers_or_pressure: 场所和物件承担记忆与情绪沉淀功能。
  page_turn_mechanism:
    setup_pattern: 先建立稳定日常，再插入一个小偏差。
    turn_trigger: 主动靠近、日常习惯被打破、季节切换、沉默被回应。
    reveal_pattern: 翻页后优先给动作和环境变化，再补一句轻量对白。
    carry_forward_rule: 每次翻页都应让生活更具体一点、关系更松一点。
  panel_grammar:
    dominant_panel_shapes:
      - 生活切片格
      - 物件细节格
      - 并肩行动格
    expansion_nodes:
      - 主动靠近
      - 小情绪被接住
      - 季节变换
    compression_nodes:
      - 吃饭
      - 走路
      - 家务与店务
    negative_space_policy: 留白要和呼吸、安静、重复场景绑定，不能只是空洞风景。
  visual_carrier:
    primary:
      - 物件使用痕迹
      - 身体小动作
      - 天气和光线
    secondary:
      - 饭桌
      - 房间布局
      - 路途景观
    prohibited_shortcuts:
      - 只写空泛治愈金句
      - 只剩风景没有人际变化
  dialogue_register:
    line_length: short
    monologue_density: low
    narration_role: light
    exposition_rule: 以短对白和生活动作承载情绪，不把温柔写成抽象说明。
  motif_system:
    recurring_motifs:
      - 饭桌
      - 归家路
      - 天气
      - 重复的日常物件
    payoff_rule: 母题应在重复中变义，让读者通过微差感知关系推进。
  failure_modes:
    - 只有温柔滤镜，没有生活细节。
    - 没有任何变化，只是漂亮插图。
    - 强行消解人物痛感。
