version: 1
module_id: watermoon-visual-branch
module_level: branch
branch_key: visual
purpose: 面向 AIGC 生成母体，把原本抽象感性的戏剧收益转成更具像、可见、可被模型稳定消费的视觉信息增益，汇成 `视觉强化` canonical 三槽 patch。
child_modules:
  - path: 4-视觉强化/冲击力/module-spec.yaml
  - path: 4-视觉强化/品味/module-spec.yaml
  - path: 4-视觉强化/观赏性/module-spec.yaml
triggers:
  - 分镜组需要增强观看记忆点
  - 当前 prose 有戏剧收益，但视觉信息还不够具像化
must_answer:
  - 第一眼抓手是什么
  - 哪些表达需要被压住
  - 观众读完后记住什么
  - 哪些抽象感性表达必须转成更可生成的可见信息
patch_contract:
  target_slot: 视觉强化
  canonical_field: 分镜明细[].视觉强化
  required_elements:
    - 冲击力
    - 观赏性
    - 品味
  synthesis_inputs:
    - visual_hook
    - contrast_point
    - concrete_detail
    - style_alignment
    - memory_point
    - slow_sentence_cut
    - viewing_flow
  final_field_mapping:
    冲击力:
      prefer:
        - visual_hook
        - contrast_point
      gate: 单一且服务主冲突
    观赏性:
      prefer:
        - memory_point
        - viewing_flow
        - slow_sentence_cut
      gate: 必须说明顺流而非只写“节奏更好”
    品味:
      prefer:
        - concrete_detail
        - style_alignment
      gate: 必须把空泛审美词压成可见、可拍、可构图消费的信息
merge_policy:
  combine_order:
    - 冲击力
    - 品味
    - 观赏性
  synthesize_order:
    - 先锁单一抓手
    - 再替换空词为可见细节
    - 最后补顺流、删拖速句，并把三叶子收束回 `冲击力 / 观赏性 / 品味`
  preserve_first:
    - 明确抓手
    - 风格克制
    - 阅读流动
    - 具像化信息
  trim_first:
    - 抽象感性评价
    - 只对人类读者有效的空泛美感词
quality_gates:
  - 先可见，后漂亮
  - 不得靠形容词堆砌假高级感
  - 视觉强化必须提升 AIGC 下游可消费性，而不只是提升文学修辞感
  - canonical 三槽位必须全部非空
  - `冲击力` 不得并列多头
