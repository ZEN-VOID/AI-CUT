interface:
  display_name: "动画生成"
  short_description: "默认消费已编译的页级动画 prompt JSON，匹配对应漫画页图片，生成 Sora 图生视频执行计划并逐页执行 9:16 页视频"
  default_prompt: "Use $comic-animation to read one page-group level comic_page_animation_prompts.v1 JSON as the canonical animation-prompt truth, match the corresponding page01-page09 comic images, validate the fixed animation prefix and one-panel-one-shot storyboard contract, then run Man-Tui Sora image-to-video at 10 seconds and 720x1280 unless the user explicitly overrides those defaults. If executing, provide public input-reference URLs for each page. Only use the legacy nine_blade_comic_prompts.v1 -> script-compiled video prompt path when the user explicitly requests compatibility mode."
