version: 1
module_id: jinghua-cinematography-stage
module_level: branch
stage_order: serial_after_shot_composition
branch_key: cinematography
purpose: 在已稳定的 shot spine 上先回收上游摄影底座，锁定 `visual_control_line`（主体控制、空间剥离、影调极性、综合色温、质感入口、观看压力），再收束 `cinematography_strategy_note`，随后汇流光影、色彩、质感，最终收束为可执行的组级 `cinematography_patch`。
child_modules:
  - path: 2-摄影美学/光影/module-spec.yaml
  - path: 2-摄影美学/色彩/module-spec.yaml
  - path: 2-摄影美学/质感/module-spec.yaml
triggers:
  - 已形成 `shot_spine_patch`
  - 当前组需要继承 `Init / Global` 或项目级摄影承诺
  - 当前组需要明确画面气候、光影推进和材质指向
must_answer:
  - 这些摄影选择在显化 `水月` 的哪条信息
  - 这组必须继承哪些上游摄影承诺、风格走廊和禁区
  - 当前组的视觉控制线是什么，主体控制、空间剥离、影调极性、综合色温、质感入口和观看压力如何成立
  - 当前组属于高调、低调还是混合影调，最亮处落在哪，暗部哪些可以合并、哪些必须保留
  - 哪些摄影判断必须稳定贯穿后续光位与色彩分支，哪些只是可选加法
  - 这组的照明与影调怎么服务冲突，并在组内形成可追踪推进
  - 色相、明度、饱和度、色温和色彩心理从何而来，当前更依赖固有色还是环境色，哪些只能点到为止
  - 画面表面的材料感应如何被镜头感知，靠哪种显影机制出现，且不压过人物与动作
patch_contract:
  target_slot: cinematography_patch
  required_elements:
    - visual_control_line
    - cinematography_strategy_note
    - lighting_strategy
    - group_lighting_note
    - color_strategy
    - texture_strategy
merge_policy:
  execution_mode: leaf_serial_branch_serial
  branch_prelude:
    - 回看摄影底座
    - 锁 `visual_control_line`
    - 收束 `cinematography_strategy_note`
  combine_order:
    - 光影
    - 色彩
    - 质感
  postprocess:
    - 组级光影流动
    - 摄影总协调
    - 压成单一可执行摄影美学
  preserve_first:
    - tonal legibility
    - highlight-shadow hierarchy
    - shot readability
    - init/global style corridor
    - visual control line
    - tactile visual cues
  trim_first:
    - 空泛审美词
    - 不可执行光色设定
    - 与组级推进脱节的单镜漂亮话
quality_gates:
  - 不得跳过上游摄影底座回看与视觉控制线收束
  - "`visual_control_line` 必须同时回答主体控制、空间剥离、影调极性、综合色温、质感入口与观看压力"
  - "`cinematography_strategy_note` 必须明确哪些判断稳定贯穿后续光位与色彩分支，并交代主亮区、暗部边界、色彩关系和材质显影方式"
  - 先可执行，后审美
  - 摄影信息必须挂在具体 shot 上
  - 光影必须说明最亮处与暗部保留边界，不能只写“有氛围”
  - 色彩必须回挂到光线与空间，不得漂成孤立情绪标签
  - 质感必须说明靠什么被看见，不能只报材料名
  - 必须形成 `group_lighting_note`，不能把每镜写成互不关联的独立布光
  - 最终 `cinematography_patch` 必须压成单一可执行判断，不能退回字段枚举
  - 摄影只能强化 `水月` 已有信息，不得反向发明剧情事实
  - 不得反向改写分镜骨架
