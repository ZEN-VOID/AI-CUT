pack_id: 情感关系剧
aliases:
  - 情感关系剧
  - 狗血
  - 狗血言情
  - 虐恋
  - 豪门拉扯
  - 高情绪
semantic_tags:
  - betrayal
  - misunderstanding
  - relationship-whiplash
  - emotional-escalation
stage_projection:
  script_adaptation:
    focus:
      - 关系先打
      - 情绪反差
      - 站位翻转
  nine_blade_prompting:
    layout_bias:
      - close face
      - doorway confrontation
      - push away / pull close
  image_generation:
    render_bias:
      - face acting
      - distance tension
      - tear readable close-up
  animation_generation:
    motion_bias:
      - hesitation
      - turn away
      - slow emotional push-in
  episode_poster:
    poster_bias:
      - 他终于慌了
      - 她不装了
      - 关系翻脸
control_surface:
  conflict_engine:
    premise: 关系不平等、误会和占有欲不断重排亲密权力。
    escalation_loop: 压制或误伤 -> 忍耐或伪装 -> 翻脸或反击 -> 权力位移。
    payoff: 高潮不在真相本身，而在谁先慌、谁先让位、谁先改写关系秩序。
  role_matrix:
    protagonist: 互相牵制且都能伤到对方的关系核心。
    rival_or_counterforce: 前任、家族、契约、身份差和第三人压力。
    allies: 闺蜜、朋友、孩子、家族代理人负责放大关系后果。
    observers_or_pressure: 公开场合和社交共同体负责把私人情绪变成公开羞耻。
  page_turn_mechanism:
    setup_pattern: 先给压制感或不平等，再埋一处反击的情绪积累。
    turn_trigger: 推开又回抓、当众翻脸、证据落桌、强者失控。
    reveal_pattern: 翻页先看站位和表情变化，再补一句能伤人的短句。
    carry_forward_rule: 翻页后的关系必须变得更不安全，不能回到原位。
  panel_grammar:
    dominant_panel_shapes:
      - 近脸压迫格
      - 门框对峙格
      - 手腕与身体接触格
    expansion_nodes:
      - 翻脸
      - 追悔
      - 公共羞辱
    compression_nodes:
      - 对话来回
      - 心软瞬间
      - 第三者观察
    negative_space_policy: 留白用于拉开关系距离，不用于软化冲突。
  visual_carrier:
    primary:
      - 面部细节
      - 站位高低
      - 手部控制动作
    secondary:
      - 门口/楼梯/走廊
      - 合同/戒指/手机证据
      - 公众目光
    prohibited_shortcuts:
      - 只用哭喊代替关系重排
      - 只用设定强行制造虐感
  dialogue_register:
    line_length: medium
    monologue_density: medium
    narration_role: low
    exposition_rule: 优先让动作和站位伤人，再用短句补刀，不用长段独白解释痛感。
  motif_system:
    recurring_motifs:
      - 扣手腕
      - 推开又回抓
      - 门口堵人
      - 眼泪不落
    payoff_rule: 母题必须随着关系权力翻转而改义，不能只是重复姿势。
  failure_modes:
    - 只有设定，没有真实权力变化。
    - 只会喊虐，不会写动作翻边。
    - 每次冲突都像同一种吵架。
