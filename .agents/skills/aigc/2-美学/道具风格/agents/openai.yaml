name: aigc-prop-style
version: 1
description: AIGC 影片项目道具视觉风格协议制定阶段。
entrypoint: .agents/skills/aigc/2-美学/道具风格/SKILL.md
interface:
  display_name: AIGC 2-美学/道具风格
  short_description: 从剧本、画面基调和参考图/视频提取道具层面的文化语境、形制、表面/材料行为、制造逻辑、工艺、维护痕迹、交互尺度与符号系统，制定约 100 字中文道具风格 prompt
  default_prompt: "使用 $aigc-prop-style，基于 projects/aigc/<项目名>/1-分集/、2-美学/画面基调/全局风格协议.md 或我提供的参考资料，提取道具风格维度、文化/工艺因果链和制作边界；若来源或目标明确为第N集，输出到 projects/aigc/<项目名>/2-美学/第N集/道具风格/道具风格协议.md，否则输出项目级基线 2-美学/道具风格/道具风格协议.md。最终 Prop Style Prompt 默认中文约 100 字，禁止具体道具清单、剧情用途、单件设定和生成请求污染。"
runtime:
  required_context:
    - .agents/skills/aigc/2-美学/道具风格/SKILL.md
    - .agents/skills/aigc/2-美学/道具风格/CONTEXT.md
  default_output_root: projects/aigc/<项目名>/2-美学/
  scope_output_roots:
    episode_scoped: projects/aigc/<项目名>/2-美学/第N集/道具风格/
    series_baseline: projects/aigc/<项目名>/2-美学/道具风格/
  llm_first: true
