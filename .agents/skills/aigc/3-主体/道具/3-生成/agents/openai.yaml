interface:
  display_name: "AIGC 道具 3-生成"
  short_description: "从道具设计文档调用 libTV 生成主图、多视图图和同名 JSON。"
  default_prompt: "使用 $aigc-prop-generation，根据 projects/aigc/<项目名>/3-主体/道具/2-设计 中的道具设计文档生成 主体ID-主体名称-主图 与 主体ID-主体名称-多视图，并同步保存 JSON 提示词；先建立业务画像、generation_scope 和默认 libTV 执行器边界，只消费上游设计文档的 4. 解构，不重新设计主体。主图 JSON 和多视图 JSON 必须由 LLM 逐个道具裁决，模板只能承载结构；多视图真实生成前必须 同画布主图节点 对应主图，使 reference image 进入对话上下文。脚本只能做机械枚举、JSON/路径/stem 检查和 dry-run，不得批量生成、批量插入、正则套句或映射投影 prompt。"
metadata:
  skill_id: "aigc-prop-generation"
  stage: "3-主体/道具/3-生成"
  governance_tier: "full"
