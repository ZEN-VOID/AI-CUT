pack_id: 推理悬疑
aliases:
  - 推理悬疑
  - 推理
  - 悬疑
  - 侦探
  - 线索机关
  - 翻页悬念
semantic_tags:
  - clue-chain
  - withheld-truth
  - reveal-halfway
  - deduction
stage_projection:
  script_adaptation:
    focus:
      - 迹象先行
      - 线索回收
      - 迟到真相
  nine_blade_prompting:
    layout_bias:
      - detail close-up
      - page-end reveal
      - negative space
  image_generation:
    render_bias:
      - clue emphasis
      - suspicious glance
      - shadow pressure
  animation_generation:
    motion_bias:
      - slow push
      - hesitation cut
      - reveal stop
  episode_poster:
    poster_bias:
      - 真相露半张脸
      - 别回头
      - 线索已在画里
control_surface:
  conflict_engine:
    premise: 线索链缓慢点亮，而真相始终晚半步抵达。
    escalation_loop: 异样出现 -> 证据增加 -> 旧理解被推翻 -> 真相只揭一半 -> 新危险压上来。
    payoff: 所有反转必须能回溯前文细节并改变读者对旧画面的理解。
  role_matrix:
    protagonist: 有盲区和代价的观察者或追查者。
    rival_or_counterforce: 隐瞒者、造假者、误导线索和结构性危险。
    allies: 协查者、证人、局外人提供碎片信息。
    observers_or_pressure: 旁观群体、监控、记录物和制度程序负责保留痕迹。
  page_turn_mechanism:
    setup_pattern: 先给物证或异常行为，再故意延迟解释。
    turn_trigger: 页尾未完成动作、半露真相、证据细节、口供破绽。
    reveal_pattern: 翻页后先展示反应和新证据，再给部分逻辑拼接。
    carry_forward_rule: 每次翻页都要让怀疑对象、证据关系或危险方向发生变化。
  panel_grammar:
    dominant_panel_shapes:
      - 细节特写格
      - 页尾悬停格
      - 对视怀疑格
    expansion_nodes:
      - 新证据落点
      - 真相半揭
      - 追查受阻
    compression_nodes:
      - 口供对读
      - 场景复盘
      - 连续怀疑
    negative_space_policy: 留白用于制造未解释信息和观察压力，不用于纯装饰氛围。
  visual_carrier:
    primary:
      - 物证细节
      - 视线方向
      - 空间异常
    secondary:
      - 监控/手机/纸面记录
      - 阴影与门缝
      - 半张脸
    prohibited_shortcuts:
      - 用长对白一次说完推理
      - 用随机怪异掩盖线索缺失
  dialogue_register:
    line_length: short_to_medium
    monologue_density: low
    narration_role: strategic
    exposition_rule: 解释必须晚于证据显影，且只补足当前必要逻辑。
  motif_system:
    recurring_motifs:
      - 门缝
      - 录音/监控
      - 物证局部
      - 重复场景再看
    payoff_rule: 母题要在二次出现时改变含义，形成“旧画面被重新点亮”。
  failure_modes:
    - 真相早于疑问。
    - 只有反转，没有可回溯线索。
    - 悬疑与恐怖混写到彼此失焦。
