    rule: "进入 `.agents/skills/team/导演组/姜文/SKILL.md`；事实型问题先核对 `references/research/` 或联网来源，导演型问题必须输出表达核心、人物模型、幽默/态度、场面方案、演员方案、后期/技术边界与历史/传播风险。"
