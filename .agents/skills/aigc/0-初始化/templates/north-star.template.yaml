全局风格:
  # 指导整个作品全集各部分的总风格合同，是并集式风格底座，不是旧版跨设计交集前缀。
  # 可写入不同场景类型对应的光影、色彩、材质、氛围、摄影、运动和禁区规则；不得写入一次性剧情事实或单个分镜/资产专属细节。
  # 默认中文；全组汇总后的 `全局风格提示词` 通常 300-500 字。
  # `全局风格提示词` 必须显式包含本字段的 `媒介属性` 字段值，且通常以前缀形式出现。
  媒介属性: "" # 例如：2D / 3D / 真人
  时代属性: "" # 例如：古装 / 现代 / 近未来 / 平行当代
  光影逻辑: "" # 例如：室内单侧窗光/烛光硬光，室外正午硬顶光或傍晚金色逆光，动作戏动态追光；均服从动机光与真实物理照明
  画面质感: "" # 例如：4K HDR、影院级调色、真实摄影语法、35mm 原生胶片颗粒、真实皮肤/毛发/布料/金属/皮革质感
  场景化风格策略: [] # 例如：室内/室外/夜景/动作/群像/旷野/仪式等场景类型分别使用何种光影、色彩、空气、材质和镜头策略
  避免出现: [] # 例如：动画描线、赛璐璐、夸张残影、粒子拖尾、非物理辉光等污染词
  全局风格提示词: "" # 300-500 字自然段；必须包含 `媒介属性` 的值，并准确说明不同场景类型匹配的光影、色彩、质感、摄影与禁区

细分风格:
  画面风格: "" # 默认中文；全片统一画面风格摘要，可呼应全局光影/色彩逻辑但不替代上方场景化风格策略。
  服装风格: "" # 默认中文；符合时代、地域、文化的服装基本属性，继承全局材质/磨损/质感规则。
  建筑风格: "" # 默认中文；符合时代、地域、文化的建筑基本属性；古代建筑不得硬套现代建筑大师。
  物品风格: "" # 默认中文；符合时代、地域、文化的物品基本属性，继承全局材质、反射、磨损和真实物理质感规则。

