interface:
  display_name: "AIGC 4-Design 场景清单"
  short_description: "以知行合一单合同方式，把 3-Detail episode JSON 收束为可直接 handoff 的场景清单"
  default_prompt: "Use $aigc-design-scene-list to read `projects/aigc/<项目名>/3-Detail/第N集.json`, validate the director schema shell, extract stable `scene_name / scene_variant / group_scene_map`, and write the canonical episode scene catalog to `projects/aigc/<项目名>/4-Design/场景/1-清单/第N集/第N集.json`."
