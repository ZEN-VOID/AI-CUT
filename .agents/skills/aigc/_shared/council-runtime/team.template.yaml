# team.yaml
#
# 角色：
# - 项目级智能顾问团真源
# - 由 `0-Init` 首次生成，供 `2-Global / 3-Detail / 4-Design / 5-Image / 6-Video` 共同消费
# - 不替代各阶段 canonical，只提供顾问角色、成员、初始化编组来源与运行时调用规则

enabled: true

init_contract:
  init_mode: "smart_advisor"  # 固定为 `smart_advisor`
  team_lineup_mode: "auto"  # `auto` | `custom`
  selector_scope_root: ".agents/skills/team/"
  lineup_source: "0-Init"
  locked_by: "user"
  auto_selection_notes: []
  custom_selection_notes: []
  lineup_gap_todo_paths: []

team_setup:
  team_mode: "auto"  # 兼容位：`disabled` | `auto` | `custom`
  shared_agents: []  # 兼容位：可写各角色成员并集或共享顾问名单
  role_allocation_mode: "overlap_allowed"  # `overlap_allowed` | `split_by_role` | `mixed`
  same_person_cross_role_allowed: true
  required_departments:
    - "导演组"
    - "设计组"
    - "摄影组"
  optional_departments_considered: []
  department_lineup_notes: []
  role_overlap_notes: []
  recommendation_todo_paths: []

roles:
  planning:
    label: "策划"
    enabled: true
    members: []
    init_interview:
      stage: "0-Init"
      kickoff_owner: true
      requires_subagents: true
      execution_mode: "parallel-council"
      interview_focus:
        - "故事核、情绪核与结构种子"
        - "题材边界、受众、平台与制作约束"
        - "优先进入阶段与 planning handoff 关键 unknowns"
    source_skill_refs:
      - ".agents/skills/aigc/0-Init/SKILL.md"
    operates_on:
      - "0-Init"
    intervention_mode: "init_kickoff_owner"
    focus:
      - "题材与故事核收敛"
      - "北极星与阶段入口 seed"
      - "初始化问题压缩与 unknowns 裁剪"

  supervision:
    label: "监制"
    enabled: true
    members: []
    init_interview:
      stage: "0-Init"
      kickoff_owner: false
      requires_subagents: false
      execution_mode: "on_demand"
      interview_focus: []
    source_skill_refs:
      - ".agents/skills/aigc/2-Global/SKILL.md"
      - ".agents/skills/aigc/3-Detail/SKILL.md"
      - ".agents/skills/aigc/4-Design/SKILL.md"
    operates_on:
      - "2-Global"
      - "3-Detail"
      - "4-Design"
    intervention_mode: "pre_draft_advisory"
    focus:
      - "风格/类型/导演意图一致性"
      - "剧情执行、可拍性与资源感"
      - "设计连续性与执行成本对齐"

  review:
    label: "评审"
    enabled: true
    members: []
    init_interview:
      stage: "0-Init"
      kickoff_owner: false
      requires_subagents: false
      execution_mode: "on_demand"
      interview_focus: []
    source_skill_refs:
      - ".agents/skills/aigc/5-Image/SKILL.md"
      - ".agents/skills/aigc/6-Video/SKILL.md"
    intervention_mode: "pre_and_post_validation_gate"
    operates_on_final_stage_of:
      - stage: "5-Image"
        gate_artifact: "projects/aigc/<项目名>/5-Image/validation-report.md"
      - stage: "6-Video"
        gate_artifact: "projects/aigc/<项目名>/6-Video/validation-report.md"

runtime_policy:
  use_subagents_by_default: true
  require_subagents_for_init_interview: true
  init_interview_owner_role: "planning"
  init_interview_subagents_policy: "required"
  ordinary_path_when_disabled_or_empty: true
  fallback_when_subagents_unavailable: "block_and_report_for_init_interview"
  canonical_owner: "main_agent"
  review_timing: "before_and_after_stage_validation_report"

decision_policy:
  decision_owner: ""
  conflict_rule: "user_confirmed > review_gate > planning_interview_consensus > role_consensus > main_agent_inferred"
