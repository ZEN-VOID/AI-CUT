interface:
  display_name: "AIGC 摄影"
  short_description: "基于 7-分镜 和 3-美学画面基调/摄影风格，为逐集分镜内联注入摄影·运镜手法。"
  default_prompt: "使用 $aigc-camera-movement-injection，默认读取 projects/aigc/<项目名>/7-分镜/第N集.md；如用户指定文稿则以指定文稿为 source。必须结合 projects/aigc/<项目名>/3-美学/画面基调/全局风格协议.md 与 3-美学/摄影风格/摄影风格协议.md，先理解题材、情节、剧本正文、画面基调、大师/作品参照和摄影风格，再逐个分镜点内联注入综合运镜手法。普通格式为 分镜N（N-N秒）：原有内容。镜头从具体机位和角度进入，说明景别/镜头类型、运动方式、运动路径、速度曲线、如何沿既有构图轴线或空间层次运动，以及景深与对焦行为。8-摄影只引用 7-分镜 已确定的主体位置、前中后景、方位、遮挡、纵深和构图层次来设计摄影机如何使用空间，不重新发明空间布局；焦点必须指清晰主体、景深层次或对焦/拉焦/转焦/失焦再合焦行为，不得泛指关注点，变焦只指焦距变化。必须区分摄影机运动、焦距变化和透视效果；空间动作必须回指 7-分镜 的 start_frame_spatial_layout。一镜到底时以画面点为单位输出：一镜到底运镜（覆盖分镜A-B，N-N秒）：从分镜A的既有起始状态帧和具体机位/角度进入，连续串联分镜A-B，说明景别/镜头类型、运动方式、如何沿既有构图轴线或空间层次推进、如何使用既有前中后景或遮挡关系、速度曲线与停点、景深策略与对焦/拉焦/转焦接力，以及跨分镜交出点。不得改剧情、对白、场景顺序、分镜编号、分镜秒数或原有分镜内容，不生成图像 prompt、视频 prompt、设备参数或剪辑方案。"
