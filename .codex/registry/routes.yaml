    rule: "进入 `.agents/skills/team/导演组/丹尼斯·维伦纽瓦/SKILL.md`；事实型问题先核对 `references/research/` 或联网来源，导演型问题必须输出一句导演判断、人的尺度、影像方案、声音方案、改编/IP 边界、技术/制作方案与不要做清单。"
  - id: team-director-ang-lee-entry
