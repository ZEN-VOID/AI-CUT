model: gpt-5
metadata:
  short_description: "消费角色 2-设计 产物，直引 prompt 部分生成 CharacterPanel layout JSON，并默认后台批量并发调用 nano-banana/general 生图。"
  default_prompt: "Use $aigc-design-role-panel to consume `projects/aigc/<项目名>/4-Design/角色/2-设计/第N集/`, extract each role's prompt portion directly, write `*-CharacterPanel-layout.json` under `projects/aigc/<项目名>/4-Design/角色/3-面板/第N集/`, and submit `api/anyfast/image/nano-banana/general` in the default background batch concurrent mode unless JSON-only is explicit."
