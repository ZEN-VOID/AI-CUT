pack_id: 历史武侠
aliases:
  - 历史武侠
  - 武侠
  - 江湖
  - 侠义
  - 古风武侠
semantic_tags:
  - jianghu-order
  - martial-honor
  - sect-rules
  - historical-pressure
stage_projection:
  script_adaptation:
    focus:
      - 江湖秩序
      - 门派与恩怨
      - 家国压力
  nine_blade_prompting:
    layout_bias:
      - sword arc
      - stand-off spacing
      - landscape pause
  image_generation:
    render_bias:
      - robe movement
      - weapon silhouette
      - spatial discipline
  animation_generation:
    motion_bias:
      - draw then cut
      - weightless step
      - held stare
  episode_poster:
    poster_bias:
      - 江湖不见
      - 一剑定生死
      - 门规难违
control_surface:
  conflict_engine:
    premise: 私人恩怨始终被门派秩序、江湖规矩和历史压力放大。
    escalation_loop: 情义牵扯 -> 门规施压 -> 出手改变名节 -> 历史或朝局后果逼近。
    payoff: 打斗必须同时改变关系、秩序和身份，不可只做表演。
  role_matrix:
    protagonist: 被门规、恩义、家仇或朝局夹击的侠者。
    rival_or_counterforce: 武力镜像与价值镜像兼具的对手或制度代理。
    allies: 师门、故旧、同道、朝廷人物把私人事拖进更大秩序。
    observers_or_pressure: 江湖舆论、门派礼法、历史局势承担长期施压。
  page_turn_mechanism:
    setup_pattern: 先立礼数、恩怨和空间站位，再引爆出手。
    turn_trigger: 拔剑、揭旧案、门规宣告、身份显露。
    reveal_pattern: 翻页先给招式结果和站位变更，再补江湖后果。
    carry_forward_rule: 每次翻页后都要让名节、立场或秩序更难维持。
  panel_grammar:
    dominant_panel_shapes:
      - 对峙横格
      - 剑势斜格
      - 礼数停顿格
    expansion_nodes:
      - 首次出剑
      - 决斗
      - 江湖旧案揭开
    compression_nodes:
      - 招式往返
      - 同门视线
      - 朝局说明
    negative_space_policy: 留白用于气口和礼法，不用于把冲突拍成空景摆拍。
  visual_carrier:
    primary:
      - 站位距离
      - 兵器弧线
      - 衣袍动势
    secondary:
      - 山门/渡口/客栈
      - 门派物件
      - 伤痕与礼数动作
    prohibited_shortcuts:
      - 只有招式名没有秩序后果
      - 只靠古风辞藻冒充武侠
  dialogue_register:
    line_length: short_to_medium
    monologue_density: low
    narration_role: strategic
    exposition_rule: 先用出手和礼数说明关系，再补门派与历史压力，不可反过来。
  motif_system:
    recurring_motifs:
      - 拔剑礼
      - 山门与渡口
      - 门规
      - 旧案卷宗
    payoff_rule: 母题必须从江湖仪式升级到个人抉择与历史代价。
  failure_modes:
    - 只剩招式和美图。
    - 江湖关系没有秩序结构。
    - 历史不施压，只当布景。
