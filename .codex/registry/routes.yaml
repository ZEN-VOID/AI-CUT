version: 1
repo: AIGC-FILM
last_updated: 2026-04-15

default_flow:
  - step: mandate
    owner: zhongshu
    carrier: .codex/templates/harness/mandate.yaml
  - step: mission_brief
    owner: zhongshu
    carrier: .codex/templates/harness/mission-brief.yaml
  - step: preflight
    owner: menxia
    carrier: .codex/templates/harness/preflight-verdict.yaml
  - step: execution
    owner: shangshu
    carrier: .codex/state/tasks/<task_id>/
    note: 通用默认执行账本；`aigc` 项目工作流以下方 `canonical_runtime_root` 声明的 `projects/aigc/<项目名>/` 为唯一真源
  - step: validation
    owner: menxia
    carrier: .codex/templates/harness/validation-report.md
  - step: learning
    owner: menxia
    carrier: .codex/templates/harness/learning-record.md

route_policies:
  - id: aigc-root-entry
    trigger: AIGC 创作项目初始化、阶段切换、续跑、总入口判定
    rule: "优先进入 `.agents/skills/aigc/SKILL.md`，由根技能路由到一个明确阶段"
  - id: aigc-project-runtime-canonical
    trigger: 命中 `.agents/skills/aigc/SKILL.md` 及其阶段技能
    rule: "`projects/aigc/<项目名>/` 是 AIGC 项目任务的运行时唯一真源；`.codex/state/tasks/<task_id>/` 只作为可选治理镜像"
  - id: aigc-bootstrap-compat-mode
    trigger: 命中 `.agents/skills/aigc/` 大规模重构、阶段合同重写、子路径迁移或 schema 重建
    rule: "当 `aigc.contract_mode=bootstrap_compat` 时，harness 只强制保留项目级 runtime / governance carriers、卫星技能入口与 review gate；不把当前阶段内细节视为冻结真源"
  - id: aigc-query-satellite-entry
    trigger: 命中项目状态查询、阶段产物取证、编导/主体/画面/视频资产定位或治理工件查证
    rule: "优先进入 `.agents/skills/aigc/query/SKILL.md`；若问题实为阶段内细节，再由 `query` 回接根技能或目标阶段"
  - id: aigc-resume-satellite-entry
    trigger: 命中中断项目续跑、阶段恢复、治理工件缺口补齐、重建最后稳定入口
    rule: "优先进入 `.agents/skills/aigc/resume/SKILL.md`；先修 canonical runtime 与治理工件，再回接根技能或目标阶段"
  - id: aigc-review-satellite-entry
    trigger: 命中高风险预审、阶段验收、项目级 validation-report 更新、learning bridge
    rule: "优先进入 `.agents/skills/aigc/review/SKILL.md`；由门下省侧卫星技能判定 mode 后再路由到 `preflight-review / acceptance-review / learning-bridge` 子技能"
  - id: aigc-image-stage-entry
    trigger: 命中 `5-Image`，或需要把 `3-Detail/第N集.json` / `4-Design` 资产组织成图像请求 JSON、引用绑定结果或 provider-ready 图像 handoff
    rule: "先进入 `.agents/skills/aigc/5-Image/SKILL.md`；再由阶段父级路由到 `1-提示词蒸馏`、`2-参照引用` 或 `3-图像生成`"
  - id: aigc-design-prop-panel-entry
    trigger: 命中 `4-Design/3-面板/道具`、道具面板、道具 panel layout、或批量 4-Design 道具面板生图
    rule: "进入 `.agents/skills/aigc/4-Design/3-面板/道具/SKILL.md`；默认先写 `PropPanel-layout.json`，再经 `.agents/skills/aigc/4-Design/3-面板/_shared/panel_auto_generate.py` 调用 `nano-banana/general`。批量 4-Design 上下文自动绑定设计已有图片，单文件或自然语言上下文默认不绑定参照。"
  - id: aigc-design-role-panel-entry
    trigger: 命中 `4-Design/3-面板/角色`、角色面板、CharacterPanel、角色 panel layout、或批量 4-Design 角色面板生图
    rule: "先进入 `.agents/skills/aigc/4-Design/3-面板/SKILL.md`，再路由到 `.agents/skills/aigc/4-Design/3-面板/角色/SKILL.md`；默认先写 `CharacterPanel-layout.json`，再调用 `.agents/skills/api/image/nano-banana/general`。批量 4-Design 上下文自动绑定对应已有设计图片，单文件或自然语言上下文默认无参照 T2I。"
  - id: aigc-design-scene-panel-entry
    trigger: 命中 `4-Design/3-面板/场景`、场景面板、场景九宫格、scene panel，或需要把场景设计 prompt 自动转成 layout JSON 后生图
    rule: "先进入 `.agents/skills/aigc/4-Design/3-面板/SKILL.md`，再路由到 `.agents/skills/aigc/4-Design/3-面板/场景/SKILL.md`；默认通过 SMART 桥调用 `.agents/skills/api/image/nano-banana/general`，单文件/自然语言直调默认不隐式带参考图"
  - id: aigc-video-stage-entry
    trigger: 命中 `6-Video` 或需要把 `3-Detail/第N集.json` 蒸馏成视频工具入参 JSON
    rule: "先进入 `.agents/skills/aigc/6-Video/SKILL.md`；若任务是按分镜组组织视频请求，默认路由 `1-提示词蒸馏/全能参照`"
  - id: aigc-shelved-stages
    trigger: 命中 `7-Cut / 7-后期`
    rule: "显式返回“搁浅”状态与补建落点，不得伪造执行链，也不计入当前可执行阶段审计失败"
  - id: bootstrap-governance-first
    trigger: 仓库初始化、架构升级、长流程治理、跨仓继承
    rule: "先走治理链，再扩业务 skill"
  - id: legacy-import-needs-mapping
    trigger: 从 AIGC-ZEN-VOID 引入任何目录、skill、脚本或规则
    rule: "必须先登记 heritage mapping，再进入执行"
  - id: high-risk-review-gate
    trigger: 涉及重构、批量迁移、状态修复、基础规则变更
    rule: "必须经过门下省预审"
  - id: comic-novel-adaptation-entry
    trigger: 命中文本、图片、视频、新闻事件或网络热搜，需要改编为后续漫画生成可用的小说底稿
    rule: "优先进入 `.agents/skills/comic/漫画小说改编/SKILL.md`；先做来源归一与事实边界裁决，再输出 `漫画小说主稿 + 漫画桥接包 + 思行裁决摘要`"

legacy_mapping:
  - legacy_object: /Volumes/AIGC/AIGC-ZEN-VOID/.agents/skills/aigc2026
    target_role: future film-suite
    bootstrap_action: 保留为 design source，本轮只建立接入槽位
  - legacy_object: /Volumes/AIGC/AIGC-ZEN-VOID/.codex/agents/story
    target_role: future menxia specialist reviewers
    bootstrap_action: 先建立总 reviewer office，再逐步拆专项席位
  - legacy_object: /Volumes/AIGC/AIGC-ZEN-VOID/.codex/hooks
    target_role: future bingbu/gongbu automation
    bootstrap_action: 当前先不迁移 hooks，优先完成 runbook 与 audit 基线

workflow_carriers:
  - id: aigc-project-runtime
    applies_to: aigc-root-entry
    contract_mode: bootstrap_compat
    canonical_runtime_root: projects/aigc/<项目名>/
    project_state_carrier: projects/aigc/<项目名>/project_state.yaml
    governance_state_carrier: projects/aigc/<项目名>/governance-state.yaml
    mandate_carrier: projects/aigc/<项目名>/mandate.yaml
    mission_brief_carrier: projects/aigc/<项目名>/mission-brief.yaml
    route_plan_carrier: projects/aigc/<项目名>/route-plan.yaml
    preflight_carrier: projects/aigc/<项目名>/preflight-verdict.yaml
    validation_carrier: projects/aigc/<项目名>/validation-report.md
    learning_carrier: projects/aigc/<项目名>/learning-record.md
    governance_mirror: .codex/state/tasks/<task_id>/
    mirror_policy: canonical-first
