version: 1
canonical_owner: ".agents/skills/aigc/review/_shared/review-dimension-registry.yaml"
purpose: "aigc review 维度、checkpoint 审计点、stage acceptance 与 package release gate 的单一真源"
execution_provider:
  default_skill: "/Users/vincentlee/.codex/skills/meta/构建/架构/code-reviewer/SKILL.md"
  mode: "background-window"
  ownership: "child skills define audit spec; provider executes review; parent aggregates and routes repair"
policies:
  checkpoint_inline:
    step_failure_order:
      - "优先阻断当前 checkpoint 的 handoff"
      - "若 issue 指向当前阶段节点，则回退到当前阶段对应 node 或 leaf"
      - "若 issue 指向 source_layer_owner，则立即转 `back_to_source_contract`"
    pass_gate: "只有 checkpoint aggregate packet 判定 `PASS` 或 `PASS-WITH-WARNINGS`，才允许 handoff 下游"
  stage_acceptance:
    stage_pass_gate: "只有 stage aggregate packet 判定 `PASS`，当前 stage 才算通过"
  package_release:
    release_pass_gate: "只有 release aggregate packet 判定 `PASS`，才允许 provider handoff / package release"
checkpoints:
  - id: "planning-handoff-ready"
    stage: "1-Planning"
    trigger_node: "1-Planning/3-分组 finalized + 1-Planning/validation-report.md prepared"
    scope: "episode"
    mandatory_dimensions:
      - "planning-seed-validator"
      - "governance-closure-validator"
    default_handoff_on_pass:
      - "2-Global"
  - id: "global-seed-ready"
    stage: "2-Global"
    trigger_node: "episode_root.json landed + 2-Global/validation-report.md updated"
    scope: "episode"
    mandatory_dimensions:
      - "planning-seed-validator"
      - "governance-closure-validator"
    default_handoff_on_pass:
      - "3-Detail"
  - id: "detail-episode-ready"
    stage: "3-Detail"
    trigger_node: "第N集.json landed + stage validators passed + 3-Detail/validation-report.md updated"
    scope: "episode"
    mandatory_dimensions:
      - "planning-seed-validator"
      - "detail-execution-validator"
      - "governance-closure-validator"
    default_handoff_on_pass:
      - "4-Design"
      - "5-Image"
      - "6-Video"
  - id: "design-list-ready"
    stage: "4-Design/1-清单"
    trigger_node: "catalog/research/bridge outputs landed"
    scope: "episode-domain"
    mandatory_dimensions:
      - "design-alignment-validator"
      - "governance-closure-validator"
    default_handoff_on_pass:
      - "4-Design/2-设计"
  - id: "design-truth-ready"
    stage: "4-Design/2-设计"
    trigger_node: "design truth + projection + manifest landed"
    scope: "episode-domain"
    mandatory_dimensions:
      - "design-alignment-validator"
      - "governance-closure-validator"
    default_handoff_on_pass:
      - "4-Design/3-面板"
      - "5-Image/2-参照引用"
  - id: "design-panel-ready"
    stage: "4-Design/3-面板"
    trigger_node: "layout json landed + smart handoff ready"
    scope: "episode-domain"
    mandatory_dimensions:
      - "design-alignment-validator"
      - "governance-closure-validator"
    default_handoff_on_pass:
      - "5-Image"
  - id: "image-request-ready"
    stage: "5-Image/1-提示词蒸馏"
    trigger_node: "request json landed"
    scope: "episode"
    mandatory_dimensions:
      - "detail-execution-validator"
      - "image-delivery-validator"
      - "governance-closure-validator"
    default_handoff_on_pass:
      - "5-Image/2-参照引用"
  - id: "image-reference-ready"
    stage: "5-Image/2-参照引用"
    trigger_node: "bound json + manifest + match-report landed"
    scope: "episode"
    mandatory_dimensions:
      - "design-alignment-validator"
      - "image-delivery-validator"
      - "governance-closure-validator"
    default_handoff_on_pass:
      - "5-Image/3-图像生成"
  - id: "image-handoff-ready"
    stage: "5-Image/3-图像生成"
    trigger_node: "submit-plan.json + submit-brief.md landed"
    scope: "episode"
    mandatory_dimensions:
      - "image-delivery-validator"
      - "governance-closure-validator"
    default_handoff_on_pass:
      - "provider:image"
  - id: "video-request-ready"
    stage: "6-Video/1-提示词蒸馏"
    trigger_node: "video request json/text landed"
    scope: "episode"
    mandatory_dimensions:
      - "detail-execution-validator"
      - "video-delivery-validator"
      - "governance-closure-validator"
    default_handoff_on_pass:
      - "6-Video/2-参照引用"
  - id: "video-reference-ready"
    stage: "6-Video/2-参照引用"
    trigger_node: "bound json + manifest + match-report landed"
    scope: "episode"
    mandatory_dimensions:
      - "video-delivery-validator"
      - "governance-closure-validator"
    default_handoff_on_pass:
      - "6-Video/3-视频生成"
  - id: "video-handoff-ready"
    stage: "6-Video/3-视频生成"
    trigger_node: "submit-plan.json + submit-brief.md landed"
    scope: "episode"
    mandatory_dimensions:
      - "video-delivery-validator"
      - "governance-closure-validator"
    default_handoff_on_pass:
      - "provider:video"
  - id: "package-release-ready"
    stage: "package"
    trigger_node: "cross-stage handoff pack assembled"
    scope: "episode-or-project"
    mandatory_dimensions:
      - "planning-seed-validator"
      - "detail-execution-validator"
      - "design-alignment-validator"
      - "image-delivery-validator"
      - "video-delivery-validator"
      - "governance-closure-validator"
    default_handoff_on_pass:
      - "release"
stage_acceptance:
  - stage: "1-Planning"
    mandatory_dimensions:
      - "planning-seed-validator"
      - "governance-closure-validator"
  - stage: "2-Global"
    mandatory_dimensions:
      - "planning-seed-validator"
      - "governance-closure-validator"
  - stage: "3-Detail"
    mandatory_dimensions:
      - "planning-seed-validator"
      - "detail-execution-validator"
      - "governance-closure-validator"
  - stage: "4-Design"
    mandatory_dimensions:
      - "design-alignment-validator"
      - "governance-closure-validator"
  - stage: "5-Image"
    mandatory_dimensions:
      - "image-delivery-validator"
      - "governance-closure-validator"
  - stage: "6-Video"
    mandatory_dimensions:
      - "video-delivery-validator"
      - "governance-closure-validator"
dimensions:
  - role_id: "planning-seed-validator"
    dimension: "规划与种子兑现"
    skill_path: ".agents/skills/aigc/review/规划与种子兑现"
    scope: "init/planning/global/detail handoff obligations"
    objective: "确认 `0-Init -> 1-Planning -> 2-Global -> 3-Detail` 的 seed 与 handoff 没有断链"
    method: "对照 north_star / planning outputs / episode_root / detail root，定位 seed 漂移与 obligation 漏传"
    report_filename: "规划与种子兑现.md"
    checkpoint_inline:
      enabled: true
      checkpoints:
        - "planning-handoff-ready"
        - "global-seed-ready"
        - "detail-episode-ready"
    stage_acceptance:
      stages:
        - "1-Planning"
        - "2-Global"
        - "3-Detail"
      weight: 0.20
    package_release:
      enabled: true
      weight: 0.16
    default_rework_targets:
      - "1-Planning"
      - "2-Global"
      - "3-Detail"
    upstream_source_owners:
      - "0-Init"
      - "1-Planning"
      - "2-Global"
  - role_id: "detail-execution-validator"
    dimension: "分镜执行连续性"
    skill_path: ".agents/skills/aigc/review/分镜执行连续性"
    scope: "detail root completeness, shot continuity, composition/camera handoff"
    objective: "确认 `3-Detail` 已真正形成可供 design/image/video 消费的稳定导演事实"
    method: "读取第N集 JSON 与 validators evidence，定位镜级字段断裂、组镜不连、handoff 不足"
    report_filename: "分镜执行连续性.md"
    checkpoint_inline:
      enabled: true
      checkpoints:
        - "detail-episode-ready"
        - "image-request-ready"
        - "video-request-ready"
    stage_acceptance:
      stages:
        - "3-Detail"
      weight: 0.20
    package_release:
      enabled: true
      weight: 0.17
    default_rework_targets:
      - "3-Detail"
    upstream_source_owners:
      - "2-Global"
      - "3-Detail"
  - role_id: "design-alignment-validator"
    dimension: "设计对位"
    skill_path: ".agents/skills/aigc/review/设计对位"
    scope: "detail/global to list/design/panel alignment and domain continuity"
    objective: "确认 `4-Design` 没有脱离上游导演事实，并为 image/video 提供了稳定主体与 layout truth"
    method: "对照 `3-Detail`、`4-Design` 各域 canonical truth 与 slot bundles，定位设计漂移与 continuity 断带"
    report_filename: "设计对位.md"
    checkpoint_inline:
      enabled: true
      checkpoints:
        - "design-list-ready"
        - "design-truth-ready"
        - "design-panel-ready"
        - "image-reference-ready"
    stage_acceptance:
      stages:
        - "4-Design"
      weight: 0.20
    package_release:
      enabled: true
      weight: 0.17
    default_rework_targets:
      - "4-Design/1-清单"
      - "4-Design/2-设计"
      - "4-Design/3-面板"
    upstream_source_owners:
      - "3-Detail"
      - "4-Design"
  - role_id: "image-delivery-validator"
    dimension: "图像交付就绪"
    skill_path: ".agents/skills/aigc/review/图像交付就绪"
    scope: "image request, reference binding, provider handoff, subject continuity"
    objective: "确认 `5-Image` 的请求、引用、provider pack 已达到可信交付门"
    method: "读取 request/binding/handoff 三段输出，定位 continuity、binding、provider pack 缺口"
    report_filename: "图像交付就绪.md"
    checkpoint_inline:
      enabled: true
      checkpoints:
        - "image-request-ready"
        - "image-reference-ready"
        - "image-handoff-ready"
    stage_acceptance:
      stages:
        - "5-Image"
      weight: 0.20
    package_release:
      enabled: true
      weight: 0.17
    default_rework_targets:
      - "5-Image/1-提示词蒸馏"
      - "5-Image/2-参照引用"
      - "5-Image/3-图像生成"
    upstream_source_owners:
      - "3-Detail"
      - "4-Design"
      - "5-Image"
  - role_id: "video-delivery-validator"
    dimension: "视频交付就绪"
    skill_path: ".agents/skills/aigc/review/视频交付就绪"
    scope: "video request, reference binding, provider handoff, motion/duration readiness"
    objective: "确认 `6-Video` 的请求、引用、provider pack 与 motion readiness 已达到可信交付门"
    method: "读取 video request/binding/handoff 三段输出，定位 provider、motion、duration 与 continuity 缺口"
    report_filename: "视频交付就绪.md"
    checkpoint_inline:
      enabled: true
      checkpoints:
        - "video-request-ready"
        - "video-reference-ready"
        - "video-handoff-ready"
    stage_acceptance:
      stages:
        - "6-Video"
      weight: 0.20
    package_release:
      enabled: true
      weight: 0.17
    default_rework_targets:
      - "6-Video/1-提示词蒸馏"
      - "6-Video/2-参照引用"
      - "6-Video/3-视频生成"
    upstream_source_owners:
      - "3-Detail"
      - "4-Design"
      - "5-Image"
      - "6-Video"
  - role_id: "governance-closure-validator"
    dimension: "治理闭环"
    skill_path: ".agents/skills/aigc/review/治理闭环"
    scope: "validation carriers, source trace, route uniqueness, runtime closure"
    objective: "确认阶段 `validation-report`、scope、route 和 runtime carriers 没有漂移"
    method: "读取项目根治理工件、阶段 validation carriers 与当前 scope refs，定位 gate/carrier/route 漂移"
    report_filename: "治理闭环.md"
    checkpoint_inline:
      enabled: true
      checkpoints:
        - "planning-handoff-ready"
        - "global-seed-ready"
        - "detail-episode-ready"
        - "design-list-ready"
        - "design-truth-ready"
        - "design-panel-ready"
        - "image-request-ready"
        - "image-reference-ready"
        - "image-handoff-ready"
        - "video-request-ready"
        - "video-reference-ready"
        - "video-handoff-ready"
        - "package-release-ready"
    stage_acceptance:
      stages:
        - "1-Planning"
        - "2-Global"
        - "3-Detail"
        - "4-Design"
        - "5-Image"
        - "6-Video"
      weight: 0.20
    package_release:
      enabled: true
      weight: 0.16
    default_rework_targets:
      - "validation-report"
      - "root-governance"
    upstream_source_owners:
      - "root-aigc"
      - "project-runtime"

