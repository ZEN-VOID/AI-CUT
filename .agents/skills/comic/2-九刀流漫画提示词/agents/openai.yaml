interface:
  display_name: "九刀流漫画提示词"
  short_description: "优先消费上游 `第N组.md` 漫剧剧本；必要时再兼容切组，并分别蒸馏成一次生成 9 张的连续漫画页提示词 JSON"
  default_prompt: "Use $comic-nine-blade-prompts to prefer the upstream grouped manga-drama script files (`第N组.md`) from $comic-script-adaptation. Treat each group file as one canonical unit for nine-blade prompting. Only if the user provides raw script without grouped files, temporarily group it using the same stage-1 rule: roughly 1000 Chinese characters per unit, keep under-1000 text as one group, merge a final remainder of 300 chars or fewer into the previous group, allow 700 chars or more to stand alone, and default 301-699 chars to merge unless there is a hard scene or hook boundary. For each group, generate one nine_blade_comic_prompts.v1 JSON for one Seedream sequential request that creates exactly 9 separate vertical comic pages, injects one main_character_lock anchor into every page prompt, keeps active recurring characters visually consistent and clearly distinguishable, keeps scene continuity across pages and across groups, preserves one stable visual DNA across all groups, and places a bottom-right numeric page number 1-9 on every page."
