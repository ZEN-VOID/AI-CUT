interface:
  display_name: "漫画剧本改编"
  short_description: "把文本、图片、视频或热点事件改编为按组落盘、可直接进入九刀流的漫剧剧本"
  default_prompt: "Use $comic-script-adaptation to normalize arbitrary source material, lock the truth boundary, choose a comic-first adaptation posture when fiction allows it, and rewrite the material into grouped manga-drama script files as the only canonical output. Group by roughly 1000 Chinese characters per unit, keep under-1000 text as one group, merge a final remainder of 300 chars or fewer into the previous group, allow 700 chars or more to stand alone, and default 301-699 chars to merge unless there is a hard scene or hook boundary. Write the final grouped script files as `第N组.md`, keep each group sceneable, hook-driven, and directly consumable by $comic-nine-blade-prompts, and avoid emitting parallel bridge packs or structured source packages unless the user explicitly asks for legacy compatibility."
