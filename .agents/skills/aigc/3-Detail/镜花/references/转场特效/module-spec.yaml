version: 1
module_id: jinghua-transition-stage
module_level: branch
stage_order: parallel_after_shot_composition
branch_key: transition_fx
purpose: 在确保人物与画面主轴已成立后，克制式补充组内、组间转场和必要特效。
child_modules:
  - path: references/转场特效/组内/module-spec.yaml
  - path: references/转场特效/组间/module-spec.yaml
  - path: references/转场特效/特效/module-spec.yaml
triggers:
  - 已存在 `shot_spine_patch`
  - "`cinematography_patch / camera_patch` 若已存在，只作为 side input"
  - 当前组内部或组界处存在显著的时间、空间、情绪或感知切换
  - 当前组需要先判断“保持直切是否已经最强”
must_answer:
  - 当前组真正要解决的是时间、空间、情绪还是感知层衔接问题
  - 这些转场或特效是顺着 `水月` 的哪条节奏或感知变化出现的
  - 哪些地方保持直切反而更强，哪些地方才值得显式转场
  - 哪些切接需要被强调
  - 哪些组间衔接值得提前埋钩
  - 是否真的需要特效，还是普通画面手段足够
patch_contract:
  target_slot: transition_fx_patch
  required_elements:
    - intra_group_transition
    - inter_group_hook
    - fx_decision
  optional_elements:
    - transition_problem_frame
    - cut_priority_decision
merge_policy:
  execution_mode: branch_gate_then_leaf_parallel
  decision_chain:
    - 判定衔接问题
    - 优先比较直切与转场收益
    - 命中叶子后再汇流 `组内 -> 组间 -> 特效`
  combine_order:
    - 组内
    - 组间
    - 特效
  preserve_first:
    - cut priority
    - narrative gain
    - emotional continuity
  trim_first:
    - 无明确问题指向的转场命名
    - 炫耀性特效
    - 与主动作无关的花活
quality_gates:
  - 先判衔接问题，再判直切是否最强
  - 默认克制
  - 无收益时允许空 patch
  - 特效默认不进入，只有明确世界观或感知桥接收益时才补
  - 转场和特效不得改写 `水月` 的事实链
  - 不得反向抢走角色、动作和摄影主轴
