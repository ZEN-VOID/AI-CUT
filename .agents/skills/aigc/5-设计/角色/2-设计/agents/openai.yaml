  short_description: "从 角色/1-清单 扩展单角色细目设计稿，消费 north_star.yaml 与 team.yaml。"
  default_prompt: "使用 $aigc-design-character-detail，从 projects/aigc/<项目名>/5-设计/角色/1-清单/角色清单.md 读取角色，并结合 0-初始化/north_star.yaml 与 team.yaml，为每个角色输出纯色背景全身定妆照到 5-设计/角色/2-设计/C###-<角色名>.md；## 4. 解构 下方直接写 主体ID号，并与文件名前缀、## 5. 提示词设计 主体 ID 和英文 prompt 开头一致；英文 prompt 以主体 ID 号开头，整合 ## 4. 解构 全部有效信息，控制在 1300 characters 内，使用自然语言负向约束，不使用 --no，不置身场景。"
metadata:
