schema_version: "aigc-governance-state/v1"
project: "__PROJECT_NAME__"
updated_at: "__DATE__"

canonical_runtime:
  project_root: "projects/aigc/__PROJECT_NAME__"
  active_stage_chain:
    - "0-初始化"
    - "1-分集"
    - "4-编剧"
    - "2-美学"
    - "5-导演"
    - "6-分镜"
    - "7-摄影"
    - "8-分组"
    - "3-主体"
    - "9-图像"
    - "10-画布"
  legacy_stage_aliases:
    "2-编导": "readback_or_migrate_to: 4-编剧 / 5-导演 / 6-分镜"
    "3-运动": "readback_or_migrate_to: 6-分镜 / 7-摄影 / 8-分组"
    "5-表演": "archived_backup_only"
    "6-氛围": "archived_backup_only"
    "9-光影": "archived_backup_only"
    "4-摄影": "readback_or_migrate_to: 7-摄影"
    "5-Image": "readback_or_migrate_to: 9-图像"
    "6-Video": "readback_or_migrate_to: 10-画布"

