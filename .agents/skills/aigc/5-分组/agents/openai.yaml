interface:
  display_name: "AIGC 分组"
  short_description: "将逐集摄影稿切成带场景标题、全局风格、画面风格、首帧衔接/回龙帧和统计的完整分镜组。"
  default_prompt: "使用 $aigc-grouping，把 projects/aigc/<项目名>/4-摄影/第N集.md 按真实集-场-组切成完整分镜组；只读消费 team.yaml.init_synthesis.stage_seed_summary.\"5-分组\"、init_handoff.grouping_seed 与 north_star.yaml.创作阶段不变量.分组，不调用 team 身份、旧 stage profile 或补造顾问问答；边界以原画面性字段总时长为主：每个上游画面字段取最后一个 [起始秒-结束秒] 的结束秒，连续画面字段相加后优先接近15秒但不精确卡点，同一原画面性字段和对应对白承托必须保持完整；落盘后把组内原分散时间段整合为当前分镜组基准下连续递增的 [N-N秒]，后一个时间段起点接前一个终点，YAML 时长估算取最后结束秒；字数和对白句数只作辅助风险复核。每个分镜组标题后先重复当前场景标题，即便未切换场景也重复同一标题；场景标题下方立即写“全局风格：”，字段内三行分别是固定前置词加 300 字以内当前组全局风格整理句、类型元素.类型元素提示词、细分风格.画面风格。随后写“画面风格：”，从组内镜头设计提炼构图方式、光源、色彩、摄影参数和观看位置，并放在第一个原画面性字段标题上方；不输出“分镜画面：”“画面构图：”或左侧/中间/右侧/前景/中景/背景等位置细节字段，不在组头另列角色/场景/道具清单。每组第一个原画面性字段标题下方第一行直接写普通 [0-N秒] 分镜描述：首组自然整理本组开始画面，第二组及之后按回龙帧口径完整代入上一组最后原画面性字段的结尾状态画面点内容，并带入主体、动作、场景、关键道具、空间关系、光线和已成立状态；若回龙到对白画面、独白画面、旁白画面或音效画面，同步带入对应声音内容，保持声画承托不断裂；只调整景别、机位、镜头角度、焦距、观看距离或焦点路径，不新增剧情、不改对白、不改变人物状态，不复制上一组完整画面块或完整原画面性字段，且不写特殊字段、来源说明或规则说明。场景标题行、画面风格和分镜剧本正文计入 YAML 字数统计但不计入时长估算；全局风格字段和三行 north_star 内容、组底 YAML fenced block 本身不计入字数统计。不输出 ## A~B 组间连接件，也不输出分镜画面、增补首帧、回龙帧、连接类型、连接方法、变化过程、主体运动、运镜设计、透视适应、避免元素、入场镜头、出场画面、画面属性、画面构图、位置细节、分镜ID、连接件提示或旧版入场画面，输出到 projects/aigc/<项目名>/5-分组/第N集.md。"
