interface:
  display_name: "九刀流漫画提示词"
  short_description: "把分组漫剧剧本蒸馏为九页漫画提示词JSON，供逐页生图"
  default_prompt: "Use $comic-nine-blade-prompts to prefer the upstream grouped manga-drama script files (`第N组.md`) from $comic-script-adaptation. Treat each group file as one canonical unit for nine-blade prompting. Only if the user provides raw script without grouped files, temporarily group it using the same stage-1 rule: roughly 1000 Chinese characters per unit, keep under-1000 text as one group, merge a final remainder of 300 chars or fewer into the previous group, allow 700 chars or more to stand alone, and default 301-699 chars to merge unless there is a hard scene or hook boundary. For each group, generate one nine_blade_comic_prompts.v1 JSON that can be projected by $comic-generation into 9 separate `.agents/skills/cli/imagegen` page jobs, injects one main_character_lock anchor into every page prompt, keeps active recurring characters visually consistent and clearly distinguishable, keeps scene continuity across pages and across groups, preserves one stable visual DNA across all groups, and places a bottom-right numeric page number 1-9 on every page."
