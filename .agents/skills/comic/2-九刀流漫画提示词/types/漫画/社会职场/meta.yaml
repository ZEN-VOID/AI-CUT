pack_id: 社会职场
aliases:
  - 社会职场
  - 职场
  - 现实
  - 行业剧
  - 社会派
semantic_tags:
  - institution-pressure
  - adult-conflict
  - procedure
  - compromise
stage_projection:
  script_adaptation:
    focus:
      - 制度摩擦
      - 专业流程
      - 人情与利益
  nine_blade_prompting:
    layout_bias:
      - desk geography
      - procedural close-up
      - silence after decision
  image_generation:
    render_bias:
      - material realism
      - restrained acting
      - office pressure
  animation_generation:
    motion_bias:
      - controlled movement
      - lingering pause
      - decision hold
  episode_poster:
    poster_bias:
      - 这单谁来背
      - 今天必须签
      - 真相在会议室里
control_surface:
  conflict_engine:
    premise: 制度流程、职业动作和人情利益同时挤压人物选择。
    escalation_loop: 工作任务下达 -> 流程推进 -> 人情或利益打断 -> 选择留下后果。
    payoff: 戏剧成立要落在具体职业动作和利益链，而不是空泛社会议题。
  role_matrix:
    protagonist: 在专业理想与现实妥协之间被迫决策的人。
    rival_or_counterforce: 上级、客户、竞争对手、制度条款和行业指标。
    allies: 同事、下属、家人、消息源提供不同角度的压力与支持。
    observers_or_pressure: 会议室、文件、手机通知和舆论环境承担持续施压功能。
  page_turn_mechanism:
    setup_pattern: 先把流程和责任链摆清，再埋一个会伤人的选择点。
    turn_trigger: 签字、删稿、背锅、发言、证据外泄、任务截止。
    reveal_pattern: 翻页先给决定后的表情与局势变化，再补流程后果。
    carry_forward_rule: 每次翻页都要让利益链更清晰，人物更难两全。
  panel_grammar:
    dominant_panel_shapes:
      - 会议对峙格
      - 文件/手机特写格
      - 沉默压迫格
    expansion_nodes:
      - 公开表态
      - 关键签字
      - 利益翻盘
    compression_nodes:
      - 流程推进
      - 工位对话
      - 消息往返
    negative_space_policy: 留白用于压迫沉默和权衡，不用于弱化责任链。
  visual_carrier:
    primary:
      - 文件与屏幕
      - 表情控制
      - 会议空间站位
    secondary:
      - 手机上通知
      - 白板/表格
      - 城市职业场景
    prohibited_shortcuts:
      - 只有概念议题没有职业动作
      - 全靠说教没有利益链
  dialogue_register:
    line_length: medium
    monologue_density: low
    narration_role: strategic
    exposition_rule: 通过对话、文件和动作把制度显形，不写抽象论文式说明。
  motif_system:
    recurring_motifs:
      - 会议室
      - 截止时间
      - 文件签批
      - 手机通知
    payoff_rule: 母题要在每次决策中不断加压，最终回收到人物是否还能维持自我。
  failure_modes:
    - 只有议题没有职业场。
    - 人物冲突像校园吵架。
    - 决策没有真实后果。
