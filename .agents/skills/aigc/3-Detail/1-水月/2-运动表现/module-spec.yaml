version: 1
module_id: watermoon-motion-branch
module_level: branch
branch_key: motion
purpose: 面向 AIGC 剧本作为生成信息母体的需求，把人类编导常默认不写明的连续性、方位和因果关系显式言明，降低下游模型理解漂移。
child_modules:
  - path: 2-运动表现/一致性/module-spec.yaml
  - path: 2-运动表现/位置和方向/module-spec.yaml
  - path: 2-运动表现/逻辑性/module-spec.yaml
triggers:
  - 分镜组存在位移、转身、追逐、停顿、物件交接
  - 当前 prose 中有对人类读者足够、但对 AI 下游仍过于隐含的连续性信息
must_answer:
  - 当前状态和上一拍是否接得住
  - 人和物现在各在什么方位
  - 行为因果是否顺畅
  - 哪些对人类编导默认成立的信息必须在 AIGC 剧本层被言明
patch_contract:
  target_slot: motion_patch
  required_elements:
    - continuity_lock
    - position_direction
    - causal_link
    - anti_drift_explicitness
merge_policy:
  combine_order:
    - 一致性
    - 位置和方向
    - 逻辑性
  preserve_first:
    - 状态连续
    - 朝向清晰
    - 因果顺序
    - 显式化信息
  trim_first:
    - 人类可脑补但 AI 易漂移的隐含跳步
quality_gates:
  - 不得让角色链代替方位判断
  - 读者必须能看懂谁往哪里动
  - 对 AI 易漂移的连续性信息不得只靠默认脑补
