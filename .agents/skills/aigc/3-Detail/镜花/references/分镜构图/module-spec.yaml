version: 1
module_id: jinghua-shot-composition-stage
module_level: leaf
stage_order: 1
branch_key: shot_composition
purpose: 直接承接 `2-Global` 已内化的固定 `分镜切换`，在固定 `剧本正文` 窗口基础上一体完成真实镜窗、slot 映射、构图骨架、POV 策略预判与镜头描述子槽锁定，形成稳定的 group-level shot spine。
triggers:
  - shared root 中已存在固定 `剧本正文`
  - shared root 中已存在固定 `分镜切换`
  - 需要把组内窗口进一步变成可 merge 的 shot skeleton
must_answer:
  - 这组镜头语言承接了固定 `剧本正文`、shared root `分镜切换` 与 `水月` sidecar 的哪条主动作、主情绪或主空间关系
  - 既定 `分镜切换` 在当前组应如何直接落成真实镜窗与时间段
  - 每一镜应回指 `剧本正文` 的哪个窗口与锚点
  - 每镜的主视线、景别、构图任务、POV 与镜头描述子槽是什么
  - 每个分镜的主体、陪体、背景三层关系是否清楚，空间锚点、镜头轴线、主体几何关系是否成立
  - 当前段落的 `叙事内核 / Previous End / Current Mission / Next Start / 情绪引导` 如何落成景别与视点节奏
  - 当前段落更适合哪种 `景别节奏模板` 与 `POV 策略`
  - 命中镜头窗口内，实际景别曲线、心理距离与情感目标是否一致
patch_contract:
  target_slot: shot_spine_patch
  required_elements:
    - watermoon_inheritance
    - shot_count_plan
    - shot_slot_map
    - composition_skeleton
    - shot_size_rhythm_preview
    - pov_strategy_preview
    - shot_descriptor_lock
    - focus_spatial_logic
merge_policy:
  execution_mode: integrated_leaf
  preconditions:
    - 承接 `2-Global` 已固定的 `分镜切换`
    - 回看 `剧本正文` 与 `水月` evidence
  preserve_first:
    - group conflict axis
    - action continuity
    - readable slot mapping
    - shot size rhythm readability
    - descriptor slot coherence
quality_gates:
  - 未形成 shot spine 前不得进入后续阶段
  - former `1-切换` 的 fixed-shot-count 接受逻辑已上收 `2-Global`；当前模块不得再生成第二份切换真源
  - 未完成 inherited `分镜切换` 的落镜和 POV 预判前，不得进入并行分支
  - 不得因为 slot 映射而改写固定 `剧本正文`
  - 每个分镜决策都必须能回指到 `剧本正文` 或 `水月` 的原始信息
  - "既定 `分镜切换` 必须先承接 shared root 的固定镜数；当前模块只负责把它直接落成 `时间段 / slot / 构图`，不得擅自增减镜头数"
  - "`景别 / 镜头属性 / 镜头框架 / 镜头类型 / 镜头视角` 五个镜头描述子槽必须在 Stage-1 锁定，不得把 descriptor 选择留给下游临场决定"
  - "`tail-hook` 或下一组预映首拍默认只计入 `hook_preview_count`，不得自动折成当前组独立镜头"
  - "命中镜头窗口必须在本阶段完成景别曲线、POV 策略与心理距离的预判和复核，不得只留“后面再看”"
  - 不得直接越权写摄影、运镜或转场的细节
