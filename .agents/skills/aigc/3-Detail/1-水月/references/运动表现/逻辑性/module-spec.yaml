version: 1
module_id: watermoon-motion-logic
module_level: leaf
branch_key: motion
leaf_key: causality
purpose: 确保动作和事件推进不靠“为了好看所以发生”。
triggers:
  - 动作链超过一个节点
must_answer:
  - 为什么是现在发生
  - 哪个触发点把动作推出来
  - 下一拍为何能自然接续
patch_contract:
  target_slot: motion_patch
  append_fields:
    - cause
    - action_bridge
    - effect
merge_policy:
  keep:
    - 因果短链
  avoid:
    - 断裂跳接
quality_gates:
  - 至少能说明一条清晰因果线

