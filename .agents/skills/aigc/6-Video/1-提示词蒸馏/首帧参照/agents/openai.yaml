interface:
  display_name: "AIGC 6-Video 首帧参照"
  short_description: "以知行合一思行网络锁定单一分镜ID，蒸馏帧级视频请求 JSON/TXT/manifest。"
  default_prompt: "Use $aigc-video-first-frame-reference to read `projects/<项目名>/3-Detail/第N集.json`, lock one `分镜ID`, preserve `组间设计.全局风格` verbatim, distill `剧本正文` into the matching frame bridge through the local thinking-action network, and express the remaining group-level and shot-level facts in coherent natural sentences without field titles. Keep the target shot anchored as `分镜 <ID> xx秒-xx秒` using the current group-local `时间段.开始秒 / 结束秒`, never write `分镜 <ID> 的 xx秒-xx秒`, and prioritize `时间段 / 角色站位走位 / 角色背景面 / 景别 / 运镜手法 / 镜头速度(if present) / 镜头视角` over lower-priority details when compressing. Only when the budget is `tight` may some clauses be shortened into compact natural phrases; otherwise keep fluent natural sentences. Generate the frame-level JSON/TXT/manifest outputs without inventing reference images or upstream facts."
