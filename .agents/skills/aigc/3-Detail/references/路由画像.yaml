profile_goal: 将 2-Global 的组级 seed 直接收束为单技能 3-Detail director root
default_strategy: composition_first_single_skill
academy_mode:
  loading_rule: selective_bundle_loading
  baseline:
    - knowledge-base/电影学院派/README.md
    - .agents/skills/aigc/3-Detail/references/电影学院派知识接线.md
  translation_rule: 所有学院派知识必须回译为当前 JSON 字段对象，不直接输出教材术语堆叠
route_profiles:
  - signal_id: composition_first
    trigger: 所有常规 detail 任务
    emphasis:
      - 先锁镜数与切分点
      - 再写镜级字段
    academy_bundle:
      - knowledge-base/电影学院派/导演手册/电影导演方法.md
      - knowledge-base/电影学院派/分镜脚本/电影镜头设计.md
      - knowledge-base/电影学院派/分镜脚本/电影镜头语法.md
    pass_priority:
      - 分镜构图
      - 角色表现
      - 氛围表现
  - signal_id: dialogue_pressure
    trigger: 对白压强、关系攻守明显的组
    emphasis:
      - 角色表现优先细化 对话戏
      - 运镜手法只做放大，不改人物关系
    academy_bundle:
      - knowledge-base/电影学院派/导演手册/一流对话场景.md
      - knowledge-base/电影学院派/导演手册/电影导演方法.md
      - knowledge-base/电影学院派/分镜脚本/电影镜头语法.md
    pass_priority:
      - 角色表现
      - 分镜构图
      - 运镜手法
  - signal_id: action_path
    trigger: 角色位移、追逐、走位、躲闪明显的组
    emphasis:
      - 角色表现里的动作戏优先把方向和连续性写稳
      - 分镜构图保持观看清晰度
    academy_bundle:
      - knowledge-base/电影学院派/导演手册/电影导演技术.md
      - knowledge-base/电影学院派/分镜脚本/电影镜头调度.md
      - knowledge-base/电影学院派/分镜脚本/电影镜头设计.md
    pass_priority:
      - 分镜构图
      - 角色表现
      - 运镜手法
  - signal_id: atmosphere_load
    trigger: 空间、天气、压迫、留白、意境承担剧情的组
    emphasis:
      - 氛围表现与摄影表现加权
      - 不得把环境写成抽象 mood
    academy_bundle:
      - knowledge-base/电影学院派/导演手册/电影导演方法.md
      - knowledge-base/电影学院派/电影摄影/影像的创造.md
      - knowledge-base/电影学院派/电影摄影/摄影创作技法.md
    pass_priority:
      - 氛围表现
      - 摄影表现
      - 分镜构图
  - signal_id: spatial_clarity_risk
    trigger: 多人同场、对看、进出画、轴线和视线容易混乱的组
    emphasis:
      - 先修空间方向和观察链
      - 必须能说清楚谁在看谁、从哪边看、为什么切
    academy_bundle:
      - knowledge-base/电影学院派/导演手册/电影导演方法.md
      - knowledge-base/电影学院派/分镜脚本/电影镜头语法.md
      - knowledge-base/电影学院派/分镜脚本/电影镜头设计.md
    pass_priority:
      - 分镜构图
      - 运镜手法
      - 验收
  - signal_id: light_pressure
    trigger: 叙事收益主要来自光影、色彩、材质或影调反差的组
    emphasis:
      - 摄影表现必须有明确光源动机和色调关系
      - 不得只有漂亮词，没有显影机制
    academy_bundle:
      - knowledge-base/电影学院派/电影摄影/影像的创造.md
      - knowledge-base/电影学院派/电影摄影/摄影创作技法.md
      - knowledge-base/电影学院派/分镜脚本/电影镜头技术.md
    pass_priority:
      - 摄影表现
      - 氛围表现
      - 验收
