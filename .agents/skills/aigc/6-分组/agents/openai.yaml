interface:
  display_name: "AIGC 分组"
  short_description: "将逐集摄影稿切成带场景标题、构图分区定场、风格整理、组间连接件和统计的完整分镜组。"
  default_prompt: "使用 $aigc-grouping，把 projects/aigc/<项目名>/5-摄影/第N集.md 按真实集-场-组切成完整分镜组；边界以分镜N（约X秒）的显式时长累计为主，优先接近15秒但不精确卡点，同一画面句子、多分镜和对应对白承托必须保持完整，字数和对白句数只作辅助风险复核。每个分镜组标题后先重复当前场景标题，即便未切换场景也重复同一标题；随后写定场镜头，先覆盖场景身份、环境身份、氛围、光影、色彩和声音底色，再写画面构图和至少两个有内容的构图分区，把全部可见或需要生成角色、群体、关键道具和场景锚点布置成带形容属性、状态属性、站坐蹲躺靠等姿态、空间方位关系和朝向的主体账本，不新增无互动道具氛围镜头，不在组头另列角色/场景/道具清单；每集第二组起定场镜头必须在保留这些站位关系的基础上增量添加上一组尾帧还原入场，具体复现上一组末帧可见状态，并说明本组如何从同一状态以不同景别、机位、焦点、构图或观看距离进入；场景标题行、定场镜头、画面构图、构图分区和画面属性计入 YAML 字数统计但不计入时长估算，组底 YAML fenced block 本身不计入字数统计，组底 YAML 只保留 canonical 短名单统计；再根据当前分镜组，从 0-初始化/north_star.yaml 的全局风格.全局风格提示词中抽取匹配本组场景类型、光影、色彩、材质、动作和摄影证据的部分，整理为 300 字以内自然语句，以隐藏标题字段的三行纯内容写入组头；其中第 1 行全局风格必须以“视频生成的画面风格，光影和氛围与场景参照图保持一致。需要生成现场物理互动音效、氛围感音效、环境声、自然现象声、动作声，不要生成任何字幕，不要生成背景音乐。”开头，再接当前组风格整理句，第 2、3 行直引类型元素.类型元素提示词和细分风格.画面风格；每对相邻分镜组之间生成 3-4 秒组间首尾帧连接件，连接件标题就是唯一分镜 ID，标题后先写场景标题行，同场景重复同一标题，跨场景写“场景标题A ➡️ 场景标题B”，然后三项风格行先于连接类型输出，连接方法写成具体画面连接办法，不只写依赖型、流动型、变形型、复合型或无连接；不要复述起点尾帧和目标首帧，重点写变化过程、主体运动、运镜设计和透视适应，末尾用避免元素写负面约束，不再输出分镜ID、连接件提示、旧版入场画面或出场画面，输出到 projects/aigc/<项目名>/6-分组/第N集.md。"
