version: 1
module_id: jinghua-camera-variation
module_level: leaf
purpose: 决定镜头应静止、最小必要运动还是推拉摇移跟等变化，并给出默认叙事路线及其运动理由。
reference_paths:
  - 3-运镜手法/references/电影镜头调度-运镜判型.md
triggers:
  - 当前组存在情绪升降、信息揭示或空间关系变化
  - 当前镜头需要判断“动”是否真的优于“静”
  - "`academy_hit_note` 若含运动提示，需要筛选是否吸收到默认路线"
must_answer:
  - 默认叙事路线是静止还是变化，为什么
  - 这条默认路线属于哪个运动家族，为什么不是别的家族
  - 哪一镜需要变化
  - 为什么这一变化有必要，或为什么此处宁可不动
  - 不变化会损失什么
  - 焦段、遮挡、反射、纵深对当前变化是加成还是干扰
  - 变化是 actor-driven、reveal、push-pull、space-scan、static-blocking 还是 disorientation
  - 上游运动提示哪些可吸收，哪些应放弃
patch_contract:
  target_slot: movement_variation
  required_elements:
    - default_route
    - target_shots
    - movement_type
    - movement_reason
  recommended_subelements:
    default_route:
      - static_vs_motion
      - motion_family
    movement_type:
      - family_variant
      - start_stop_pattern
    movement_reason:
      - primary_viewing_gain
      - lens_space_fit
merge_policy:
  preserve_first:
    - narrative-route stability
    - motion-family stability
    - emotional gain
    - clarity of reveal
    - view-follow motivation
    - lens-space fit
  trim_first:
    - motion for motion's sake
    - motion that rewrites composition or space
quality_gates:
  - 变化必须有清楚动机
  - 动机不足时必须允许静镜或最小必要运动成为默认路线
  - 默认路线必须落到单一运动家族
  - 只能吸收与当前路线一致的上游运动提示
  - 焦段、遮挡、反射和纵深只能作为兼容性说明，不得主导重写路线
  - 不得借变化重写构图、空间轴线或角色行为逻辑
  - 不得为变化而变化
