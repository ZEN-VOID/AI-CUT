interface:
  display_name: "AIGC 分组"
  short_description: "将逐集摄影稿切成带场景标题、风格投影、组间首尾帧连接件和统计的完整分镜组。"
  default_prompt: "使用 $aigc-grouping，把 projects/aigc/<项目名>/3-摄影/第N集.md 按真实集-场-组切成完整分镜组；边界以分镜N（约X秒）的显式时长累计为主，优先接近15秒但不精确卡点，同一画面句子、多分镜和对应对白承托必须保持完整，字数和对白句数只作辅助风险复核。每个分镜组标题后先重复当前场景标题，即便未切换场景也重复同一标题，且该场景标题行计入 YAML 字数统计但不计入时长估算；再投影 0-初始化/north_star.yaml 的全局风格.全局风格提示词、类型元素.类型元素提示词、细分风格.画面风格，以隐藏标题字段的三行纯内容写入组头；其中第 1 行全局风格必须以“视频生成的画面风格，光影和氛围与场景参照图保持一致。需要生成现场物理互动音效、氛围感音效、环境声、自然现象声、动作声，不要生成任何字幕，不要生成背景音乐。”开头，再接全局风格原词；每对相邻分镜组之间生成 3-4 秒组间首尾帧连接件，连接件标题就是唯一分镜 ID，标题后先写场景标题行，同场景重复同一标题，跨场景写“场景标题A ➡️ 场景标题B”，然后三项 north_star 风格行先于连接类型输出，连接方法写成具体画面连接办法，不只写依赖型、流动型、变形型、复合型或无连接；不要复述起点尾帧和目标首帧，重点写变化过程、主体运动、运镜设计和透视适应，末尾用避免元素写负面约束，不再输出分镜ID、连接件提示、旧版入场画面或出场画面，输出到 projects/aigc/<项目名>/4-分组/第N集.md。"
