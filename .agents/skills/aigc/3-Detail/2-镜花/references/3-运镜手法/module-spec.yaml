version: 1
module_id: jinghua-camera-stage
module_level: branch
stage_order: 3
branch_key: camera
purpose: 在已稳定的分镜和摄影前提上补齐镜头变化、组合与速度，先形成默认叙事运镜，再按需比较同目标挑战变体，让观看路径更有组织。
child_modules:
  - path: references/3-运镜手法/变化/module-spec.yaml
  - path: references/3-运镜手法/组合/module-spec.yaml
  - path: references/3-运镜手法/速度/module-spec.yaml
triggers:
  - 已存在 `shot_spine_patch`
  - 已存在 `cinematography_patch`
  - 当前组需要更强的观看路径或情绪推进
  - "`academy_hit_note` 若含运动提示，只能在默认路线成立后作为 side input"
must_answer:
  - 这些运镜是在放大 `1-水月` 的哪条动作、情绪或视线变化
  - 默认叙事路线是静止、最小必要运动还是某种明确移动方式，为什么
  - 镜头为什么要动或不动，上游已转译的运动提示哪些值得吸收、哪些应放弃
  - 镜头之间怎样衔接最稳，且不打乱观看主语与信息顺序
  - 节奏快慢与变速如何影响观众感受，且如何与 `运镜手法` 分工
  - 是否存在不偷换表现目标的更强变体；若存在，是否只适合作为挑战对照
patch_contract:
  target_slot: camera_patch
  required_elements:
    - movement_variation
    - shot_combination
    - speed_profile
merge_policy:
  execution_mode: leaf_parallel_branch_serial
  combine_order:
    - 变化
    - 组合
    - 速度
  preserve_first:
    - default narrative route
    - narrative motivation
    - absorbable motion hints only
    - readable viewing flow
    - rhythm clarity
  trim_first:
    - 无动机运动
    - 借上游提示重做镜头设计
    - 纯炫技组合
    - 挑战案覆盖默认路线
quality_gates:
  - 无叙事或情绪收益时默认静镜优先
  - 运镜不能创造 `1-水月` 未给出的新动作节点
  - 运镜只处理运动路径、视角跟随、揭示方式与速度变化，不得重写构图、景别、空间轴线与表演主任务
  - 上游已转译的运动提示只能增强当前路线，不得变成第二次镜头重设计
  - 运镜不得打乱既有摄影基调
  - "`运镜手法` 回答“怎么动”，`镜头速度` 回答“动多快/如何变速”，两者不得互相吞并"
  - 组合关系必须能被剪辑承接
  - 同目标挑战变体只能作为对照，收益说不清时不得进入最终默认 patch
