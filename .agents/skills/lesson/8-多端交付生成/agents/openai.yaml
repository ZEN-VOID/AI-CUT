interface:
  display_name: "课程多端交付生成"
  short_description: "从课程内容模型生成 DOC/PPT/HTML 交付计划与 manifest"
  default_prompt: "Use $lesson-delivery when the user asks to generate final lesson/courseware delivery plans, manifests, DOC/PPT/HTML handoff packets, or multi-channel course outputs under `projects/lesson/<项目名>/8-多端交付生成/`. Load SKILL.md and CONTEXT.md, audit stages 3-7 plus content-model, create a shared delivery map, write delivery-plan.md and delivery-manifest.json when project-bound, and route concrete DOC, PPT, or HTML generation to the corresponding leaf. For real HTML/static-site artifacts, put .agents/skills/claude-design into the HTML leaf packet as the design executor. Do not use scripts, templates, regex, or mapping projection to generate course正文; scripts may only do format conversion, assembly, validation, and manifest writeback."
