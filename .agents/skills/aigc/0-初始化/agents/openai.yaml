interface:
  display_name: "AIGC 影片/电影项目初始化"
  short_description: "初始化影片、电影、影视或视频类 AIGC 项目的目录骨架、项目记忆与项目上下文根。"
  default_prompt: "Use $aigc-init when the user says 初始化影片, 初始化电影, 初始化影视, 初始化视频项目, new film project, or movie/video project kickoff. Initialize or repair an AIGC film/video project scaffold under `projects/aigc/<项目名>/` by creating the current `0-初始化` through `10-画布` stage directories, project root `MEMORY.md`, and project root `CONTEXT/README.md`. Record initialization-time user requirements and stable long-term inclinations in `MEMORY.md`. Do not generate north_star, init_handoff, story-source-manifest, team.yaml, STATE.json, CHANGELOG.md, source folders, or governance carriers. If the user says 初始化小说, 初始化网文, new novel, book, or story2026 project, route to $story-init instead."
