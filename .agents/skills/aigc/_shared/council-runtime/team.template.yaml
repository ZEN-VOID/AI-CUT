schema_version: "aigc-team/v2"
template_status: "legacy_optional"
project: "__PROJECT_NAME__"
updated_at: "__DATE__"

init_contract:
  init_mode: "legacy_optional_synthesis"
  team_lineup_mode: "auto" # auto | custom; replace only after user locks the lineup choice
  selector_scope_root: ".agents/skills/team/"
  decision_owner: "" # user_confirmed | blocked
  lineup_decision_evidence: ""
  source_profile: "" # source-light | source-grounded | source-reconcile
  selection_basis:
    scenario_tags: []
    required_department_coverage:
      director: false
      design: false
      cinematography: false
    optional_departments_included: []

runtime_policy:
  require_advisor_review_for_init_execution: true
  init_execution_owner_role: "planning"
  parent_skill_owns_canonical_writeback: true
  local_imitation_allowed: false
  selector_scope_enforced: true
  team_identity_usage: "init_only"
  creative_stage_persona_dispatch_allowed: false
  creative_stage_reads_init_synthesis_only: true
  creative_stage_subagent_persona_presets_allowed: false
  deprecated_stage_runtime_fields_active: false

team_setup:
  role_allocation_mode: "" # init_overlap | init_separated | init_overlap_allowed_by_question_scope
  overlap_notes: ""
  selector_scope_root: ".agents/skills/team/"
  required_departments:
    - "导演组"
    - "设计组"
    - "摄影组"
  optional_departments_included: []
  optional_departments_skipped: []
  roster_gaps: []
  recommendation_todo_paths: []
  selection_rationale: []
  candidate_shortlist_evidence:
    scenario_tags: []
    candidates: []

roles:
  planning:
    owner_phase: "0-初始化"
    members: []
    init_execution:
      kickoff_owner: true
      requires_advisor_review: true
      used_advisor_review: false
      fixed_packet: "aigc-init planning direct-answer packet"
      direct_answer_packet_ref: ""
      packet_refs: []
      role_identity_skill_calls: []
  init_advisors:
    owner_phase: "0-初始化"
    members_ref: "roles.planning.members"
    members: []
    boundary: "只在初始化阶段回答固定题包和补充风险/风格/设计判断；不作为创作阶段人格运行时。"
  init_review:
    owner_phase: "0-初始化"
    members_ref: "roles.planning.members"
    members: []
    boundary: "只复核 legacy/explicit 初始化综合是否足以支撑 stage seed summary；当前 scaffold-only 初始化不要求生成本文件。"

init_synthesis:
  direct_answer_summary:
    story_core: []
    emotional_core: []
    audience_and_use_case: []
    style_references: []
    aesthetic_exclusions: []
    production_constraints: []
    ip_and_adaptation_boundaries: []
  member_answer_provenance:
    - member: ""
      skill_path: ""
      department: ""
      packet_ref: ""
      question_scope: []
      accepted_points: []
      rejected_or_deferred_points: []
  stage_seed_summary:
    "1-分集":
      episode_scope_hints: []
      split_granularity: []
      cliffhanger_or_turning_point_policy: []
    "2-编剧":
      adaptation_fidelity_rules: []
      screenplay_voice_constraints: []
      dialogue_and_action_projection_notes: []
    "3-美学":
      visual_tone_invariants: []
      character_style_constraints: []
      scene_style_constraints: []
      prop_style_constraints: []
      storyboard_style_constraints: []
    "4-导演":
      director_intent_hints: []
      voice_picture_pairing_rules: []
      dramatic_substance_boundaries: []
    "5-表演":
      performance_boundaries: []
      action_reaction_priorities: []
      emotional_landing_rules: []
    "6-氛围":
      atmosphere_support_rules: []
      environmental_sound_boundaries: []
      image_motif_risks: []
    "7-分镜":
      continuity_principles: []
      start_path_end_priorities: []
      reference_frame_rules: []
    "8-摄影":
      shot_language_baseline: []
      rhythm_and_duration_hints: []
      camera_constraints: []
    "9-光影":
      light_color_camera_constraints: []
      lighting_result_rules: []
      shadow_and_subject_separation_notes: []
    "10-分组":
      grouping_rhythm: []
      bridge_policy: []
      north_star_projection_notes: []
    "11-主体":
      scene_design_invariants: []
      character_design_invariants: []
      prop_design_invariants: []
      asset_constraints: []
    "12-图像":
      prompt_evidence_rules: []
      visual_asset_constraints: []
    "13-画布":
      canvas_flow_constraints: []
      video_prompt_order_rules: []
    "14-审片":
      review_focus: []
      defect_watchlist: []

legacy_compat:
  deprecated_stage_seed_aliases:
    - "2-编导"
    - "3-运动"
    - "4-摄影"
  deprecated_fields:
    - "roles.supervision.stage_profiles"
    - "roles.supervision.stage_bindings"
    - "roles.supervision.members"
    - "roles.supervising.*"
    - "roles.production.*"
    - "team_setup.shared_agents"
    - "dispatch_policy: stage-front-advisor"
    - "dispatch_policy: leaf-advisor"
  handling: "Legacy fields are read-only migration evidence. New scaffold-only initialization must not create or require this carrier for creative-stage advisor dispatch."
  migration_note: ""

provenance:
  parent_skill: ".agents/skills/aigc/0-初始化/SKILL.md"
  team_root_index: ".agents/skills/team/SKILL.md"
  root_team_index_loaded: false
  shortlisted_member_skills_loaded: false
  planning_advisors: []
