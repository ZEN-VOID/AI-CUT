pack_id: 青春恋爱
aliases:
  - 青春恋爱
  - 甜宠
  - 校园
  - 校园恋爱
  - 少女恋爱
  - 心动
semantic_tags:
  - chemistry
  - soft-glow
  - heartbeat
  - awkward-closeness
stage_projection:
  script_adaptation:
    focus:
      - 化学反应
      - 试探靠近
      - 轻甜抬升
  nine_blade_prompting:
    layout_bias:
      - soft close-up
      - eye contact
      - hand detail
  image_generation:
    render_bias:
      - expression readability
      - soft glow
      - small gesture focus
  animation_generation:
    motion_bias:
      - light push-in
      - breathing beat
      - tiny gesture hold
  episode_poster:
    poster_bias:
      - 靠近
      - 心动
      - 别躲了
      - 被看见
control_surface:
  conflict_engine:
    premise: 关系通过靠近、回避、误读和再次靠近逐步显形。
    escalation_loop: 微小心动 -> 被看见的风险 -> 回避或误读 -> 下一次更近。
    payoff: 心意成立要落在行为变化，而不是只落在告白文本。
  role_matrix:
    protagonist: 带有表达盲区的两位青春主体。
    rival_or_counterforce: 情敌、前途压力、家庭期待或社交舆论。
    allies: 同学朋友负责观察、起哄、助攻和误导。
    observers_or_pressure: 校园共同体负责放大羞耻感与被看见感。
  page_turn_mechanism:
    setup_pattern: 先给视线和距离变化，再让角色误判对方意图。
    turn_trigger: 手部接触、第三人点破、突然回避、视线被撞见。
    reveal_pattern: 翻页后优先给表情与身体收缩，再补一句低密度对白。
    carry_forward_rule: 每个翻页点都要让关系前进一步或把退后写得更疼。
  panel_grammar:
    dominant_panel_shapes:
      - 近脸特写
      - 手部细节格
      - 双人距离格
    expansion_nodes:
      - 被看见
      - 靠近瞬间
      - 半告白
    compression_nodes:
      - 日常往返
      - 尴尬停顿
      - 同学观察
    negative_space_policy: 留白服务暧昧与呼吸，不能让页面信息塌成纯空镜。
  visual_carrier:
    primary:
      - 目光方向
      - 手部动作
      - 身体距离
    secondary:
      - 校服与日常道具
      - 天气光线
      - 被旁人看见的反应
    prohibited_shortcuts:
      - 只靠滤镜和飘花表达恋爱
      - 只靠长对白说明心动
  dialogue_register:
    line_length: short_to_medium
    monologue_density: medium
    narration_role: sparse
    exposition_rule: 对白要留空给潜台词，心动优先靠停顿、回避和动作表达。
  motif_system:
    recurring_motifs:
      - 递交物件
      - 共行回家路
      - 雨与风
      - 被起哄后的沉默
    payoff_rule: 母题要从日常重复里长出微差，最后在关系确认处回收。
  failure_modes:
    - 所有情绪都靠嘴说。
    - 每页甜度相同，没有波形。
    - 校园只剩背景，没有现实压力。
