interface:
  display_name: "AIGC 分组"
  short_description: "将逐集摄影稿切成带场景标题、入场镜头、出场画面尾钩、风格整理、组间连接件和统计的完整分镜组。"
  default_prompt: "使用 $aigc-grouping，把 projects/aigc/<项目名>/4-摄影/第N集.md 按真实集-场-组切成完整分镜组；边界以分镜N（约X秒）的显式时长累计为主，优先接近15秒但不精确卡点，同一画面句子、多分镜和对应对白承托必须保持完整，字数和对白句数只作辅助风险复核。每个分镜组标题后先重复当前场景标题，即便未切换场景也重复同一标题；随后写入场镜头，说明入口源、入场触发、镜头/观看位置、主体入画状态和动态关系变化：首组从本组第一个原始分镜可见状态进入，第二组及之后优先从上一组出场画面尾钩进入，并结合上一组末帧、上一组尾帧、上一组最后一帧或连接件抵达首态校正。再写画面构图和固定顺序完整输出左侧/中间/右侧/前景/中景/背景六个构图分区，确保每个分区都有具体可见主体、环境锚点、遮挡、光影材质或空场压力，不使用泛化占位句或静态站位清单，不在组头另列角色/场景/道具清单。画面属性和三项 north_star 风格整理后同步 4-摄影 原正文；每组原正文后、YAML 前必须写出场画面，记录本组最后一个原始分镜/本组末帧/尾帧中的主体末态、空间关系、动作余势、镜头/观看位置和承接锚点，不写成下一剧情预告或连接件正向提示词。场景标题行、入场镜头、画面构图、构图分区、画面属性、出场画面和分镜剧本正文计入 YAML 字数统计但不计入时长估算，组底 YAML fenced block 本身不计入字数统计，组底 YAML 只保留 canonical 短名单统计。每组第 1 行全局风格必须以“视频生成的画面风格，光影和氛围与场景参照图保持一致。需要生成现场物理互动音效、氛围感音效、环境声、自然现象声、动作声，不要生成任何字幕，不要生成背景音乐。”开头，再接 300 字以内当前组风格整理句，第 2、3 行直引类型元素.类型元素提示词和细分风格.画面风格。每对相邻分镜组之间生成 3-4 秒组间首尾帧连接件，连接件标题就是唯一分镜 ID，标题后先写场景标题行，同场景重复同一标题，跨场景写“场景标题A ➡️ 场景标题B”，然后三项风格行先于连接类型输出，连接件消费上一组出场画面和下一组入场镜头，但块内不重复输出出场画面字段；连接方法写成具体画面连接办法，不只写依赖型、流动型、变形型、复合型或无连接；不要复述起点尾帧和目标首帧，重点写变化过程、主体运动、运镜设计和透视适应，末尾用避免元素写负面约束，不输出分镜ID、连接件提示或旧版入场画面，输出到 projects/aigc/<项目名>/5-分组/第N集.md。"
