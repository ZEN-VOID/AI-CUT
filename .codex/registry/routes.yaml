    trigger: 命中大卫·芬奇视角、芬奇会怎么拍、David Fincher perspective、Fincher style、七宗罪/搏击俱乐部/社交网络/消失的爱人/心灵猎人/杀手式处理，或导演组需要处理犯罪程序、调查执念、机构系统、媒体操控、数字工作流、冷峻悬疑、隐形 VFX 与精密剪辑
