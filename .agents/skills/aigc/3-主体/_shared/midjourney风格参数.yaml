version: 1
updated_at: "2026-06-17"

default_model:
  display_name: "Midjourney V8.1"
  libtv_node_type: "image"
  resolution_policy: "handled_by_libtv_model_schema"
  model_key_resolution: "before execution, run libtv model search --type image \"Midjourney V8.1\" and inspect the selected model schema with libtv model <modelKey>"

schema_constraints:
  midjourney_v8_1:
    count_policy: "follow resolved libTV model schema; do not force count=1 unless the schema explicitly exposes 1"
    observed_libtv_count_values: [4]
    observed_at: "2026-06-17"
    execution_note: "When libTV schema exposes count=[4], generate the provider candidate set and persist the selected/final canonical asset under the required subject stem; do not expand candidates into separate subjects."

model_policy:
  new_subject_default:
    display_name: "Midjourney V8.1"
    applies_when: "same subject and same state has no reusable existing image under projects/aigc/<项目名>/3-主体"
  state_variant_exception:
    display_name: "Lib Image"
    applies_when: "same subject is required in a distinct visual state such as costume, age, injury, battle-before-after, damage, time-of-day, season, open-closed, or restored-ruined"
    model_key_resolution: "before execution, run libtv model search --type image \"Lib Image\" and inspect the selected model schema with libtv model <modelKey>"
    reference_policy: "must use an existing same-subject image node or uploaded local asset as reference; preserve style and aspect ratio from the base asset"
    suffix_policy: "inherit subject aspect ratio and fixed quality/style suffix; state variant names add a state suffix before 主图 or 多视图"

suffix_policy:
  always:
    - "--hd"
    - "--style raw"
  aspect_ratio_by_subject_type:
    character: "--ar 9:16"
    prop: "--ar 3:2"
    scene: "--ar 16:9"
  final_order:
    - "style_preset"
    - "aspect_ratio"
    - "--hd"
    - "--style raw"

