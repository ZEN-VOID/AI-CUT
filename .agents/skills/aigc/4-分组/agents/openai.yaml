interface:
  display_name: "AIGC 分组"
  short_description: "将逐集摄影稿切成带风格投影、站位位移、补位画面和统计的完整分镜组。"
  default_prompt: "使用 $aigc-grouping，把 projects/aigc/<项目名>/3-摄影/第N集.md 按真实集-场-组切成完整分镜组，投影 0-初始化/north_star.yaml 的全局风格.全局风格提示词、类型元素.类型元素提示词、细分风格.画面风格，以隐藏标题字段的三行纯内容写入组头；其中第 1 行全局风格必须以“视频生成的画面风格，光影和氛围与场景参照图保持一致。不生成文字字幕和BGM，仅生成物理互动音效与环境和氛围音效。”开头，再接全局风格原词；不要输出独立“空间锚点：”字段，只把空间参照内化到首次锁定或发生变化的分镜明细下方的“站位和位移：”，且站位和位移主语必须是明确角色名，不使用“画面主体”“主体”“人物”“角色”“主角”等模糊指代；涉及多角色时必须明确前后、左右、内外、近远或动作先后的顺位关系；站位和位移必须能由当前分镜原文、上一分镜状态或入场/出场补位画面连续推导，不得为了造句新增无证据移动；连续多个分镜站位和位移完全不变时，仅需首次固定，无需重复出现在每个分镜头；每集首组省略入场画面段，第 2 组起添加入场画面和出场画面，输出到 projects/aigc/<项目名>/4-分组/第N集.md。"
