name: aigc-cinematography-style
version: 1
description: AIGC 影片项目摄影风格、构图运镜语法与连续性协议制定阶段。
entrypoint: .agents/skills/aigc/2-美学/摄影风格/SKILL.md
interface:
  display_name: AIGC 2-美学/摄影风格
  short_description: 从剧本、画面基调或参考图/视频提取摄影语法，制定构图、景别、机位/视角、透视/景深、焦点、运动连招和连续性规则
  default_prompt: "使用 $aigc-cinematography-style，基于 projects/aigc/<项目名>/1-分集/、2-美学/画面基调/全局风格协议.md 或我提供的参考资料，提取构图秩序、景别体系、机位关系/视角距离、透视/景深纪律、焦点行为、镜头运动、运动连招和连续性规则；若来源或目标明确为第N集，输出到 projects/aigc/<项目名>/2-美学/第N集/摄影风格/摄影风格协议.md，否则输出项目级基线 2-美学/摄影风格/摄影风格协议.md。最终 Cinematography Style Prompt 默认中文约 100 字，禁止剧情、角色、道具、场景和单镜头正文污染。"
runtime:
  required_context:
    - .agents/skills/aigc/2-美学/摄影风格/SKILL.md
    - .agents/skills/aigc/2-美学/摄影风格/CONTEXT.md
  default_output_root: projects/aigc/<项目名>/2-美学/
  scope_output_roots:
    episode_scoped: projects/aigc/<项目名>/2-美学/第N集/摄影风格/
    series_baseline: projects/aigc/<项目名>/2-美学/摄影风格/
  llm_first: true
