version: 1
module_id: watermoon-motion-continuity
module_level: leaf
branch_key: motion
leaf_key: continuity
purpose: 锁定人物状态、道具状态和动作承接不漂移。
triggers:
  - 上下拍存在明确状态延续
must_answer:
  - 上一拍留下了什么状态
  - 当前拍有没有接住
  - 哪个状态最容易被写丢
patch_contract:
  target_slot: motion_patch
  append_fields:
    - carried_state
    - continuity_warning
merge_policy:
  keep:
    - 情绪延续
    - 道具状态
  avoid:
    - 凭空重置
quality_gates:
  - 不得出现失忆式跳变

