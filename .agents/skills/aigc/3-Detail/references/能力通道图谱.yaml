ordered_passes:
  - 分镜构图
  - 角色表现
  - 氛围表现
  - 摄影表现
  - 运镜手法
  - 转场特效
  - 验收

pass_writes:
  分镜构图:
    writes:
      - groups[].detail.分镜数
      - groups[].detail.分镜列表.<分镜ID>.时间
      - groups[].detail.分镜列表.<分镜ID>.剧本正文
      - groups[].detail.分镜列表.<分镜ID>.主体锚定
      - groups[].detail.分镜列表.<分镜ID>.分镜构图
    knowledge_inputs:
      primary:
        - .agents/skills/aigc/3-Detail/references/电影学院派知识接线.md
        - knowledge-base/电影学院派/导演手册/电影导演方法.md
        - knowledge-base/电影学院派/导演手册/电影导演技术.md
        - knowledge-base/电影学院派/分镜脚本/电影镜头设计.md
        - knowledge-base/电影学院派/分镜脚本/电影镜头语法.md
      translation_focus:
        - 戏剧单元
        - 方向线索
        - 观看任务
        - 镜头切分
    quality_gate:
      - 先锁镜数，再写审美
      - 构图必须服务剧情切分
      - 方向、视线和主体关系必须可解释
  角色表现:
    writes:
      - groups[].detail.分镜列表.<分镜ID>.角色表现
    knowledge_inputs:
      primary:
        - knowledge-base/电影学院派/导演手册/电影导演方法.md
        - knowledge-base/电影学院派/导演手册/一流对话场景.md
      translation_focus:
        - 角色目标
        - 障碍与反应
        - 对白压强
    quality_gate:
      - 动作戏不写机位
      - 内心戏必须可被外化感知
      - 对话戏不复述台词
  氛围表现:
    writes:
      - groups[].detail.分镜列表.<分镜ID>.氛围表现
    knowledge_inputs:
      primary:
        - knowledge-base/电影学院派/导演手册/电影导演方法.md
        - knowledge-base/电影学院派/电影摄影/影像的创造.md
        - knowledge-base/电影学院派/电影摄影/摄影创作技法.md
      translation_focus:
        - 空间层次
        - 负空间
        - 物象承情
    quality_gate:
      - 先有空间承载，再有形容词
      - 必须能说清氛围由什么可见条件生成
  摄影表现:
    writes:
      - groups[].detail.分镜列表.<分镜ID>.摄影表现
    knowledge_inputs:
      primary:
        - knowledge-base/电影学院派/电影摄影/影像的创造.md
        - knowledge-base/电影学院派/电影摄影/摄影创作技法.md
        - knowledge-base/电影学院派/分镜脚本/电影镜头技术.md
      translation_focus:
        - 光源动机
        - 影调对比
        - 色彩关系
        - 质感显影
    quality_gate:
      - 光影、色彩、质感都服务当前戏
      - 不写器材炫技，不抢构图骨架
  运镜手法:
    writes:
      - groups[].detail.分镜列表.<分镜ID>.运镜手法
    knowledge_inputs:
      primary:
        - knowledge-base/电影学院派/导演手册/电影导演技术.md
        - knowledge-base/电影学院派/分镜脚本/电影镜头调度.md
        - knowledge-base/电影学院派/分镜脚本/电影镜头语法.md
      translation_focus:
        - 机位路径
        - 视线引导
        - 运动与动作配合
    quality_gate:
      - 不改镜数
      - 不改镜级正文
      - 镜头运动必须服务观看任务
  转场特效:
    writes:
      - groups[].detail.分镜列表.<分镜ID>.转场特效
    knowledge_inputs:
      primary:
        - knowledge-base/电影学院派/导演手册/电影导演方法.md
        - knowledge-base/电影学院派/分镜脚本/电影镜头语法.md
      translation_focus:
        - 桥梁镜头
        - 释放镜头
        - 重复画面
    quality_gate:
      - 只有必要时才写
  验收:
    writes:
      - validation-report.md
    knowledge_inputs:
      primary:
        - .agents/skills/aigc/3-Detail/references/创作评审标尺.md
        - .agents/skills/aigc/3-Detail/references/电影学院派知识接线.md
      translation_focus:
        - 知识有没有被有效转译
    quality_gate:
      - 可复验

required_before_projection:
  - 分镜构图
  - 角色表现
  - 氛围表现
  - 摄影表现
  - 运镜手法
  - 转场特效

forbidden_overlap:
  角色表现:
    - 镜头术语
    - 光影判断
  氛围表现:
    - 角色心理总结
    - 机位判断
  摄影表现:
    - 改写动作事实
    - 改写镜级正文
  运镜手法:
    - 改写镜数
    - 改写分镜正文
  转场特效:
    - 提前抢戏

academy_usage_rules:
  - 优先先判问题，再选知识包
  - 学院派知识必须回译为当前字段对象
  - 不得把教材术语直接当字段值
