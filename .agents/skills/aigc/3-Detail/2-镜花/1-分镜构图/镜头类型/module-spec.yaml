version: 1
module_id: jinghua-shot-type
module_level: leaf
purpose: 在已锁 `composition_skeleton + shot_size_rhythm_preview` 的前提下，确定 POV、观看姿态、镜头角度家族与特殊关系镜头，让这组镜头“怎么被看、为什么这样看”稳定下来。
triggers:
  - 已存在 `composition_skeleton`
  - 已存在 `shot_size_rhythm_preview`
  - 需要锁 POV、镜头角度、镜头类型与 focus/spatial logic
must_answer:
  - "这组当前最核心的戏剧任务是什么：放大力量、压弱角色、保持克制观察、带人物进入空间、进入主观、建立对话权力关系，还是制造失衡与危险"
  - 这组更适合旁观、贴身、主观、压视、窥视还是其他观看姿态
  - "该任务更适合哪类镜头角度：低角度、高角度、侧面、背身、顶视、过肩、POV，还是以荷兰角作为失衡修饰"
  - POV 应站在哪一边，是否允许局部偏置
  - 是否需要建立 `过肩 -> POV` 的连续链路，或保留背身/侧面来维持克制与未知
  - "`镜头类型` 叶子应如何锁定并协调 `镜头类型 / 镜头框架 / 镜头视角` 等专门镜头概念"
  - "`景别 / 镜头框架 / 镜头类型 / 镜头视角` 这些 descriptor 槽位怎样锁住"
  - "当外部 brief 使用 `zoom out / close-up / wide shot / off-center` 这类总称时，当前叶子如何做 descriptor 协调，而不越权重写 `景别景深 / 构图形式` 的主判断"
  - 当前组的 focus/spatial logic 如何让后续摄影、运镜直接承接
  - 字段名叫 `镜头类型`，但本叶子同时负责锁定 `镜头框架 / 镜头视角 / 观看姿态`，不指摄影器材型号
patch_contract:
  target_slot: shot_descriptor_lock
  required_elements:
    - pov_strategy_preview
    - shot_descriptor_lock
    - focus_spatial_logic
    - viewing_stance_note
  required_subslots:
    pov_strategy_preview:
      - dramatic_task
      - viewing_stance
      - pov_side
      - spectator_position
    shot_descriptor_lock:
      - dramatic_angle_family
      - special_relation_frame
      - angle_emotion_payload
      - descriptor_combo
      - combination_policy
      - owner_ref
    focus_spatial_logic:
      - focus_owner
      - spatial_pressure_axis
      - reveal_conceal_rule
merge_policy:
  preserve_first:
    - readable POV
    - dramatic angle fit
    - descriptor coherence
    - relation readability
    - viewing stance stability
    - downstream compatibility
  trim_first:
    - 把镜头类型写成器材
    - 把镜头类型写成运镜路线
    - 用“电影感 / 故事感 / 有戏”替代角度判断
    - 把 descriptor 留给后续临场猜测
quality_gates:
  - 必须依附 `composition_skeleton + shot_size_rhythm_preview`
  - 必须先回答戏剧任务，再回答角度家族
  - 必须完成 POV、观看姿态与 descriptor 锁定
  - "`镜头类型` 必须覆盖 `镜头类型 / 镜头框架 / 镜头视角` 等镜头概念的收束"
  - 低/高/侧/背/顶/过肩/POV/荷兰角的选择必须能回指角色状态、情绪落点或叙事站位
  - 荷兰角默认是失衡修饰，不得被当作泛用“酷炫角度”
  - 若使用 `过肩`，必须明确它服务哪一组关系阅读；若使用 `POV`，必须明确由谁看见什么
  - "`close-up / wide / zoom out` 的主判断归 `景别景深`，`off-center` 的主判断归 `构图形式`；当前叶子只负责与 POV、角度、descriptor 协调"
  - 不得把镜头类型模块写成摄影机型号、镜头焦段或运动方式
  - 不得越权写光影、色彩、器材和运镜
  - 不得只写“故事感 / 电影感 / 有压迫感”而不给出角度与关系依据
  - 若 descriptor 仍模糊，不得进入最终汇流
