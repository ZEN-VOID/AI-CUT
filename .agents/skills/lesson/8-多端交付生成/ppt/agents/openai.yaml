interface:
  display_name: "课程 PPT 课件交付"
  short_description: "生成课程 PPT/PowerPoint 交付计划、讲者备注与组装 manifest"
  default_prompt: "Use $lesson-delivery-ppt when the user asks for PowerPoint, PPT, PPTX, slides, slide deck, courseware artifact, instructor presentation, workshop deck, or speaker notes under `projects/lesson/<项目名>/8-多端交付生成/ppt/`. Load SKILL.md and CONTEXT.md, audit the parent lesson-delivery ppt packet, design the slide deck structure, adapt course content with LLM-first judgment, and write ppt-delivery-plan.md and ppt-assembly-manifest.json when project-bound. When actual PPTX/courseware artifact generation, redesign, polish, export, or browser verification is requested, load .agents/skills/claude-design/SKILL.md and .agents/skills/claude-design/CONTEXT.md for artifact execution and require artifact_paths, writeback_status, selected_modules, visual_system, verification/export evidence, and quality_verdict. Scripts may only do PPT formatting, assembly, validation, export, and manifest writeback."
