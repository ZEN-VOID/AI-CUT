version: 1
module_id: jinghua-camera-stage
module_level: branch
stage_order: serial_after_shot_composition
branch_key: camera
purpose: 在已稳定的 shot spine 上补齐镜头变化、组合与速度，先形成默认叙事运镜，再按需比较同目标挑战变体，让观看路径更有组织。
reference_paths:
  - 3-运镜手法/references/电影镜头调度-运镜判型.md
canonical_writeback:
  local_assembly_slot: camera_patch
  final_field: 运镜手法
  rule: camera_patch 只允许作为 branch sidecar 内的局部装配槽位，最终项目级业务真相必须投影为 `分镜明细[].运镜手法`
child_modules:
  - path: 3-运镜手法/变化/module-spec.yaml
  - path: 3-运镜手法/组合/module-spec.yaml
  - path: 3-运镜手法/速度/module-spec.yaml
triggers:
  - 已存在 `shot_spine_patch`
  - 当前组需要更强的观看路径或情绪推进
  - "`cinematography_patch` 若已存在，只能作为兼容性 side input"
  - "`academy_hit_note` 若含运动提示，只能在默认路线成立后作为 side input"
movement_families:
  - 静镜内调度
  - 伴行跟随
  - 揭示转框
  - 逼近退让
  - 横移对角弧线
  - 失衡与转折
must_answer:
  - 这些运镜是在放大 `水月` 的哪条动作、情绪或视线变化
  - 默认叙事路线是静止、最小必要运动还是某种明确移动方式，为什么
  - 默认路线属于哪个运动家族，为什么不是另一个家族
  - 镜头为什么要动或不动，上游已转译的运动提示哪些值得吸收、哪些应放弃
  - 焦段、遮挡、反射、纵深与空间轴线对当前路线是加成还是阻碍
  - 镜头之间怎样衔接最稳，且不打乱观看主语与信息顺序
  - 节奏快慢与变速如何影响观众感受，且如何与 `运镜手法` 分工
  - 是否存在不偷换表现目标的更强变体；若存在，是否只适合作为挑战对照
patch_contract:
  target_slot: camera_patch
  required_elements:
    - movement_variation
    - shot_combination
    - speed_profile
merge_policy:
  execution_mode: leaf_serial_branch_serial
  combine_order:
    - 变化
    - 组合
    - 速度
  preserve_first:
    - default narrative route
    - single motion family
    - narrative motivation
    - absorbable motion hints only
    - lens-space compatibility
    - readable viewing flow
    - rhythm clarity
  trim_first:
    - 无动机运动
    - 借上游提示重做镜头设计
    - 纯炫技组合
    - 挑战案覆盖默认路线
quality_gates:
  - 无叙事或情绪收益时默认静镜优先
  - 运镜不能创造 `水月` 未给出的新动作节点
  - 默认路线必须先落到单一运动家族，再允许 `变化 / 组合 / 速度` 展开
  - 运镜只处理运动路径、视角跟随、揭示方式与速度变化，不得重写构图、景别、空间轴线与表演主任务
  - 上游已转译的运动提示只能增强当前路线，不得变成第二次镜头重设计
  - 焦段、前景遮挡、反射和纵深只作为兼容性 side input，不得升级为第二设计真源
  - 若 `cinematography_patch` 已存在，运镜不得打乱其既有摄影基调；若尚未产出，也不得预设会由摄影分支补救阅读问题
  - "`运镜手法` 回答“怎么动”，`镜头速度` 回答“动多快/如何变速”，两者不得互相吞并"
  - 组合关系必须能被剪辑承接
  - 同目标挑战变体只能作为对照，收益说不清时不得进入最终默认 patch
  - camera_patch 不得外溢为第二真源；最终写回字段必须是 `运镜手法`
