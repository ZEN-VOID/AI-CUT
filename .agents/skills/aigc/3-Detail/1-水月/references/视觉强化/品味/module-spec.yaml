version: 1
module_id: watermoon-visual-taste
module_level: leaf
branch_key: visual
leaf_key: taste
purpose: 压住俗艳和堆词，把“好看”改写成更耐看的可见细节。
triggers:
  - 文本出现泛滥形容词或虚高表达
must_answer:
  - 哪些词太满、太俗、太硬
  - 哪个具体细节能替代它
  - 当前表达是否仍贴合项目风格温度
patch_contract:
  target_slot: visual_patch
  append_fields:
    - replaced_phrase
    - concrete_detail
    - style_alignment
merge_policy:
  keep:
    - 具体细节
  avoid:
    - 高级感/电影感式空词
quality_gates:
  - 每次收束至少替换一类空泛夸饰

