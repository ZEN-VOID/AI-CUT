interface:
  display_name: "AIGC 2-Global"
  short_description: "以单技能知行合一方式围绕 `.agents/skills/aigc/2-Global/_shared/episode_root.json` 直写 `2-Global/episode_root.json`，支持完整首写、增量 patch 与 derived-only compat 投影。"
  default_prompt: "Use $aigc-global to read the current episode grouping plus init presets, treat `.agents/skills/aigc/2-Global/_shared/episode_root.json` as the only fill template, and run the stage in one thinking-action network: lock mode (`episode-bootstrap`, `incremental-patch`, or `compatibility-projection`), synthesize project-level and group-level fields, patch `projects/aigc/<项目名>/2-Global/episode_root.json`, then write `projects/aigc/<项目名>/2-Global/validation-report.md` plus a short thought summary. If project-root `team.yaml` enables `roles.supervision`, consume that role only as pre-draft advisory; do not run post-write supervision refine from this stage contract. Compatibility Markdown files, if needed, must only be derived from the confirmed JSON."
