version: 1
module_id: watermoon-character-branch
module_level: branch
branch_key: character
purpose: 把人物心理、行为和关系收束成单一 `character_patch`，服务 `beat_patches[]` 中的 factual 字段，而不是生成第二份正文。
child_modules:
  - path: references/角色表现/内心戏/module-spec.yaml
  - path: references/角色表现/动作戏/module-spec.yaml
  - path: references/角色表现/对手戏/module-spec.yaml
triggers:
  - 分镜组存在明确角色或关系张力
  - 固定 `剧本正文` 窗口中有人物行动或对话
must_answer:
  - 谁在承压，谁在主动
  - 人物最可见的露馅点是什么
  - 人物关系如何通过行为变化成立
patch_contract:
  target_slot: character_patch
  required_elements:
    - visible_emotion_signal
    - action_intent
    - relation_shift
merge_policy:
  combine_order:
    - 内心戏
    - 动作戏
    - 对手戏
  preserve_first:
    - 角色个性
    - 行为目的
    - 关系攻守
  trim_first:
    - 抽象心理解释
    - 关系说明句
quality_gates:
  - 不得写成泛情绪标签
  - 不得越权定义空间调度
  - 必须能直接被演员、镜头或父层 merge 消费
  - 不得把角色分析写成独立 prose 或人物小传
