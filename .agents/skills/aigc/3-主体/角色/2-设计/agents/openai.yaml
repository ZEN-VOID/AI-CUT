schema_version: 1
interface:
  display_name: "AIGC 角色细目设计"
  short_description: "从角色清单扩展单角色设计稿，融合项目风格与初始化综合。"
  default_prompt: "使用 $aigc-design-character-detail，从 projects/aigc/<项目名>/3-主体/角色/1-清单/角色清单.md 读取角色，并结合 2-美学/类型风格.md、2-美学/画面基调/全局风格协议.md、当前集优先/项目级回退的 2-美学/角色风格/角色风格协议.md 与项目 MEMORY.md，为每个角色输出纯色背景全身定妆照到 3-主体/角色/2-设计/C###-<角色名>.md；同一角色的多服装、战斗、战损、受伤、少年、老年、伪装等使用 C###-V##-<角色名>-<变体名>.md 作为变体稿，记录 base_subject_id、variant_id、identity_invariants 和 variant_state_delta，不得生成新的 base character；不得调用 team 身份、解析旧 stage profile 或补造顾问问答；角色设计要强化来源匹配的容貌、妆发、骨相、身形、服装审美和整体气质，按清单证据、年龄、性别/性别表达、身份、物种/族群、项目调性和角色权重选择审美路线，主角/核心情感线/长期复用角色必须具备 lead_beauty_handsomeness_floor=required 的帅哥/美女/主角级好看证据，并具备 lead_presence_temperament_floor=required 的整体气质、主角感、精神状态和镜头存在感证据，主角/核心情感线/长期复用角色/大反派/主要对抗者/长线威胁/终局 Boss 必须具备 charisma_floor=high 的可见镜头魅力证据，普通正反派和功能角色都有个性魅力或可识别度；必须显式裁决身高档位/安全范围、身形结构、比例重心、发型长度/体量/轮廓/时代职业适配、服装主色/辅色/点缀色和配色逻辑，不得只写高挑、修长、黑发、深色衣服等泛词；摄影和英文 prompt 必须保持清晰五官、骨相、肤色层次和表情意图，阴郁/危险/压迫感用受控侧光、轮廓光或局部眼尾压暗表达，不得用重阴影、半脸阴影或低调剪影遮脸；命中审美强化/妆容化/角色类型语料/服装时代语境时加载 knowledge-base/character-design-corpus.md 并留下 corpus_usage_trace；真实人物灵感默认不用或泛化处理，只有用户/项目允许且有必要时才可原创转译，不得精确复刻；服装可风格化但不得脱离时代、地域、阶层和职业母体，磨损/污渍/补丁/做旧只在有依据时出现；## 4. 解构 下方直接写 主体ID号：<asset_id>，默认稿 asset_id=base_subject_id，变体稿 asset_id=variant_id，并与文件名前缀、## 5. 提示词设计 主体 ID 和英文 prompt 开头一致；英文 prompt 以 asset ID 号开头，整合 ## 4. 解构 全部有效信息，控制在 1300 characters 内，使用自然语言负向约束，不使用 --no，不置身场景。"
metadata:
  skill_id: "aigc-design-character-detail"
  governance_tier: "full"
  output_root: "projects/aigc/<项目名>/3-主体/角色/2-设计"
