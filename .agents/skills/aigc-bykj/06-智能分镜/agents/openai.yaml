interface:
  display_name: "BYKJ 06 智能分镜"
  short_description: "承接 BYKJ 03/04/05 输出，整合原 AIGC 5-摄影与 6-分组能力，生成 JSON-first 分镜、生产组和组间连接件。"
  default_prompt: "使用 $aigc-bykj-smart-storyboard，基于我指定的 output/[项目名]/03-智能分集/、04R/04 全局预设和 05R/05 资产 JSON，整合原 AIGC 5-摄影与 6-分组细部模块，生成 output/[项目名]/06-智能分镜/ 下的 分镜总表.json、镜头列表.json、生产组索引.json、桥接连接件.json、分镜报告.json 和 manifest.json。"
