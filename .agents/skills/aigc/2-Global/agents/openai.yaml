interface:
  display_name: "AIGC 2-Global"
  short_description: "用单技能并发链先定稿四份 Markdown 与 shared episode root，再在 team.yaml 启用时按监制 subagents 做 stage-end refine"
  default_prompt: "Use $aigc-global to read the current episode grouping plus init presets, run the internal global-style, type-guidance, and director-intent capability chains with a convergence gate, confirm the Markdown fields first, then write or refresh `全局风格.md`、`导演意图.md`、`全集类型元素.md`、`分组类型元素.md`, decide each group's fixed `分镜切换` as one concrete number, internalize former `镜花/1-切换` fixed-shot-count acceptance logic into the stage-end distill step, extract all confirmed seed fields into the shared episode root, and after canonical outputs exist, if project-root `team.yaml` enables `roles.supervision`, resolve reviewer skills and run stage-end supervision subagents to review and minimally refine the written outputs before final handoff."
