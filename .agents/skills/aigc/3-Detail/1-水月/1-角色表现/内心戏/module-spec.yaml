version: 1
module_id: watermoon-character-inner
module_level: leaf
branch_key: character
leaf_key: inner_drama
purpose: 参照共享 `角色表现` 细则，把隐性压力、掩饰和潜台词转成可被镜头读出的身体与神态信号。
triggers:
  - 人物有压抑、犹豫、掩饰、失守
  - 当前桥段的情绪重量主要来自“嘴在说什么，身体在说什么”
must_answer:
  - 角色在压住什么
  - 哪个身体部位最先露馅
  - 这个露馅点如何推动下一拍
  - 当嘴巴在维持表层状态时，身体哪一处在说真话
patch_contract:
  target_slot: character_patch
  append_fields:
    - hidden_pressure
    - visible_tell
    - emotional_aftershock
    - subtext_micro_signal
merge_policy:
  keep:
    - 眼神
    - 呼吸
    - 嘴角/肩颈/手部微动作
    - 潜台词外显
  avoid:
    - 纯心理说明
    - 大词情绪结论
quality_gates:
  - 至少有一个可拍微动作
  - 不得只写“紧张/悲伤/愤怒”
  - 不得只写内心解释而缺少“身体说真话”的信号
