interface:
  display_name: "AIGC 分镜"
  short_description: "从 6-氛围或指定文稿生成逐集内联分镜稿，保留原文并注入镜头清单。"
  default_prompt: "使用 $aigc-storyboard-split，默认读取 projects/aigc/<项目名>/6-氛围/第N集.md；如用户指定文稿则以指定文稿为 source。必须结合 projects/aigc/<项目名>/3-美学/画面基调/全局风格协议.md 与 3-美学/分镜风格/分镜风格协议.md，先理解题材、情节、剧本正文、画面基调、大师/作品参照和分镜风格，再逐个画面点内联注入分镜列表。画面点包括 画面、动作画面、对白画面、音效画面、旁白画面、系统画面、心理反应、表演提示、氛围画面 等。每条输出格式为 分镜N（N-N秒）：景别，景深，构图形式，主体陪体背景描述。分镜数量由画面节拍法决定，时长按短剧 AIGC 时值规则量化，字段内和字段间保持连续性。不改剧情事实、对白、场景顺序或上游字段标题，不生成图像 prompt、视频请求或设备参数。"
