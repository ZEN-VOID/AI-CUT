interface:
  display_name: "AIGC 2-Global"
  short_description: "像 `3-Detail` 一样围绕 `.agents/skills/aigc/2-Global/_shared/episode_root.json` 直接填好 `2-Global/episode_root.json`，并在 team.yaml 启用时做 stage-end refine"
  default_prompt: "Use $aigc-global to read the current episode grouping plus init presets, treat `.agents/skills/aigc/2-Global/_shared/episode_root.json` as the only fill template, write project-level and group-level fields directly into `projects/aigc/<项目名>/2-Global/episode_root.json`, then write `projects/aigc/<项目名>/2-Global/validation-report.md`; if project-root `team.yaml` enables `roles.supervision`, resolve reviewer skills and run stage-end supervision subagents to review and minimally refine the written canonical outputs before final handoff. Compatibility Markdown files, if needed, must only be derived from the confirmed JSON."
