version: 1
module_id: jinghua-shot-composition-stage
module_level: branch
stage_order: 1
branch_key: shot_composition
purpose: 直接承接 `2-Global` 已内化的固定 `分镜切换`，先完成 `watermoon_inheritance + shot_count_plan + shot_slot_map`，再串行吸收 `构图形式 -> 景别景深 -> 镜头类型` 三个叶子，形成稳定的 group-level shot spine。
child_modules:
  - path: 1-分镜构图/构图形式/module-spec.yaml
  - path: 1-分镜构图/景别景深/module-spec.yaml
  - path: 1-分镜构图/镜头类型/module-spec.yaml
triggers:
  - shared root 中已存在固定 `剧本正文`
  - shared root 中已存在固定 `分镜切换`
  - 需要把组内窗口进一步变成可 merge 的 shot spine
must_answer:
  - 这组镜头语言承接了固定 `剧本正文`、shared root `分镜切换` 与 `水月` sidecar 的哪条主动作、主情绪或主空间关系
  - 既定 `分镜切换` 在当前组应如何直接落成真实镜窗与时间段
  - 每一镜应回指 `剧本正文` 的哪个窗口与锚点
  - 每镜的主体、陪体、背景三层关系，空间锚点、镜头轴线与主体几何关系是否成立
  - 当前段落的景别曲线、空间纳入/压缩偏置、景深层级、视觉焦点与心理距离应如何服务 `叙事内核 / Current Mission / 情绪引导`
  - 当前段落更适合哪种 POV 立场、镜头角度家族（低/高/侧/背/顶/过肩/POV/荷兰等）、descriptor 组合与观看姿态
  - "`镜头类型` 叶子应如何锁 POV、观看姿态与 `镜头类型 / 镜头框架 / 镜头视角` 等 descriptor 组合，并把角度任务回指到角色状态、情绪落点或叙事站位"
patch_contract:
  target_slot: shot_spine_patch
  required_elements:
    - watermoon_inheritance
    - shot_count_plan
    - shot_slot_map
    - composition_skeleton
    - shot_size_rhythm_preview
    - pov_strategy_preview
    - shot_descriptor_lock
    - focus_spatial_logic
merge_policy:
  execution_mode: leaf_serial_branch_serial
  branch_prelude:
    - 回收 `水月` 承接
    - 继承固定镜数
    - 锁 `shot_slot_map`
  combine_order:
    - 构图形式
    - 景别景深
    - 镜头类型
  postprocess:
    - 汇流 `focus_spatial_logic`
    - 收束组级 shot spine
    - 准备后续三支可承接的构图基线
  preserve_first:
    - group conflict axis
    - action continuity
    - readable slot mapping
    - spatial geometry coherence
    - shot size rhythm readability
    - descriptor slot coherence
  trim_first:
    - 只会切句的机械 slot
    - 把摄影/运镜词塞进构图层
    - 把景深写成器材参数
    - 把镜头类型写成摄影机型号
quality_gates:
  - 未形成 `watermoon_inheritance + shot_count_plan + shot_slot_map` 前不得进入叶子串行
  - former `1-切换` 的 fixed-shot-count 接受逻辑已上收 `2-Global`；当前模块不得再生成第二份切换真源
  - "`构图形式` 只回答空间几何、主陪背景、轴线与 frame task，不得提前写摄影或运镜语汇"
  - "`景别景深` 必须完成景别曲线、空间偏置、景深层级、视觉焦点、景框开闭与心理距离预判，不得只留“后面再看”"
  - "`镜头类型` 必须先锁戏剧任务，再锁 POV、观看姿态、角度家族与 descriptor 槽位，不得把该叶子写成器材或运镜方案"
  - "`景别 / 镜头框架 / 镜头类型 / 镜头视角` 这些镜头描述子槽必须在 Stage-1 锁定，不得把 descriptor 选择留给下游临场决定"
  - "`tail-hook` 或下一组预映首拍默认只计入 `hook_preview_count`，不得自动折成当前组独立镜头"
  - 不得因为 slot 映射而改写固定 `剧本正文`
  - 每个分镜决策都必须能回指到 `剧本正文` 或 `水月` 的原始信息
  - 不得直接越权写摄影、运镜或转场的细节
