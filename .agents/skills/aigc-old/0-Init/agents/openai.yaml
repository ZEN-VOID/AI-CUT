interface:
  display_name: "AIGC 影片/电影项目初始化"
  short_description: "初始化影片、电影、影视或视频类 AIGC 项目，并锁定顾问组队、北极星与下一入口。"
  default_prompt: "Use $aigc-init when the user says 初始化影片, 初始化电影, 初始化影视, 初始化视频项目, new film project, or movie/video project kickoff. Initialize or reinitialize an AIGC film/video project with smart_advisor mode under `projects/aigc/<项目名>/`, lock either auto or custom team lineup from `.agents/skills/team/`, write the init team manifest to `team.yaml`, run planning-role direct-answer packets with real subagents, then synthesize north_star, init_handoff, story-source-manifest, team, STATE, and optional governance carriers with one next-stage recommendation. If the user says 初始化小说, 初始化网文, new novel, book, or story2026 project, route to $story-init instead."
