version: 1
module_id: watermoon-character-branch
module_level: branch
branch_key: character
purpose: 把人物心理、行为和对白发法收束成单一 `character_patch`，优先服务 `分镜明细[].角色表现`，而不是生成第二份正文。
child_modules:
  - path: 1-角色表现/内心戏/module-spec.yaml
  - path: 1-角色表现/动作戏/module-spec.yaml
  - path: 1-角色表现/对话戏/module-spec.yaml
triggers:
  - 分镜组存在明确角色或关系张力
  - 固定 `剧本正文` 窗口中有人物行动或对话
must_answer:
  - 谁在承压，谁在主动
  - 人物最可见的露馅点是什么
  - 当前拍是否存在明确对白或话轮攻守
  - 若命中对话戏，当前对白是否已经形成可被镜头消费的压强几何
patch_contract:
  target_slot: character_patch
  required_elements:
    - visible_emotion_signal
    - action_intent
    - dialogue_presence_note
merge_policy:
  combine_order:
    - 内心戏
    - 动作戏
    - 对话戏
  preserve_first:
    - 角色个性
    - 行为目的
    - 对白发法
    - 可被镜头消费的对白压强信号
  trim_first:
    - 抽象心理解释
    - 关系说明句
quality_gates:
  - 不得写成泛情绪标签
  - 不得越权定义空间调度
  - 必须能直接被演员、镜头或父层 merge 消费
  - 不得把角色分析写成独立 prose 或人物小传
  - 无明确对白时不得强行补 `对话戏`
  - 若对话戏承担主链，必须先落成演员/空间压强信号，再把具体镜头裁决留给 `运镜手法`
