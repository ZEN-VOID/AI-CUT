version: 1
canonical_owner: ".agents/skills/story/review/_shared/validation-dimension-registry.yaml"
purpose: "review 维度、drafting 即时审计 hook、终验 mandatory 规则的单一真源"
execution_provider:
  default_skill: "/Users/vincentlee/.codex/skills/meta/构建/架构/code-reviewer/SKILL.md"
  mode: "background-window"
  ownership: "child skills define spec; code-reviewer executes audit; review aggregates and routes repair"
policies:
  drafting_inline:
    step_failure_order:
      - "优先在当前 step 本地修复后重跑当前 hook"
      - "若 issue 指向更早 step，则回退到最早受影响 step 并从该 step onward 重跑"
      - "若 issue 指向 source_layer_owner=0-初始化|1-设定|2-卷章，则立即停止 drafting，转 source-contract 修复"
    candidate_final_gate: "8-润色完成且该 step 对应 inline hooks 全部通过"
  final_acceptance:
    final_pass_gate: "仅当 review 聚合 JSON 判定 PASS 时，当前章才算 validated final draft"
dimensions:
  - role_id: "structure-validator"
    dimension: "structure"
    skill_path: ".agents/skills/story/review/结构兑现"
    scope: "卷级结构义务、promise delivery、dramatic realization"
    objective: "确认正文兑现了卷/章规划承诺，而不是只有事件发生"
    method: "读取 planning obligations、正文快照与兑现证据，输出结构问题与返工入口"
    report_filename: "结构兑现.md"
    final_acceptance:
      mandatory: true
      weight: 0.16
    drafting_inline:
      enabled: true
      checkpoints:
        - step_id: "1-单章叙事起盘"
          fail_action: "block_and_rewrite_current_or_earliest"
        - step_id: "7-追读力强化"
          fail_action: "rewind_to_earliest_rework_step"
        - step_id: "8-润色"
          fail_action: "regression_guard"
    default_rework_targets:
      - "1-单章叙事起盘"
      - "7-追读力强化"
    upstream_source_owners:
      - "2-卷章"
  - role_id: "continuity-validator"
    dimension: "continuity"
    skill_path: ".agents/skills/story/review/连续性"
    scope: "承接点、转场质量、threads 连续性"
    objective: "确认卷内章节承接不断带，关键转场有自然牵引，压力线不凭空消失"
    method: "比对 continuity matrix、前序停点与当前正文，定位断带章节，并检查转场是否由感知触发物、人物动作/对白、光影/声音或任务压力牵引"
    report_filename: "连续性.md"
    final_acceptance:
      mandatory: true
      weight: 0.14
    drafting_inline:
      enabled: true
      checkpoints:
        - step_id: "1-单章叙事起盘"
          fail_action: "block_and_rewrite_current_or_earliest"
        - step_id: "2-节奏优化"
          fail_action: "block_and_rewrite_current_or_earliest"
        - step_id: "8-润色"
          fail_action: "regression_guard"
    default_rework_targets:
      - "1-单章叙事起盘"
      - "2-节奏优化"
    upstream_source_owners: []
  - role_id: "logic-validator"
    dimension: "logic"
    skill_path: ".agents/skills/story/review/逻辑自洽校验"
    scope: "因果链、设定规则、例外成本、source truth 冲突"
    objective: "优先发现上游真源冲突，而不是默认把锅甩给 drafting"
    method: "对照 cards/planning/init truth 与正文行为链，输出逻辑冲突和 source owner"
    report_filename: "逻辑自洽校验.md"
    final_acceptance:
      mandatory: true
      weight: 0.14
    drafting_inline:
      enabled: true
      checkpoints:
        - step_id: "1-单章叙事起盘"
          fail_action: "block_and_rewrite_current_or_route_source_fix"
        - step_id: "4-角色形象刻画"
          fail_action: "rewind_to_earliest_rework_step"
        - step_id: "8-润色"
          fail_action: "regression_guard"
    default_rework_targets:
      - "1-单章叙事起盘"
    upstream_source_owners:
      - "1-设定"
      - "2-卷章"
  - role_id: "character-validator"
    dimension: "character"
    skill_path: ".agents/skills/story/review/人物一致性"
    scope: "人物行为、动机、关系压力、声口、社会身份语言与弧线"
    objective: "确认角色仍按 cards/planning 压力场在行动和说话，而不是只剩功能性对白或割裂式声口"
    method: "对照角色卡、关系线、身份背景与正文表现，输出行为失真、声口漂移、社会身份语言错位与修复建议"
    report_filename: "人物一致性.md"
    final_acceptance:
      mandatory: true
      weight: 0.16
    drafting_inline:
      enabled: true
      checkpoints:
        - step_id: "4-角色形象刻画"
          fail_action: "block_and_rewrite_current_or_earliest"
        - step_id: "5-对白优化"
          fail_action: "block_and_rewrite_current_or_earliest"
        - step_id: "6-心理活动描写"
          fail_action: "block_and_rewrite_current_or_earliest"
        - step_id: "8-润色"
          fail_action: "regression_guard"
    default_rework_targets:
      - "4-角色形象刻画"
      - "5-对白优化"
      - "6-心理活动描写"
    upstream_source_owners:
      - "1-设定"
  - role_id: "timeline-validator"
    dimension: "timeline"
    skill_path: ".agents/skills/story/review/时间线"
    scope: "时间锚、先后顺序、持续时长、伏笔窗口"
    objective: "确认时间推进可追溯，伏笔不会在错误窗口兑现"
    method: "读取时间线 pack 与正文时序信号，输出时序错位和规划层来源"
    report_filename: "时间线.md"
    final_acceptance:
      mandatory: true
      weight: 0.12
    drafting_inline:
      enabled: true
      checkpoints:
        - step_id: "1-单章叙事起盘"
          fail_action: "block_and_rewrite_current_or_earliest"
        - step_id: "2-节奏优化"
          fail_action: "block_and_rewrite_current_or_earliest"
        - step_id: "8-润色"
          fail_action: "regression_guard"
    default_rework_targets:
      - "1-单章叙事起盘"
      - "2-节奏优化"
    upstream_source_owners:
      - "2-卷章"
  - role_id: "task-convergence-validator"
    dimension: "task_convergence"
    skill_path: ".agents/skills/story/review/任务汇聚"
    scope: "支线是否从属主线、转挂去向、开放保留声明"
    objective: "避免卷内任务悬空或支线无故夺主"
    method: "读取任务层 planning 与正文任务去向，输出收束/转挂/开放 verdict"
    report_filename: "任务汇聚.md"
    final_acceptance:
      mandatory: true
      weight: 0.10
    drafting_inline:
      enabled: false
      checkpoints: []
    default_rework_targets:
      - "source-contract-fix"
      - "1-单章叙事起盘"
      - "7-追读力强化"
    upstream_source_owners:
      - "2-卷章"
  - role_id: "prose-style-validator"
    dimension: "prose_style"
    skill_path: ".agents/skills/story/review/文体读感"
    scope: "中文小说 prose、现场感、句群节奏、对白潜台词、心理暗流、AI 腔与模板化表达"
    objective: "确认正文不只是完成信息交付，而是真正具备成熟小说读感、场景质感和可持续阅读手感"
    method: "读取正文快照、style_gate、项目口味与 planning 压力，定位现场发现缺口、AI/说明腔、句群平均化、模板脸色反应和对白/心理扁平化"
    report_filename: "文体读感.md"
    final_acceptance:
      mandatory: true
      weight: 0.18
    drafting_inline:
      enabled: true
      checkpoints:
        - step_id: "3-场景和氛围渲染"
          fail_action: "block_and_rewrite_current_or_earliest"
        - step_id: "5-对白优化"
          fail_action: "block_and_rewrite_current_or_earliest"
        - step_id: "6-心理活动描写"
          fail_action: "block_and_rewrite_current_or_earliest"
        - step_id: "8-润色"
          fail_action: "regression_guard"
    default_rework_targets:
      - "3-场景和氛围渲染"
      - "5-对白优化"
      - "6-心理活动描写"
      - "8-润色"
    upstream_source_owners:
      - "0-初始化"
fast_extension_rule:
  add_or_adjust_dimension:
    - "先更新本 registry：role_id、skill_path、drafting_inline checkpoints、final_acceptance mandatory/weight"
    - "再新增或修改对应子技能包 `SKILL.md + CONTEXT.md`"
    - "若结构化字段变化，最后同步 `checker-output-schema.md`"
  no_silent_duplication:
    - "drafting step hooks 不允许在 7 个 child skill 中各自静默复制一份维度列表"
    - "review 父层与 3-初稿 父层都必须回指本 registry，而不是各自维护第二张路由表"
