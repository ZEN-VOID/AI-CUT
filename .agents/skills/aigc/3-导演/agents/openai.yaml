interface:
  display_name: "AIGC 导演"
  short_description: "在编剧稿基础上注入导演创作判断：戏剧内核、高潮画面、视觉美学、氛围意境、人物动作链和活人感行为动机。"
  default_prompt: "使用 $aigc-director，把 projects/aigc/<项目名>/2-编剧/第N集.md 升级为 projects/aigc/<项目名>/3-导演/第N集.md，注入编导内核、高潮画面、画面美学、整集视觉主轴、终结画面尾钩和氛围意境；关键场景必须给出活人感行为动机种子，说明角色当前小事、生活压力/目标/阻碍、下意识反应方向和情绪落点，多人场面明确谁行动谁反应；氛围、道具和受控增强必须先服从人物动作链、空间可达性和当前文本证据，不把示例硬编码成固定写法。"
