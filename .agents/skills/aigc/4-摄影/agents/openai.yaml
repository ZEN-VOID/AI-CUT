interface:
  display_name: "AIGC 摄影"
  short_description: "为逐集编导稿逐画面点注入短剧·AIGC 节奏下的动作链优先、动作-反应焦点分镜摄影。"
  default_prompt: "使用 $4-摄影，优先把 projects/aigc/<项目名>/3-运动/第N集.md 按画面句子逐条注入分镜明细；若用户明确跳过 3-运动，则回退读取 projects/aigc/<项目名>/2-编导/第N集.md。默认应用短剧·AIGC 时值压缩，必要时先形成内部段落级 sequence_profile 但保持每条分镜回指正上方画面点；每条涉及人物的分镜先承接姿态、站位、朝向、身体接触、动作方向和注意力落点，多人 beat 明确谁行动谁反应，其他人只维持必要背景状态；道具/环境切点必须通过准入，并执行源句复述扣除测试，输出到 projects/aigc/<项目名>/4-摄影/第N集.md，保留上游事实、对白和顺序。"
