    rule: "进入 `.agents/skills/team/导演组/李安/SKILL.md`；事实型问题先核对 `references/research/` 或联网来源，导演型问题必须输出一句导演判断、压抑来源、身体/空间方案、演员边界、类型/技术方案、镜头剪辑方案与制作边界。"
