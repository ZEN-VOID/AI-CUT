pack_id: 科幻机甲
aliases:
  - 科幻机甲
  - 科幻
  - 机甲
  - 赛博
  - 未来战争
semantic_tags:
  - system-display
  - scale-contrast
  - technology-pressure
  - cockpit-intimacy
stage_projection:
  script_adaptation:
    focus:
      - 规则显影
      - 人机关系
      - 战场尺度
  nine_blade_prompting:
    layout_bias:
      - ui inset
      - mech silhouette
      - impact diagonal
  image_generation:
    render_bias:
      - hard-surface detail
      - scale contrast
      - interface glow
  animation_generation:
    motion_bias:
      - servo charge
      - launch burst
      - cockpit lock
  episode_poster:
    poster_bias:
      - 启动
      - 坠落
      - 机体失控
control_surface:
  conflict_engine:
    premise: 系统规则、机体极限和人的代价一起推动冲突升级。
    escalation_loop: 新规则显形 -> 人机适配或失衡 -> 战场规模扩大 -> 系统后果反咬角色。
    payoff: 机甲战斗必须同时兑现尺度差、控制代价和情感损耗。
  role_matrix:
    protagonist: 被机体或系统改写的操作者。
    rival_or_counterforce: 敌对机体、军事体系、企业逻辑或 AI 判断。
    allies: 技术员、僚机、地面指挥提供系统信息与战术互锁。
    observers_or_pressure: 仪表、警报、都市废墟和任务指令持续施压。
  page_turn_mechanism:
    setup_pattern: 先立规则和任务边界，再放大一处系统隐患。
    turn_trigger: 启动、失控、过载、同步变化、机体受损。
    reveal_pattern: 翻页先给宏观尺度后果，再补驾驶舱内的局部反应。
    carry_forward_rule: 每次翻页都要改变任务难度、机体状态或人机关系。
  panel_grammar:
    dominant_panel_shapes:
      - 尺度对比大格
      - 驾驶舱插格
      - UI 信息格
    expansion_nodes:
      - 发射
      - 坠落
      - 合体/失控
    compression_nodes:
      - 参数变化
      - 通讯来回
      - 小范围机动
    negative_space_policy: 留白用于突出尺度落差和失重感，不用于削弱系统信息。
  visual_carrier:
    primary:
      - 机体轮廓
      - UI/警报
      - 操作者身体反应
    secondary:
      - 都市废墟
      - 能源光效
      - 机械损伤
    prohibited_shortcuts:
      - 只有设定名词没有战场逻辑
      - 只有巨物没有驾驶者代价
  dialogue_register:
    line_length: short_to_medium
    monologue_density: low
    narration_role: procedural
    exposition_rule: 规则信息要嵌入操作与故障，不应停机集中讲设定。
  motif_system:
    recurring_motifs:
      - 警报
      - 同步率
      - 驾驶舱视角
      - 都市尺度对比
    payoff_rule: 母题应从炫目参数回收为主角与机体关系的最终命题。
  failure_modes:
    - 只剩设定列表和巨物画。
    - 机体伤得很重，人却没代价。
    - 战场空间完全抽象。
