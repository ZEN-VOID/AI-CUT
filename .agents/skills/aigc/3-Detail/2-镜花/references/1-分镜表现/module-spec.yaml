version: 1
module_id: jinghua-shot-stage
module_level: branch
stage_order: 1
branch_key: shot_stage
purpose: 在 `1-水月` prose 基础上先形成稳定的 group-level shot spine，包括结构化密度预算、插入点、构图骨架、景别节奏预判、POV 策略预判与镜头描述子槽锁定，并保证所有镜头组织都可回指到 `1-水月` 证据。
child_modules:
  - path: references/1-分镜表现/1-切换/module-spec.yaml
  - path: references/1-分镜表现/2-插入/module-spec.yaml
  - path: references/1-分镜表现/3-构图/module-spec.yaml
triggers:
  - 已存在 `1-水月/第N集.md`
  - 需要把 grouped prose 进一步变成可拆镜的导演/摄影融写稿
must_answer:
  - 这组镜头语言承接了 `1-水月` 的哪条主动作、主情绪或主空间关系
  - 整个分镜组的节奏感是什么，以及它可以拆成哪些关键节拍
  - 这组默认切成多少镜最稳，`preferred_shot_count` 与 `shot_budget_floor / shot_budget_ceiling` 分别是多少
  - 每镜应在原 prose 的什么位置插入
  - 每个节拍最合适的景别是什么，以及这些景别如何形成组级节奏曲线
  - 每镜的主视线、景别、构图任务、POV 与镜头描述子槽是什么
  - 每个分镜的主体、陪体、背景三层关系是否清楚，空间锚点、镜头轴线、主体几何关系是否成立
  - 当前段落的 `叙事内核 / Previous End / Current Mission / Next Start / 情绪引导` 如何落成景别与视点节奏
  - 当前段落更适合哪种 `景别节奏模板` 与 `POV 策略`
  - 命中镜头窗口内，实际景别曲线、心理距离与情感目标是否一致
patch_contract:
  target_slot: shot_spine_patch
  required_elements:
    - watermoon_inheritance
    - shot_count_plan
    - shot_marker_spine
    - composition_skeleton
    - shot_size_rhythm_preview
    - pov_strategy_preview
    - shot_descriptor_lock
    - focus_spatial_logic
merge_policy:
  execution_mode: strict_serial
  combine_order:
    - 1-切换
    - 2-插入
    - 3-构图
  preserve_first:
    - group conflict axis
    - action continuity
    - readable shot markers
    - shot size rhythm readability
    - descriptor slot coherence
quality_gates:
  - 未形成 shot spine 前不得进入后续阶段
  - 未形成结构化密度预算、景别节奏预判和 POV 预判前，不得进入摄影美学
  - 不得把 prose 切碎到失去组级主线
  - 每个分镜决策都必须能回指到 `1-水月` 的原始信息
  - "`preferred_shot_count + shot_budget_floor / shot_budget_ceiling` 必须遵循结构化预算口径；当前脚本真源缺位时，也必须保持同字段、同公式、同 headroom 解释"
  - "`景别 / 镜头属性 / 镜头框架 / 镜头类型 / 镜头视角` 五个镜头描述子槽必须在 Stage-1 锁定，不得把 descriptor 选择留给下游临场决定"
  - "`tail-hook` 或下一组预映首拍默认只计入 `hook_preview_count`，不得自动折成当前组独立镜头"
  - "命中镜头窗口必须在本阶段完成景别曲线、POV 策略与心理距离的预判和复核，不得只留“后面再看”"
  - 不得直接越权写摄影、运镜或转场的细节
