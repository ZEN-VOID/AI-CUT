interface:
  display_name: "AIGC 道具面板"
  short_description: "把道具设计产物中的 prompt 直引为 16:9 道具面板 layout JSON，并默认自动调用 nano-banana/general 生图。"
  default_prompt: "Use $aigc-design-prop-panel to read prop design outputs from `projects/aigc/<项目名>/4-Design/道具/2-设计/第N集/`, extract each `**prompt整合**` block or compatible prompt JSON, write `PropPanel-layout.json` under `4-Design/道具/3-面板/第N集/`, then automatically call nano-banana/general unless `--layout-only` is requested. In batch 4-Design context, use existing design images as SMART references; for single files or natural-language generation, default to no references."
version: 1
