interface:
  display_name: "AIGC 光影"
  short_description: "基于 8-摄影 和 3-美学画面基调/场景风格/摄影风格，为逐集分镜内联注入电影光影美学。"
  default_prompt: "使用 $aigc-lighting-aesthetic-injection，默认读取 projects/aigc/<项目名>/8-摄影/第N集.md；如用户指定文稿则以指定文稿为 source。必须结合 projects/aigc/<项目名>/3-美学/画面基调/全局风格协议.md、3-美学/场景风格/场景风格协议.md 与 3-美学/摄影风格/摄影风格协议.md，先理解题材、情节、剧本正文、摄影运镜、画面基调、场景风格、摄影风格和大师/作品参照，再逐个分镜点在原有内容后内联注入电影光影美学描述。格式为 分镜N（N-N秒）：原有内容（包含摄影）。光影美学描述。不得改剧情、对白、场景顺序、分镜编号、分镜秒数或原有摄影内容，不生成灯位图、图像 prompt、视频 prompt、设备参数或剪辑方案。"
