version: 1
module_id: watermoon-visual-impact
module_level: leaf
branch_key: visual
leaf_key: impact
purpose: 找到这一组最值得被第一眼记住的动作、视线、反差或物象。
triggers:
  - 当前组缺少记忆点或第一眼抓手
must_answer:
  - 第一眼抓手是什么
  - 它由谁或什么制造
  - 它是否真的服务主冲突
patch_contract:
  target_slot: visual_patch
  append_fields:
    - visual_hook
    - contrast_point
merge_policy:
  keep:
    - 动作反差
    - 视线焦点
  avoid:
    - 抢戏奇观
quality_gates:
  - 抓手必须与叙事目标同向

