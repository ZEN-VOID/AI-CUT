schema_version: "aigc.video.storyboard_reference.dreamina_batch.v1"
project_name: "<项目名>"
episode_id: "第N集"
source_group_file: "projects/aigc/<项目名>/4-分组/第N集.md"
storyboard_reference_root: "projects/aigc/<项目名>/6-图像/B-分镜故事板/第N集"
output_root: "projects/aigc/<项目名>/7-视频/B-分镜故事板参照/第N集"
execution:
  provider: "dreamina"
  background: true
  concurrency: 4
  queue_ledger: "projects/aigc/<项目名>/7-视频/B-分镜故事板参照/第N集/第N集-dreamina-queue.md"
  result_file: "projects/aigc/<项目名>/7-视频/B-分镜故事板参照/第N集/第N集-dreamina-results.json"
defaults:
  model_version: "seedance2.0_vip"
  duration: 10
  ratio: "16:9"
  video_resolution: "720p"
  poll: 45
jobs:
  - queue_id: "Q-001"
    group_id: "1-1-1"
    source_heading: "## 1-1-1"
    command_type: "multimodal2video"
    reference_status: "found"
    reference_images:
      - path: "projects/aigc/<项目名>/6-图像/B-分镜故事板/第N集/images/1-1-1.png"
        marker: "@图1"
        role: "storyboard_sheet"
        source: "6-图像/B-分镜故事板"
    prompt: |
      根据以下完整分镜组内容生成一条连续视频。保持分镜顺序、角色动作、镜头运动、场景与情绪连续；不生成字幕，不生成BGM，保留物理互动音效与环境音。

      @图1 是该分镜组的多格分镜故事板视觉参照，只用于画面连续性、镜头顺序、构图节奏和角色位置参考；不得把故事板图当作首帧，也不得覆盖以下完整分镜组内容。

      <直接粘贴 projects/aigc/<项目名>/4-分组/第N集.md 中该分镜组的完整现有内容>
    dreamina:
      model_version: "seedance2.0_vip"
      duration: 10
      ratio: "16:9"
      video_resolution: "720p"
      poll: 45
    output:
      expected_video_path: "projects/aigc/<项目名>/7-视频/B-分镜故事板参照/第N集/videos/1-1-1.mp4"
