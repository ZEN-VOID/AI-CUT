method_kernel: comic-core-v1
default_stack:
  base: _base
  primary: 经典漫画叙事
  platform:
    - 条漫平台
  audience: []
base_profile:
  semantic_tags:
    - comic-kernel
    - continuity
    - panel-readability
  stage_projection:
    script_adaptation:
      must_keep:
        - 角色关系核
        - 情绪核
        - 关键代价
      default_contracts:
        - 场景先于解释
        - 页势能先于表层顺序
    nine_blade_prompting:
      must_keep:
        - page readability
        - character continuity
        - scene continuity
        - page-number overlay
    image_generation:
      must_keep:
        - one request nine pages
        - no collage
        - stable visual dna
    animation_generation:
      must_keep:
        - preserve source composition
        - one panel one shot default
        - preserve chinese text and page number
    episode_poster:
      must_keep:
        - representative scene
        - current-episode subjects only
        - centered title stack
primary_profiles:
  经典漫画叙事:
    aliases:
      - 经典漫画
      - classic-comic
      - genre-led-comic
    semantic_tags:
      - panel-causality
      - page-turn
      - visual-storytelling
    stage_projection:
      script_adaptation:
        adaptation_posture: genre-led
        pacing_drive: elastic
        focus:
          - 人物行动
          - 冲突升级
          - 翻页因果
      nine_blade_prompting:
        layout_bias:
          - clear-reading-path
          - page-turn-build
          - focal-contrast
      image_generation:
        render_bias:
          - clear silhouette
          - panel hierarchy
          - stable acting
      animation_generation:
        motion_bias:
          - preserve reading intent
          - panel-first movement
          - subject clarity
      episode_poster:
        poster_bias:
          - episode truth
          - representative scene
          - title hierarchy
platform_profiles:
  条漫平台:
    aliases:
      - 条漫
      - webtoon
      - vertical-scroll-comic
    semantic_tags:
      - mobile-reading
      - vertical-scroll
      - legible-text
    stage_projection:
      script_adaptation:
        page_density_target: balanced
        panel_text_budget_bias: concise
      nine_blade_prompting:
        layout_bias:
          - vertical clarity
          - clean reading path
      image_generation:
        render_bias:
          - legible balloon placement
          - clean gutters
      animation_generation:
        motion_bias:
          - readable transitions
          - keep text stable
      episode_poster:
        poster_bias:
          - mobile-first title hierarchy
          - clear focal order
  漫剧平台:
    aliases:
      - 漫剧
      - 短剧
      - short-drama-comic
    semantic_tags:
      - trailer-hook
      - episode-poster
      - short-drama-beat
    stage_projection:
      script_adaptation:
        hook_intensity: heightened
        pacing_drive: punchy
      nine_blade_prompting:
        layout_bias:
          - close-up reaction
          - reveal panels
          - cliffhanger ending page
      image_generation:
        render_bias:
          - emotional close-up
          - face readability
      animation_generation:
        motion_bias:
          - reaction push-ins
          - threat reveal pauses
      episode_poster:
        poster_bias:
          - identity threat
          - relationship reversal
          - one-line clickable title
audience_profiles:
  少年热血受众:
    aliases:
      - 少年
      - 男频
      - 热血受众
      - battle-shonen
    semantic_tags:
      - rivalry
      - oath
      - breakthrough
    stage_projection:
      script_adaptation:
        emotional_axis:
          - 不服
          - 宣言
          - 反击
      nine_blade_prompting:
        dialogue_bias:
          - short oath lines
          - challenge lines
      image_generation:
        render_bias:
          - power silhouettes
          - impact bursts
      animation_generation:
        motion_bias:
          - forward attack motion
          - charged pauses before impact
      episode_poster:
        poster_bias:
          - oath-title
          - challenge-title
  少女恋爱受众:
    aliases:
      - 少女
      - 少女漫
      - shojo
      - 恋爱受众
    semantic_tags:
      - heart-flutter
      - proximity
      - emotional-detail
    stage_projection:
      script_adaptation:
        emotional_axis:
          - 试探
          - 靠近
          - 误会化开
      nine_blade_prompting:
        dialogue_bias:
          - gentle short lines
          - subtext-heavy beats
      image_generation:
        render_bias:
          - eye contact
          - hand gesture clarity
      animation_generation:
        motion_bias:
          - breathing pause
          - tiny gesture hold
      episode_poster:
        poster_bias:
          - heartbeat-title
          - proximity-title
  青年现实受众:
    aliases:
      - 青年
      - 青年漫
      - seinen
      - 现实向
    semantic_tags:
      - ambiguity
      - social-pressure
      - adult-conflict
    stage_projection:
      script_adaptation:
        emotional_axis:
          - 现实压力
          - 关系裂纹
          - 代价选择
      nine_blade_prompting:
        dialogue_bias:
          - restrained lines
          - silence as beat
      image_generation:
        render_bias:
          - material realism
          - acting subtlety
      animation_generation:
        motion_bias:
          - restrained movement
          - pressure linger
      episode_poster:
        poster_bias:
          - dilemma-title
          - fracture-title
  情绪强冲突受众:
