schema_version: "aigc-team/v1"
project: "__PROJECT_NAME__"
updated_at: "__DATE__"

init_contract:
  init_mode: "smart_advisor"
  team_lineup_mode: "auto" # auto | custom; replace only after user locks the lineup choice
  selector_scope_root: ".agents/skills/team/"
  decision_owner: "" # user_confirmed | blocked
  lineup_decision_evidence: ""
  source_profile: "" # source-light | source-grounded | source-reconcile
  selection_basis:
    scenario_tags: []
    required_department_coverage:
      director: false
      design: false
      cinematography: false
    optional_departments_included: []

