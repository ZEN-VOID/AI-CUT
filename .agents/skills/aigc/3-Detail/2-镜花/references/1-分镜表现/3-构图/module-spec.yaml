version: 1
module_id: jinghua-shot-composition
module_level: leaf
stage_order: 1.3
purpose: 为已插入的各分镜补构图布局、主陪背景层级、焦点路径、镜头描述子槽和空间锚点，使后续摄影与运镜可沿同一 shot-local envelope 叠加。
triggers:
  - 已有 `shot_marker_spine`
  - 需要把每镜的画面组织收束成可继承的 shot-local envelope
must_answer:
  - 这些构图决定分别承接 `1-水月` 的哪条关系、动作或空间信息
  - 每一镜谁是主体、谁是陪体、背景承担什么信息底座
  - 每一镜主看点落在画面哪里，第二焦点和观看路径如何组织
  - 画面重心、负空间、入口出口和前后高低关系如何服务冲突
  - 采用了哪种构图方式，以及为什么这样选
  - "`景别 / 镜头属性 / 镜头框架 / 镜头类型 / 镜头视角` 如何与构图判断保持一致"
  - 前景/中景/后景、空间轴线与入口出口如何帮助读者理解空间和情绪
patch_contract:
  target_slot: composition_skeleton
  required_elements:
    - figure_ground_map
    - shot_focal_point
    - viewing_path_note
    - framing_choice
    - layout_note
    - composition_method_note
    - depth_layer_hint
    - shot_descriptor_patch
    - space_anchor_note
merge_policy:
  preserve_first:
    - visual readability
    - conflict visibility
    - spatial logic
    - stable viewing path
    - figure-ground clarity
  trim_first:
    - 抽象美学口号
    - 纯装饰性构图招式
    - 发明出来的空间关系
quality_gates:
  - 构图必须能被后续摄影和运镜继承
  - 必须解释主体重心、负空间、入口出口与观看路径，而不是只报一个景别
  - 构图方式必须服务镜头任务，不得只为形式好看
  - "`景别 / 镜头属性 / 镜头框架 / 镜头类型 / 镜头视角` 必须彼此协调"
  - 第一焦点、第二焦点和观看路径必须稳定，不得让观众注意力漂移
  - 构图不能替代上游发明新关系或新空间
  - 不得只给抽象美学词而无画面组织
  - 不得改写既定分镜数和插入点
  - 若采用反直觉景别或视角，必须能解释其心理距离收益
