version: 2
canonical_owner: ".agents/skills/aigc/review/_shared/review-dimension-registry.yaml"
purpose: "aigc-review 维度、checkpoint 审计点、stage acceptance 与 package release gate 的 runner 兼容真源"
dimension_module_policy: "dimensions are governed specs under references/dimensions, not standalone Skill 2.0 packages"
execution_provider:
  config_ref: ".agents/skills/aigc/review/_shared/execution-provider.yaml"
  default_skill_relative_to_codex_home: "skills/meta/构建/架构/code-reviewer/SKILL.md"
  mode: "background-window"
  ownership: "dimension specs define audit criteria; provider executes review; parent aggregates and routes repair"
policies:
  checkpoint_inline:
    step_failure_order:
      - "优先阻断当前 checkpoint 的 handoff"
      - "若 issue 指向当前阶段节点，则回退到当前阶段对应 node 或 leaf"
      - "若 issue 指向 source_layer_owner，则转 back_to_source_contract"
    pass_gate: "只有 checkpoint aggregate packet 判定 PASS 或 PASS-WITH-WARNINGS，才允许 handoff 下游"
  stage_acceptance:
    stage_pass_gate: "只有 stage aggregate packet 判定 PASS，当前 stage 才算通过"
  package_release:
    release_pass_gate: "只有 release aggregate packet 判定 PASS，才允许 provider handoff / package release"
checkpoints:
  - id: "init-handoff-ready"
    stage: "0-初始化"
    trigger_node: "north_star.yaml + init_handoff landed"
    scope: "project"
    mandatory_dimensions:
      - "planning-seed-validator"
      - "governance-closure-validator"
    default_handoff_on_pass:
      - "1-分集"
  - id: "episode-split-ready"
    stage: "1-分集"
    trigger_node: "episode split outputs + validation carrier prepared"
    scope: "episode"
    mandatory_dimensions:
      - "planning-seed-validator"
      - "governance-closure-validator"
    default_handoff_on_pass:
      - "2-编导"
  - id: "directing-script-ready"
    stage: "2-编导"
    trigger_node: "script adaptation landed + validation carrier prepared"
    scope: "episode"
    mandatory_dimensions:
      - "planning-seed-validator"
      - "detail-execution-validator"
      - "governance-closure-validator"
    default_handoff_on_pass:
      - "3-摄影"
  - id: "cinematography-ready"
    stage: "3-摄影"
    trigger_node: "shot language injected + validation carrier prepared"
    scope: "episode"
    mandatory_dimensions:
      - "detail-execution-validator"
      - "governance-closure-validator"
    default_handoff_on_pass:
      - "4-分组"
  - id: "grouping-ready"
    stage: "4-分组"
    trigger_node: "shot groups landed + validation carrier prepared"
    scope: "episode"
    mandatory_dimensions:
      - "detail-execution-validator"
      - "governance-closure-validator"
    default_handoff_on_pass:
      - "5-设计"
      - "6-图像"
  - id: "design-ready"
    stage: "5-设计"
    trigger_node: "design lists/truth/generated subject assets ready"
    scope: "episode-domain"
    mandatory_dimensions:
      - "design-alignment-validator"
      - "governance-closure-validator"
    default_handoff_on_pass:
      - "6-图像"
      - "7-视频"
  - id: "image-request-ready"
    stage: "6-图像/A-分镜画面"
    trigger_node: "frame image requests or prompts ready"
    scope: "episode"
    mandatory_dimensions:
      - "detail-execution-validator"
      - "image-delivery-validator"
      - "governance-closure-validator"
    default_handoff_on_pass:
      - "6-图像/B-分镜故事板"
  - id: "image-storyboard-ready"
    stage: "6-图像/B-分镜故事板"
    trigger_node: "storyboard sheet assets ready"
    scope: "episode"
    mandatory_dimensions:
      - "design-alignment-validator"
      - "image-delivery-validator"
      - "governance-closure-validator"
    default_handoff_on_pass:
      - "7-视频/B-分镜故事板参照"
  - id: "image-handoff-ready"
    stage: "6-图像"
    trigger_node: "image stage handoff pack ready"
    scope: "episode"
    mandatory_dimensions:
      - "image-delivery-validator"
      - "governance-closure-validator"
    default_handoff_on_pass:
      - "7-视频"
  - id: "video-request-ready"
    stage: "7-视频/B-分镜故事板参照"
    trigger_node: "storyboard-reference video requests ready"
    scope: "episode"
    mandatory_dimensions:
      - "detail-execution-validator"
      - "video-delivery-validator"
      - "governance-closure-validator"
    default_handoff_on_pass:
      - "7-视频/C-主体参照"
  - id: "video-subject-reference-ready"
    stage: "7-视频/C-主体参照"
    trigger_node: "subject-reference video requests ready"
    scope: "episode"
    mandatory_dimensions:
      - "design-alignment-validator"
      - "video-delivery-validator"
      - "governance-closure-validator"
    default_handoff_on_pass:
      - "7-视频"
  - id: "video-handoff-ready"
    stage: "7-视频"
    trigger_node: "video provider handoff pack ready"
    scope: "episode"
    mandatory_dimensions:
      - "video-delivery-validator"
      - "governance-closure-validator"
    default_handoff_on_pass:
      - "provider:video"
  - id: "package-release-ready"
    stage: "package"
    trigger_node: "cross-stage handoff pack assembled"
    scope: "episode-or-project"
    mandatory_dimensions:
      - "planning-seed-validator"
      - "detail-execution-validator"
      - "design-alignment-validator"
      - "image-delivery-validator"
      - "video-delivery-validator"
      - "governance-closure-validator"
    default_handoff_on_pass:
      - "release"
stage_acceptance:
  - stage: "0-初始化"
    mandatory_dimensions:
      - "planning-seed-validator"
      - "governance-closure-validator"
  - stage: "1-分集"
    mandatory_dimensions:
      - "planning-seed-validator"
      - "governance-closure-validator"
  - stage: "2-编导"
    mandatory_dimensions:
      - "planning-seed-validator"
      - "detail-execution-validator"
      - "governance-closure-validator"
  - stage: "3-摄影"
    mandatory_dimensions:
      - "detail-execution-validator"
      - "governance-closure-validator"
  - stage: "4-分组"
    mandatory_dimensions:
      - "detail-execution-validator"
      - "governance-closure-validator"
  - stage: "5-设计"
    mandatory_dimensions:
      - "design-alignment-validator"
      - "governance-closure-validator"
  - stage: "6-图像"
    mandatory_dimensions:
      - "image-delivery-validator"
      - "governance-closure-validator"
  - stage: "7-视频"
    mandatory_dimensions:
      - "video-delivery-validator"
      - "governance-closure-validator"
dimensions:
  - role_id: "planning-seed-validator"
    dimension: "规划与种子兑现"
    dimension_spec_ref: ".agents/skills/aigc/review/references/dimensions/planning-seed.md"
    scope: "0-初始化 / 1-分集 / 2-编导 seed and handoff obligations"
    objective: "确认项目起盘、分集与编导改编之间的核心种子没有断链"
    method: "对照 north_star、分集稿、编导稿和 handoff carrier，定位 seed 漂移与 obligation 漏传"
    report_filename: "规划与种子兑现.md"
    checkpoint_inline:
      enabled: true
      checkpoints: ["init-handoff-ready", "episode-split-ready", "directing-script-ready"]
    stage_acceptance:
      stages: ["0-初始化", "1-分集", "2-编导"]
      weight: 0.18
    package_release:
      enabled: true
      weight: 0.16
    default_rework_targets: ["0-初始化", "1-分集", "2-编导"]
    upstream_source_owners: ["0-初始化", "1-分集"]
  - role_id: "detail-execution-validator"
    dimension: "分镜执行连续性"
    dimension_spec_ref: ".agents/skills/aigc/review/references/dimensions/detail-execution-continuity.md"
    scope: "2-编导 / 3-摄影 / 4-分组 continuity and shot grouping readiness"
    objective: "确认编导事实、摄影镜头语言与分镜组可以稳定供下游消费"
    method: "读取编导稿、摄影稿和分组稿，定位镜级字段断裂、组镜不连与 handoff 不足"
    report_filename: "分镜执行连续性.md"
    checkpoint_inline:
      enabled: true
      checkpoints: ["directing-script-ready", "cinematography-ready", "grouping-ready", "image-request-ready", "video-request-ready"]
    stage_acceptance:
      stages: ["2-编导", "3-摄影", "4-分组"]
      weight: 0.18
    package_release:
      enabled: true
      weight: 0.17
    default_rework_targets: ["2-编导", "3-摄影", "4-分组"]
    upstream_source_owners: ["1-分集", "2-编导", "3-摄影"]
  - role_id: "design-alignment-validator"
    dimension: "设计对位"
    dimension_spec_ref: ".agents/skills/aigc/review/references/dimensions/design-alignment.md"
    scope: "5-设计 alignment against grouping and downstream image/video handoff"
    objective: "确认设计没有脱离上游分镜组，并为图像/视频提供稳定主体与视觉 truth"
    method: "对照 4-分组 与 5-设计 各域 canonical truth，定位设计漂移与 continuity 断带"
    report_filename: "设计对位.md"
    checkpoint_inline:
      enabled: true
      checkpoints: ["design-ready", "image-storyboard-ready", "video-subject-reference-ready"]
    stage_acceptance:
      stages: ["5-设计"]
      weight: 0.18
    package_release:
      enabled: true
      weight: 0.17
    default_rework_targets: ["5-设计/场景", "5-设计/角色", "5-设计/道具"]
    upstream_source_owners: ["4-分组", "5-设计"]
  - role_id: "image-delivery-validator"
    dimension: "图像交付就绪"
    dimension_spec_ref: ".agents/skills/aigc/review/references/dimensions/image-delivery-readiness.md"
    scope: "6-图像 frame image, storyboard sheet, and image handoff readiness"
    objective: "确认图像阶段请求、分镜画面和故事板达到可信交付门"
    method: "读取 A-分镜画面、B-分镜故事板与 handoff refs，定位 continuity、asset 和 provider pack 缺口"
    report_filename: "图像交付就绪.md"
    checkpoint_inline:
      enabled: true
      checkpoints: ["image-request-ready", "image-storyboard-ready", "image-handoff-ready"]
    stage_acceptance:
      stages: ["6-图像"]
      weight: 0.18
    package_release:
      enabled: true
      weight: 0.17
    default_rework_targets: ["6-图像/A-分镜画面", "6-图像/B-分镜故事板"]
    upstream_source_owners: ["4-分组", "5-设计", "6-图像"]
  - role_id: "video-delivery-validator"
    dimension: "视频交付就绪"
    dimension_spec_ref: ".agents/skills/aigc/review/references/dimensions/video-delivery-readiness.md"
    scope: "7-视频 storyboard reference, subject reference, and provider handoff readiness"
    objective: "确认视频阶段参照、主体、运动与 provider handoff 达到可信交付门"
    method: "读取 B-分镜故事板参照、C-主体参照与 handoff refs，定位 provider、motion、duration 与 continuity 缺口"
    report_filename: "视频交付就绪.md"
    checkpoint_inline:
      enabled: true
      checkpoints: ["video-request-ready", "video-subject-reference-ready", "video-handoff-ready"]
    stage_acceptance:
      stages: ["7-视频"]
      weight: 0.18
    package_release:
      enabled: true
      weight: 0.17
    default_rework_targets: ["7-视频/B-分镜故事板参照", "7-视频/C-主体参照"]
    upstream_source_owners: ["4-分组", "5-设计", "6-图像", "7-视频"]
  - role_id: "governance-closure-validator"
    dimension: "治理闭环"
    dimension_spec_ref: ".agents/skills/aigc/review/references/dimensions/governance-closure.md"
    scope: "validation carriers, source trace, route uniqueness, runtime closure"
    objective: "确认阶段 validation carrier、scope、route 和 runtime carriers 没有漂移"
    method: "读取项目根治理工件、阶段 validation carriers 与当前 scope refs，定位 gate/carrier/route 漂移"
    report_filename: "治理闭环.md"
    checkpoint_inline:
      enabled: true
      checkpoints:
        - "init-handoff-ready"
        - "episode-split-ready"
        - "directing-script-ready"
        - "cinematography-ready"
        - "grouping-ready"
        - "design-ready"
        - "image-request-ready"
        - "image-storyboard-ready"
        - "image-handoff-ready"
        - "video-request-ready"
        - "video-subject-reference-ready"
        - "video-handoff-ready"
        - "package-release-ready"
    stage_acceptance:
      stages: ["0-初始化", "1-分集", "2-编导", "3-摄影", "4-分组", "5-设计", "6-图像", "7-视频"]
      weight: 0.10
    package_release:
      enabled: true
      weight: 0.16
    default_rework_targets: ["validation-report", "root-governance"]
    upstream_source_owners: ["root-aigc", "project-runtime"]
