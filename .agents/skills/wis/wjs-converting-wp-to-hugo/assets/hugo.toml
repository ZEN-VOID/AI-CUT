baseURL = "https://huixianju.cn/"
title = "汇贤居"
hasCJKLanguage = true
relativeURLs = true        # emit page-relative links so the built site works
canonifyURLs = false       # from file://, a subpath, or the custom domain alike
enableRobotsTXT = true
enableEmoji = true
timeZone = "Asia/Shanghai"

[pagination]
  pagerSize = 20

[taxonomies]
  category = "categories"
  tag = "tags"

[markup.goldmark.renderer]
  unsafe = true          # allow passed-through <video>/<iframe> embeds

[markup.tableOfContents]
  startLevel = 2
  endLevel = 3

[outputs]
  home = ["HTML", "RSS"]

[params]
  description = "汇贤居业主委员会 · 我们的家"

[[menu.main]]
  identifier = "home"
  name = "首页"
  url = "/"
  weight = 10
[[menu.main]]
  identifier = "categories"
  name = "分类"
  url = "/categories/"
  weight = 20
[[menu.main]]
  identifier = "archives"
  name = "归档"
  url = "/archives-list/"
  weight = 30
