version: 1
module_id: watermoon-motion-position
module_level: leaf
branch_key: motion
leaf_key: position_direction
purpose: 让角色站位、朝向、移动路径和距离变化可被快速读懂。
triggers:
  - 文本里有人物转向、进退、接近、离场
must_answer:
  - 人物现在站在哪
  - 人物往哪走或回身
  - 人物与目标对象的距离怎么变
patch_contract:
  target_slot: motion_patch
  append_fields:
    - anchor_position
    - direction_vector
    - distance_change
merge_policy:
  keep:
    - 方位词精确
  avoid:
    - 冗长地理说明
quality_gates:
  - 方位必须少而准
  - 不得制造第二套空间坐标

