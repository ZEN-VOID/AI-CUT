schema_version: "openai-agent-skill/v1"
skill:
  name: "aigc-image-storyboard-sheet"
  path: ".agents/skills/aigc/12-图像/分镜故事板"
interface:
  display_name: "AIGC 图像 / B-分镜故事板"
  short_description: "从10-分组完整分镜组内容批量生成带角色名和彩色标注系统的黑白线稿组级故事板"
  default_prompt: "使用 $aigc-image-storyboard-sheet，从 projects/aigc/<项目名>/10-分组 直接引用对应分镜组完整内容，添加黑白线稿分镜手稿任务执行前缀、角色头顶名称标注和受控彩色标注系统，绑定角色、场景、道具参照，按默认 16:9 panel 图片区和下方 rich_brief 分镜描述批量调用 imagegen 生成。"
