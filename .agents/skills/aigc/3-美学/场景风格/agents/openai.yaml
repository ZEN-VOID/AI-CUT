name: aigc-scene-style
version: 1
description: AIGC 影片项目场景层级风格协议与约 100 字中文提示词制定阶段。
entrypoint: .agents/skills/aigc/3-美学/场景风格/SKILL.md
interface:
  display_name: AIGC 3-美学/场景风格
  short_description: 从剧本、画面基调和参考图/视频提取场景层级风格协议，研究空间光影、氛围密度、环境层次和视觉统一性
  default_prompt: "使用 $aigc-scene-style，基于 projects/aigc/<项目名>/2-编剧/、3-美学/画面基调/全局风格协议.md 或我提供的参考资料，提取场景风格九维矩阵、画面基调继承关系、场景统一原则和约 100 字中文 Scene Style Prompt；若来源或目标明确为第N集，输出到 projects/aigc/<项目名>/3-美学/第N集/场景风格/场景风格协议.md，否则输出项目级基线 3-美学/场景风格/场景风格协议.md。不要写具体场景清单、地点设计、单镜头构图或生成请求。"
runtime:
  required_context:
    - .agents/skills/aigc/3-美学/场景风格/SKILL.md
    - .agents/skills/aigc/3-美学/场景风格/CONTEXT.md
  default_output_root: projects/aigc/<项目名>/3-美学/
  scope_output_roots:
    episode_scoped: projects/aigc/<项目名>/3-美学/第N集/场景风格/
    series_baseline: projects/aigc/<项目名>/3-美学/场景风格/
  llm_first: true
