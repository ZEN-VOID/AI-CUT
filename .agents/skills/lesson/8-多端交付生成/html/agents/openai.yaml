interface:
  display_name: "课程 HTML 网页交付"
  short_description: "生成课程 HTML/web 交付计划、页面结构与站点 manifest"
  default_prompt: "Use $lesson-delivery-html when the user asks for HTML, web courseware, static site, browser course, mobile lesson, LMS embed, or index.html delivery under `projects/lesson/<项目名>/8-多端交付生成/html/`. Load SKILL.md and CONTEXT.md, audit the parent lesson-delivery html packet, design the web information architecture, adapt course content with LLM-first judgment, and write html-delivery-plan.md and html-site-manifest.json when project-bound. When actual HTML generation, redesign, polish, or browser verification is requested, load .agents/skills/claude-design/SKILL.md and .agents/skills/claude-design/CONTEXT.md for HTML artifact execution and require artifact_paths, writeback_status, selected_modules, visual_system, browser verification, and quality_verdict. Scripts may only do HTML/CSS/JS assembly, resource copying, validation, export, and manifest writeback."
