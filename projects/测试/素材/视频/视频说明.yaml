        label: "云层能量穿透"
        visual_content: "暗云与金色光柱穿透，画面抽象、速度较快。"
        semantic_tags: ["能量", "天象", "压迫", "升级"]
        shot_type: "abstract_wide"
        motion: "medium"
        action_intensity: "medium"
        text_overlay: "low"
        best_for: ["转场", "情绪升温", "承托旁白重音"]
