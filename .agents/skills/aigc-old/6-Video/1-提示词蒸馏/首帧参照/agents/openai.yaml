interface:
  display_name: "AIGC 6-Video 首帧参照"
  short_description: "以知行合一思行网络锁定单一分镜ID，蒸馏帧级视频请求 JSON/TXT/manifest。"
  default_prompt: "Use $aigc-video-first-frame-reference to read the canonical `projects/aigc/<项目名>/3-Detail/第N集.json`, then consume only its compat-projected helper view when `metadata.document_phase=ready` and the target shot's group still satisfies `分镜切换 == len(分镜明细[])`. The canonical creative task is high-quality LLM-authored `第N集.txt`, not script-written prose. Write each target shot block in the fixed order `分镜组ID -> 全局风格/类型元素/导演意图 -> 分镜N，x-y秒 -> 剧本正文 -> 主体锚定(场景/角色/道具) -> 分镜明细`. Never compress `剧本正文` or `主体锚定` 中的 `场景/角色`; only lightly compress `全局风格 / 类型元素 / 导演意图`; when the block gets tight, prioritize compressing `分镜明细` and `道具`. Expand `分镜明细` to the next level before writing: `分镜构图(构图形式/景别景深/镜头类型)`, `运镜手法(变化/速度/组合)`, `角色表现(动作戏/对话戏/内心戏)`, `氛围表现(层次/空间诗学/意境)`, `摄影表现(光影/色彩/质感)`, and `转场特效(特效/组内/组间)` when present. But these subfields are content sources only: the final `分镜明细` must read as camera-language-first prose, not a sentence chain that can be easily mapped back to field order. Write `第N集.json`, `第N集.txt`, and `_manifest.json` without inventing reference images or upstream facts."
