interface:
  display_name: "AIGC 摄影"
  short_description: "基于 6-分镜 和 2-美学画面基调/摄影风格，为逐集分镜内联注入摄影·运镜与布光/阴影配合。"
  default_prompt: "使用 $aigc-camera-movement-injection，默认读取 projects/aigc/<项目名>/6-分镜/第N集.md；如用户指定文稿则以指定文稿为 source。必须结合 projects/aigc/<项目名>/2-美学/画面基调/全局风格协议.md 与当前集优先的 2-美学/第N集/摄影风格/摄影风格协议.md，缺失时回退项目级摄影风格；场景风格若存在，只提取影响摄影的布光偏好、阴影秩序、可用光源边界、材质/空气介质和光影连续性边界。先理解题材、情节、剧本正文、画面基调、大师/作品参照、摄影风格和可用光影纪律，再逐个分镜点内联注入综合运镜手法。普通格式为 分镜N（N-N秒）：原有内容。镜头从具体机位和角度进入，说明景别/镜头类型、运动方式、运动路径、速度曲线、如何沿既有构图轴线或空间层次运动，以及景深、对焦行为和必要的布光类型、阴影组织、可见光影配合。7-摄影只引用 6-分镜 已确定的主体位置、前中后景、方位、遮挡、纵深、构图层次和可用布光/受光/阴影状态来设计摄影机如何使用空间，不重新发明空间布局或新增无源光源；焦点必须指清晰主体、景深层次或对焦/拉焦/转焦/失焦再合焦行为，不得泛指关注点，变焦只指焦距变化。必须区分摄影机运动、焦距变化和透视效果；空间动作必须回指 6-分镜 的 start_frame_spatial_layout。旧 9-光影 只可吸收为 camera_light_plan，内部主轴是布光类型/光型、阴影组织、叙事美学功能和主体可读性，光源可信只做 source motivation boundary；正式正文只输出亮面、暗面、阴影边界、遮挡区域、清晰主体和焦点/运动交接等可见投影，不输出“阴谋感由...完成”“危险感来自...”等解释性结论；不得恢复独立光影层，不得输出发光物观察清单。一镜到底时以画面点为单位输出：一镜到底运镜（覆盖分镜A-B，N-N秒）：从分镜A的既有起始状态帧和具体机位/角度进入，连续串联分镜A-B，说明景别/镜头类型、运动方式、如何沿既有构图轴线或空间层次推进、如何使用既有前中后景或遮挡关系、速度曲线与停点、景深策略与对焦/拉焦/转焦接力、布光方案、主光/阴影方向、主体可读性和必要 source motivation boundary 的连续交接，以及跨分镜交出点。不得改剧情、对白、场景顺序、分镜编号、分镜秒数或原有分镜内容，不生成图像 prompt、视频 prompt、设备参数、灯位图或剪辑方案。"
