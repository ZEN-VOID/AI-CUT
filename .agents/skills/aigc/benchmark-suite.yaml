suite_meta:
  suite_id: aigc-root-suite-benchmark
  domain: creative-skill-package
  owner: aigc
  version: 1.0.0
  canonical_report_template: .codex/templates/quality-evaluation/creative-skill-package-evaluation-report.md
  canonical_schema: .codex/schemas/creative-skill-package-benchmark-suite.schema.yaml

target_profile:
  target_name: aigc root suite
  target_paths:
    - .agents/skills/aigc
  runtime_kind: project-root-canonical-runtime
  success_definition: root suite can route AIGC project work into a single canonical runtime, produce stable stage handoff, and keep review/resume/query/validation contracts aligned.
  comparison_baseline: pre-2026-04 root-suite state without benchmark carrier

tasks:
  - task_id: baseline-root-routing
    task_type: baseline
    title: root route can identify a unique next entry
    goal: verify the root `aigc` contract can route a normal project request to one unique stage or satellite skill.
    input_profile:
      content_type: aigc-project-request
      constraints:
        - rooted in projects/<项目名>/
        - includes enough evidence to decide one stage
      context_package:
        - .agents/skills/aigc/SKILL.md
        - .agents/skills/aigc/_shared/project-runtime-layout.md
    expected_properties:
      - one unique entry path is returned
      - canonical runtime and governance carriers are named
      - no second truth source is introduced
    checks:
      - check_id: route-unique-entry
        method: manual
        description: confirm output contains one unique stage or satellite entry.
        weight: 3
      - check_id: route-runtime-truth
        method: manual
        description: confirm output names `projects/<项目名>/` as canonical runtime.
        weight: 2
      - check_id: route-audit
        method: script
        description: "python3 scripts/aigc_skill_audit.py --strict"
        weight: 3
    pass_threshold:
      min_score: 6
      required_checks:
        - route-unique-entry
        - route-audit
    evidence_paths:
      - .agents/skills/aigc/SKILL.md
      - scripts/aigc_skill_audit.py

  - task_id: boundary-video-submit
    task_type: boundary
    title: 6-video submit boundary does not jump directly to provider
    goal: verify `6-视频` routes request-ready work into `3-视频生成` before any provider execution path.
    input_profile:
      content_type: request-ready-video-package
      constraints:
        - stable request json already exists
        - provider may be explicit or recommended
      context_package:
        - .agents/skills/aigc/6-视频/SKILL.md
        - .agents/skills/aigc/6-视频/subtypes/3-视频生成/SKILL.md
    expected_properties:
      - request-ready tasks route to `3-视频生成`
      - provider slots are not mistaken for local executed skills
      - output requires submit-plan and submit-brief
    checks:
      - check_id: video-submit-route
        method: manual
        description: confirm route target is `3-视频生成` rather than direct provider command.
        weight: 3
      - check_id: video-submit-contract
        method: script
        description: "python3 scripts/aigc_skill_audit.py --strict"
        weight: 2
    pass_threshold:
      min_score: 4
      required_checks:
        - video-submit-route
    evidence_paths:
      - .agents/skills/aigc/6-视频/SKILL.md
      - .agents/skills/aigc/6-视频/subtypes/3-视频生成/SKILL.md

  - task_id: stress-runtime-closure
    task_type: stress
    title: runtime closure remains aligned across state, review, and resume
    goal: verify a real project runtime keeps governance-state, validation-report, and next-entry recommendation aligned after multiple stage transitions.
    input_profile:
      content_type: active-project-runtime
      constraints:
        - project has governance-state and validation-report
        - at least one stage transition has already happened
      context_package:
        - projects/晴深不渝/governance-state.yaml
        - projects/晴深不渝/规划/validation-report.md
    expected_properties:
      - checkpoint and next entry agree
      - review bridge is readable
      - resume contract points to one unique next entry
    checks:
      - check_id: runtime-next-entry-alignment
        method: manual
        description: compare governance-state with validation-report next entry.
        weight: 3
      - check_id: runtime-carrier-presence
        method: manual
        description: confirm governance-state, project_state, validation-report, and learning-record all exist.
        weight: 2
    pass_threshold:
      min_score: 4
      required_checks:
        - runtime-next-entry-alignment
    evidence_paths:
      - projects/晴深不渝/governance-state.yaml
      - projects/晴深不渝/validation-report.md
      - projects/晴深不渝/规划/validation-report.md

  - task_id: adversarial-fake-subtype
    task_type: adversarial
    title: audit catches declared subtype without contract
    goal: verify the audit pipeline fails when a skill declares a local `subtypes/...` path that lacks `SKILL.md`.
    input_profile:
      content_type: contract-drift-simulation
      constraints:
        - declared subtype path exists in docs
        - matching skill contract is removed or missing
      context_package:
        - scripts/aigc_skill_audit.py
    expected_properties:
      - strict audit reports missing declared subtype contract
      - drift is caught before review release
    checks:
      - check_id: audit-declared-subtype
        method: validator
        description: confirm strict audit can detect declared `subtypes/...` path without `SKILL.md`.
        weight: 3
    pass_threshold:
      min_score: 3
      required_checks:
        - audit-declared-subtype
    evidence_paths:
      - scripts/aigc_skill_audit.py

  - task_id: regression-video-tranche-alignment
    task_type: regression
    title: video tranche numbering stays aligned
    goal: prevent recurrence of the `2-视频生成` vs `3-视频生成` drift.
    input_profile:
      content_type: 6-video-stage-contract
      constraints:
        - parent skill and local child path must reference the same tranche id
      context_package:
        - .agents/skills/aigc/6-视频/SKILL.md
        - .agents/skills/aigc/6-视频/subtypes/3-视频生成/SKILL.md
        - scripts/aigc_skill_audit.py
    expected_properties:
      - all references point to `3-视频生成`
      - no local `2-视频生成` contract remains
      - audit passes on the aligned tree
    checks:
      - check_id: video-tranche-path
        method: script
        description: "rg -n \"2-视频生成|3-视频生成\" .agents/skills/aigc/6-视频 scripts/aigc_skill_audit.py"
        weight: 2
      - check_id: video-tranche-audit
        method: script
        description: "python3 scripts/aigc_skill_audit.py --strict"
        weight: 3
    pass_threshold:
      min_score: 4
      required_checks:
        - video-tranche-audit
    evidence_paths:
      - .agents/skills/aigc/6-视频/SKILL.md
      - .agents/skills/aigc/6-视频/subtypes/3-视频生成/SKILL.md
      - scripts/aigc_skill_audit.py
