<style>
  :root { --fg:#1a1a1a; --muted:#6b7280; --accent:#b45309; --line:#e5e7eb; --bg:#fafaf9; }
  * { box-sizing: border-box; }
  body { margin:0; color:var(--fg); background:var(--bg);
    font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    line-height:1.75; font-size:17px; }
  main { max-width: 720px; margin: 0 auto; padding: 0 20px 64px; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .site-header { max-width:720px; margin:0 auto; padding:24px 20px 12px;
    display:flex; flex-wrap:wrap; align-items:baseline; gap:8px 18px; border-bottom:1px solid var(--line); }
  .site-title { font-size:22px; font-weight:800; color:var(--fg); }
  .site-header nav { display:flex; gap:16px; font-size:15px; }
  .site-footer { max-width:720px; margin:0 auto; padding:24px 20px; color:var(--muted);
    font-size:14px; border-top:1px solid var(--line); }
  article img, article video, article iframe { max-width:100%; height:auto; border-radius:6px; }
  article h1.post-title { font-size:28px; line-height:1.3; margin:28px 0 6px; }
  .post-meta { color:var(--muted); font-size:14px; margin-bottom:24px; }
  .post-meta a { color:var(--muted); }
  blockquote { border-left:3px solid var(--accent); margin:1em 0; padding:.2em 1em; color:#444; background:#fff; }
  .post-list { list-style:none; padding:0; }
  .post-list li { padding:14px 0; border-bottom:1px solid var(--line); display:flex; gap:16px; justify-content:space-between; }
  .post-list time { color:var(--muted); font-size:14px; white-space:nowrap; flex-shrink:0; }
  .pagination { display:flex; gap:18px; justify-content:center; margin-top:28px; }
  .terms { list-style:none; padding:0; display:flex; flex-wrap:wrap; gap:10px; }
  .terms li a { display:inline-block; padding:6px 14px; background:#fff; border:1px solid var(--line); border-radius:999px; }
  .archive-year { margin-top:28px; font-size:15px; color:var(--muted); }
</style>
