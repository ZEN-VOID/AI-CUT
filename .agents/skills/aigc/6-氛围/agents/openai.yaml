interface:
  display_name: "AIGC 氛围"
  short_description: "在逐集表演稿基础上，选择性新增现场物理/舞台特效层面的氛围画面字段。"
  default_prompt: "使用 $aigc-atmosphere-fx，读取 projects/aigc/<项目名>/5-表演/第N集.md，并结合 projects/aigc/<项目名>/3-美学/画面基调/全局风格协议.md、当前集优先的 3-美学/第N集/角色风格/角色风格协议.md 与 3-美学/第N集/场景风格/场景风格协议.md，缺失时回退项目级角色/场景风格。先理解题材、情节、表演稿正文、画面基调、角色风格和场景风格，再按渲染、烘托、增强三类触发机制选择少量关键画面点，在相邻点后新增 氛围画面：XXX。XXX 必须包含现场物理/舞台特效层面的画面化细节，例如烟雾、打灯、鼓风机、雨雪、火光、水汽、湿地面、尘土、灰烬、落叶、投影影纹、雷电、温度或气味，并且要有时间属性，如 与此同时、在动作之后、话音落下时。不每点硬加，不新增剧情事实、天气条件、火源烟源、对白或事件，不写摄影分镜、设备参数、prompt 或视频参数，输出到 projects/aigc/<项目名>/6-氛围/第N集.md，并生成执行报告。"
