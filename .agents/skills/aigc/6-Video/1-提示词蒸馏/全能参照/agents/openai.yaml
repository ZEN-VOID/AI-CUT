interface:
  display_name: "AIGC 全能参照"
  short_description: "按知行合一节点网把分镜组蒸馏为视频请求 JSON、TXT 与 manifest。"
  default_prompt: "Use $aigc-video-seedance2 to read `projects/<项目名>/3-Detail/第N集.json`, treat each 分镜组 as one group-level request packet, preserve `剧本正文` and `全局风格` verbatim, express the remaining group-level and shot-level facts in coherent natural sentences without field titles, keep each shot anchored with the current group-local `xx秒-xx秒`, never write `分镜ID 的 xx秒-xx秒`, organize shot information by semantic order rather than a rigid surface skeleton, and prioritize natural flow plus information coverage; `镜头属性` means specialized functional terms such as `定场镜头` or `反应镜头`, preferably inherited from the upstream shot record and used directly without adding `为`. Keep the final prompt within 1900 characters, and only when the budget is tight may some sentences be compressed into short phrases; when compression is needed preserve `xx秒-xx秒 / 角色站位走位 / 角色背景面 / 景别 / 运镜手法 / 镜头速度(if present) / 镜头视角` first, then `角色表现 / 场景氛围 / 道具及状态 / 摄影美学`, then `镜头属性 / 镜头框架 / 镜头类型 / 分镜表现`, write `第N集.json`, `第N集.txt`, and `_manifest.json`, and close with a thinking-process summary plus key evidence without inventing reference images or upstream facts."
