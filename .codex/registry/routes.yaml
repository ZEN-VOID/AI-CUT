version: 1
repo: AIGC-FILM
last_updated: 2026-04-29

default_flow:
  - step: mandate
    owner: zhongshu
    carrier: .codex/templates/harness/mandate.yaml
  - step: mission_brief
    owner: zhongshu
    carrier: .codex/templates/harness/mission-brief.yaml
  - step: preflight
    owner: menxia
    carrier: .codex/templates/harness/preflight-verdict.yaml
  - step: execution
    owner: shangshu
    carrier: .codex/state/tasks/<task_id>/
    note: 通用默认执行账本；`aigc` 项目工作流以下方 `canonical_runtime_root` 声明的 `projects/aigc/<项目名>/` 为唯一真源
  - step: validation
    owner: menxia
    carrier: .codex/templates/harness/validation-report.md
  - step: learning
    owner: menxia
    carrier: .codex/templates/harness/learning-record.md

route_policies:
  - id: aigc-film-init-natural-entry
    trigger: 命中 `初始化影片`、`初始化电影`、`初始化影视`、`初始化视频项目`、`新建电影项目`、`film project kickoff`、`movie project initialization`，且目标媒介是影片/电影/影视/视频
    rule: "直接进入 `.agents/skills/aigc/0-初始化/SKILL.md`；canonical runtime 固定为 `projects/aigc/<项目名>/`。若用户说的是 `初始化小说 / 初始化网文 / 新建书`，不得误入本路由，应改走 `story-novel-init-natural-entry`。"
  - id: story-novel-init-natural-entry
    trigger: 命中 `初始化小说`、`初始化网文`、`新建书`、`新建长篇故事`、`小说项目起盘`、`novel project kickoff`、`book project initialization`，且目标媒介是小说/网文/书/长篇故事
    rule: "直接进入 `.agents/skills/story/0-初始化/SKILL.md`；canonical runtime 固定为 `projects/story/<项目名>/`。若用户说的是 `初始化影片 / 初始化电影 / 初始化影视 / 初始化视频项目`，不得误入本路由，应改走 `aigc-film-init-natural-entry`。"
  - id: aigc-root-entry
    trigger: AIGC 创作项目初始化、阶段切换、续跑、总入口判定
    rule: "优先进入 `.agents/skills/aigc/SKILL.md`，由根技能路由到一个明确阶段"
  - id: story-root-entry
    trigger: story2026 小说项目初始化、阶段切换、续跑、总入口判定，或命中 `projects/story/<项目名>/`
    rule: "优先进入 `.agents/skills/story/SKILL.md`，由根技能路由到一个明确阶段；小说项目 canonical runtime 固定为 `projects/story/<项目名>/`。"
  - id: story-repair-satellite-entry
    trigger: 命中 `$story-repair`、`story/repair`、小说局部修改、线索修复、伏笔修复、设定纠偏、章节局部返工，或用户指出“牵一发而动全身”需要同步设定、规划、已产出正文、后续生成约束、review 或 return
    rule: "进入 `.agents/skills/story/repair/SKILL.md`；先加载 story 根合同、repair 的 `SKILL.md + CONTEXT.md`、项目 `MEMORY.md` 与相关 `CONTEXT/`，产出 impact map，按 source-first 顺序修复 canonical owner，再把正文创作性修复交回 owning stage 和原 provider lane，最后以 `code-reviewer` 口径执行验收。"
  - id: aigc-project-runtime-canonical
    trigger: 命中 `.agents/skills/aigc/SKILL.md` 及其阶段技能
    rule: "`projects/aigc/<项目名>/` 是 AIGC 项目任务的运行时唯一真源；`.codex/state/tasks/<task_id>/` 只作为可选治理镜像"
  - id: aigc-bootstrap-compat-mode
    trigger: 命中 `.agents/skills/aigc/` 大规模重构、阶段合同重写、子路径迁移或 schema 重建
    rule: "当 `aigc.contract_mode=bootstrap_compat` 时，harness 只强制保留项目级 runtime / governance carriers、已启用卫星技能入口与高风险 preflight / validation gate；不把当前阶段内细节视为冻结真源"
  - id: aigc-shelved-stages
    trigger: "命中已登记为 `contract_status: shelved` 的 AIGC 阶段、旧阶段路径或等待重构的阶段入口"
    rule: "搁浅阶段不得作为默认执行入口；仅允许查询、迁移映射、兼容回读或显式恢复计划。若需要重新启用，应先更新 `.codex/registry/skills.yaml`、本 routes 表、相关 stage `SKILL.md` 与审计脚本锚点。"
  - id: aigc-episode-split-entry
    trigger: 命中 `1-分集`、小说原文分集、按集拆分、`projects/aigc/<项目名>/源`，或要求输出 `projects/aigc/<项目名>/1-分集/第N集.md`
    rule: "进入 `.agents/skills/aigc/1-分集/SKILL.md`；默认读取 `projects/aigc/<项目名>/源/`，用户显式指定其他小说原文资料时以用户路径为准。若原资料自带集数划分，以其为准；否则默认按 2500-3000 字左右一集切分，输出到 `projects/aigc/<项目名>/1-分集/第N集.md`。"
  - id: aigc-directing-stage-entry
    trigger: 命中 `2-编导`、编导、剧本化改编、按集剧本、从 `1-分集` 到 `2-编导`，或要求输出 `projects/aigc/<项目名>/2-编导/第N集.md`
    rule: "进入 `.agents/skills/aigc/2-编导/SKILL.md`；读取 `projects/aigc/<项目名>/1-分集/第N集.md`，以忠实剧本化结构投影输出到 `projects/aigc/<项目名>/2-编导/第N集.md`。不得摘要、删减、重排剧情事实；对白逐字保真；必须执行场景 slugline、字段分流与声画配对门禁。"
  - id: aigc-cinematography-stage-entry
    trigger: 命中 `3-摄影`、摄影、分镜摄影、镜头语言、运镜、画面句子下加镜头语言、从 `2-编导` 到 `3-摄影`，或要求输出 `projects/aigc/<项目名>/3-摄影/第N集.md`
    rule: "进入 `.agents/skills/aigc/3-摄影/SKILL.md`；读取 `projects/aigc/<项目名>/2-编导/第N集.md`，按画面句子执行画面匹配、节拍分析和镜头语言注入，在每个命中画面句子下方新增 `镜头语言：` 与连续 `分镜N:`，输出到 `projects/aigc/<项目名>/3-摄影/第N集.md`。不得改写原编导稿事实、对白和顺序。"
  - id: aigc-grouping-stage-entry
    trigger: 命中 `4-分组`、分组、分镜组、从 `3-摄影` 到 `4-分组`、入场画面、出场画面，或要求输出 `projects/aigc/<项目名>/4-分组/第N集.md`
    rule: "进入 `.agents/skills/aigc/4-分组/SKILL.md`；读取 `projects/aigc/<项目名>/3-摄影/第N集.md` 与 `projects/aigc/<项目名>/0-初始化/north_star.yaml`，按真实集-场-组生成 `x-y-z` 分镜组，直引 `全局风格提示词 / 类型元素提示词 / 画面风格`，添加成对一致的入场/出场补位画面和组底 YAML 统计，输出到 `projects/aigc/<项目名>/4-分组/第N集.md`。不得改写摄影稿正文、对白、镜头语言或场景顺序。"
  - id: aigc-query-satellite-entry
    trigger: 命中项目状态查询、阶段产物取证、编导/主体/画面/视频资产定位或治理工件查证
    rule: "优先进入 `.agents/skills/aigc/query/SKILL.md`；若问题实为阶段内细节，再由 `query` 回接根技能或目标阶段"
  - id: aigc-resume-satellite-entry
    trigger: 命中中断项目续跑、阶段恢复、治理工件缺口补齐、重建最后稳定入口
    rule: "优先进入 `.agents/skills/aigc/resume/SKILL.md`；先修 canonical runtime 与治理工件，再回接根技能或目标阶段"
  - id: aigc-review-satellite-entry
    trigger: 命中 checkpoint 审计点、阶段总验、package release gate、跨阶段 handoff review、或需要把阶段问题结构化聚合成 repair route
    rule: "优先进入 `.agents/skills/aigc/review/SKILL.md`；先锁 `checkpoint_inline / stage_acceptance / package_release` mode，再组装 review fact pack、读取 mandatory dimension specs、执行维度审计，并把 aggregate gate packet 回写到 `projects/aigc/<项目名>/review/`。"
  - id: aigc-image-stage-entry
    trigger: 命中 `6-图像` 或 legacy `5-Image`，或需要把 `3-摄影` / `5-设计` 资产组织成图像请求 JSON、引用绑定结果或 provider-ready 图像 handoff
    rule: "优先进入 `.agents/skills/aigc/6-图像/SKILL.md`；若是单一四段式 `分镜ID`、分镜画面、生图提示词或需要从 `projects/aigc/<项目名>/4-分组` 拆镜生成 AIGC 图像，路由到 `.agents/skills/aigc/6-图像/A-分镜画面/SKILL.md`，输出根路径固定为 `projects/aigc/<项目名>/6-图像/A-分镜画面`；若是单一 `分镜组ID` 的多格 storyboard / 分镜故事板端到端准备，路由到 `B-分镜故事板`；legacy `5-Image` 仅作为旧包兼容回读，不再作为 `6-图像` 默认入口。"
  - id: aigc-design-prop-entry
    trigger: 命中 `5-设计/道具`、道具清单、道具设计、道具生成、道具面板、道具 panel layout、或批量 5-设计 道具输出
    rule: "道具清单任务直达 `.agents/skills/aigc/5-设计/道具/1-清单/SKILL.md`；设计/生成任务按 registry child_index 路由到 `2-设计` 或 `3-生成`；输出到 `projects/aigc/<项目名>/5-设计/道具/` 对应子目录。"
  - id: aigc-design-character-entry
    trigger: 命中 `5-设计/角色`、角色清单、角色设计、角色生成、角色面板、CharacterPanel、角色 panel layout、或批量 5-设计 角色输出
    rule: "角色清单任务直达 `.agents/skills/aigc/5-设计/角色/1-清单/SKILL.md`；设计/生成任务按 registry child_index 路由到 `2-设计` 或 `3-生成`；输出到 `projects/aigc/<项目名>/5-设计/角色/` 对应子目录。"
  - id: aigc-design-scene-entry
    trigger: 命中 `5-设计/场景`、场景清单、场景设计、场景生成、场景面板、场景九宫格、scene panel，或需要把场景设计 prompt 自动转成生成请求
    rule: "场景清单任务直达 `.agents/skills/aigc/5-设计/场景/1-清单/SKILL.md`；设计/生成任务按 registry child_index 路由到 `2-设计` 或 `3-生成`；输出到 `projects/aigc/<项目名>/5-设计/场景/` 对应子目录。"
  - id: aigc-video-stage-entry
    trigger: 命中 `7-视频`、`A-分镜画面参照`、`B-分镜故事板参照`、`C-主体参照`、`D-主板混合参照`、分镜画面参照视频生成、分镜故事板参照视频生成、主体参照视频生成、主板混合参照视频生成、Dreamina 分镜组批量视频，或 legacy `6-Video`
    rule: "若明确要求“分镜画面参照 / 单帧图参照 / frame reference / 以 4-分组 + 6-图像/A-分镜画面 批量出视频 / 分镜ID@路径”，路由 `.agents/skills/aigc/7-视频/A-分镜画面参照/SKILL.md`，输出根路径固定为 `projects/aigc/<项目名>/7-视频/A-分镜画面参照/`；若明确要求“分镜故事板参照 / 故事板图参照 / storyboard reference / 以 4-分组 + 6-图像/B-分镜故事板 批量出视频”，路由 `.agents/skills/aigc/7-视频/B-分镜故事板参照/SKILL.md`，输出根路径固定为 `projects/aigc/<项目名>/7-视频/B-分镜故事板参照/`；若明确要求“主体参照 / 角色服装道具场景参照 / Dreamina 批量出视频”，路由 `.agents/skills/aigc/7-视频/C-主体参照/SKILL.md`，输出根路径固定为 `projects/aigc/<项目名>/7-视频/C-主体参照/`；若明确要求“D-主板混合参照 / 主体参照和分镜故事板参照合二为一 / 同一分镜组 prompt 同时导入主体参照图和分镜故事板 / 主体后 @参照图 + 故事板总参照”，路由 `.agents/skills/aigc/7-视频/D-主板混合参照/SKILL.md`，输出根路径固定为 `projects/aigc/<项目名>/7-视频/D-主板混合参照/`；legacy `.agents/skills/aigc/6-Video/` 只作为旧产物、旧链路或明确点名旧路径时的兼容回读。"
  - id: bootstrap-governance-first
    trigger: 仓库初始化、架构升级、长流程治理、跨仓继承
    rule: "先走治理链，再扩业务 skill"
  - id: legacy-import-needs-mapping
    trigger: 从 AIGC-ZEN-VOID 引入任何目录、skill、脚本或规则
    rule: "必须先登记 heritage mapping，再进入执行"
  - id: high-risk-review-gate
    trigger: 涉及重构、批量迁移、状态修复、基础规则变更
    rule: "必须经过门下省预审"
  - id: command-github-issue-entry
    trigger: 命中 `/github-issue`、GitHub Issue URL、Issue 编号并要求闭环修复，或需要把 Issue 与提交/PR 关联
    rule: "进入 `.agents/skills/commands/github-issue/SKILL.md`；直接按该目录级 skill 的 canonical 流程执行问题理解 -> 根因定位 -> 修复 -> 验证 -> 提交/PR。"
  - id: command-github-push-entry
    trigger: 命中 `/github-push`、要求把当前正式改动同步到 GitHub，或需要在已有远端前提下做清理+提交+推送
    rule: "进入 `.agents/skills/commands/github-push/SKILL.md`；直接按该目录级 skill 的 canonical 流程执行清理、提交、推送与最小一致性校验。"
  - id: command-next-entry
    trigger: 命中 `/next`、需要刷新编号技能树下游交互、阶段链 `Interaction` 合同，或需要把旧命令式下游提示迁移成当前仓库 skills 交互
    rule: "进入 `.agents/skills/commands/next/SKILL.md`；直接按该目录级 skill 的 canonical 流程，并按显式合同优先刷新目标目录的 `## Interaction`。"
  - id: command-subagent-review-entry
    trigger: 命中 `.agents/skills/commands/subagetns/review`、需要命令树内部 `single-reviewer` 审计子智能体、或父级流程显式 dispatch 一个 bounded review subagent
    rule: "进入 `.agents/skills/commands/subagetns/review/SKILL.md`；默认按真实 reviewer subagent 运行，输出 findings-first 审计结果；若被上层策略阻断，则必须显式降级为 `degraded-local-review` 并报告阻断来源。"
  - id: command-subagent-preview-entry
    trigger: 命中 `.agents/skills/commands/subagetns/preview`、需要命令树内部执行前顾问团预演、或父级流程希望先用显式顾问组/项目 `team.yaml` 解析 advisor council 再正式执行
    rule: "进入 `.agents/skills/commands/subagetns/preview/SKILL.md`；默认优先采用显式 advisor_group，否则回退到项目 `team.yaml` 解析顾问 roster，并在可行时真实启动 advisor subagents 产出 decision packet；若被上层策略阻断，则必须显式降级为 `degraded-local-council` 并报告阻断来源。"
  - id: learn-beiming-shengong-entry
    trigger: 命中 `北冥神功`、skills-update 自学习、升级某个 skill、把外部知识点吸收到目标 skill、或需要先研究目标 skill 当前配置与所在技能组上下文再完成技能升级
    rule: "进入 `.agents/skills/learn/北冥神功/SKILL.md`；先锁 `target_skill + upgrade_points`，读取目标 skill 的 `SKILL.md + CONTEXT.md` 与相关父级/sibling/shared carrier，再按吸收矩阵裁决 `landing_set + sync_scope`，必要时同步 registry/routes、shared carrier 与 reviewer gate，最后完成 target + self 双重 learning deposition。"
  - id: comic-root-entry
    trigger: 命中漫画项目、完整漫画链路、从素材/小说到九页漫画图、或需要统一落盘到 `projects/comic/[项目名]/`
    rule: "优先进入 `.agents/skills/comic/SKILL.md`；先锁定 `project_name` 与 `projects/comic/[项目名]/` 项目根，再路由到 `1-漫画小说改编 / 2-九刀流漫画提示词 / 3-漫画生成 / 4-剧集海报`。"
  - id: comic-novel-adaptation-entry
    trigger: 命中文本、图片、视频、新闻事件或网络热搜，需要改编为后续漫画生成可用的小说底稿
    rule: "进入 `.agents/skills/comic/1-漫画小说改编/SKILL.md`；默认落到 `projects/comic/[项目名]/1-漫画小说改编/`，先做来源归一与事实边界裁决，再输出 `漫画小说主稿 + 漫画桥接包 + 思行裁决摘要`。"
  - id: comic-nine-blade-prompts-entry
    trigger: 命中九刀流漫画提示词、小说转 9 页漫画 prompt、一次生成 9 张漫画页的 JSON 提示词、或需要把漫画小说桥接包交给 3 号 CLI imagegen 执行层
    rule: "进入 `.agents/skills/comic/2-九刀流漫画提示词/SKILL.md`；默认落到 `projects/comic/[项目名]/2-九刀流漫画提示词/nine_blade_comic_prompts.json`，输出 `nine_blade_comic_prompts.v1` JSON，固定 9 页、9:16、逐页 CLI imagegen 可投影、非九宫格拼图、非同图九变体。"
  - id: comic-generation-entry
    trigger: 命中漫画生成、已有 `nine_blade_comic_prompts.v1` JSON 需要生图、或需要通过 `.agents/skills/cli/imagegen` 生成 9 张连续竖版漫画页
    rule: "进入 `.agents/skills/comic/3-漫画生成/SKILL.md`；先校验 2 号 JSON，再编译 9 个单页 CLI imagegen JSONL jobs，默认输出到 `projects/comic/[项目名]/3-漫画生成/<group_slug>/imagegen-cli/`，并使用 `.agents/skills/cli/imagegen/scripts/image_gen.py generate-batch --model gpt-image-2 --size 1152x2048`。"
  - id: comic-episode-poster-entry
    trigger: 命中剧集海报、漫画海报、episode poster、海报 JSON、短剧风漫画海报、或需要为当前集设计标题/主体/氛围/配色清晰的海报合同
    rule: "进入 `.agents/skills/comic/4-剧集海报/SKILL.md`；优先读取 `1-漫画小说改编` 与 `2-九刀流漫画提示词` 真源，必要时参考 `3-漫画生成` 图片，默认输出到 `projects/comic/[项目名]/4-剧集海报/第N集-剧集海报.json`；若用户要求海报生图，先校验 JSON，再交接 `.agents/skills/cli/imagegen`。"
  - id: api-anyfast-image-entry
    trigger: 命中 `api/anyfast/image`、`AnyFast 生图`、`AnyFast image`、`anyfast image`、或只知道要走 AnyFast 图像能力但未明确子 provider
    rule: "进入 `.agents/skills/api/anyfast/image/SKILL.md`；按父技能路由在 `nano-banana` 与 `seedream` 之间裁决：命中 `seedream / doubao-seedream / 方舟 / Ark / sequential_image_generation` 走 `.agents/skills/api/anyfast/image/seedream/SKILL.md`，命中 `nano-banana / Gemini 图片 / gemini-3.1-flash-image-preview / face-swap / costume-swap / background-swap / retouch / multiview` 走 `.agents/skills/api/anyfast/image/nano-banana/SKILL.md`，未明确 provider 时默认 `nano-banana`。"
