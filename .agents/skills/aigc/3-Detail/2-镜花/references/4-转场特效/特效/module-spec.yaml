version: 1
module_id: jinghua-fx
module_level: leaf
purpose: 只在普通画面手段无法达成时，为当前组补必要的特效或感知强化。
triggers:
  - 存在梦境、记忆、主观感知、异象或明显超常视觉需求
  - 普通画面手段与保守转场不足以完成当前桥接
must_answer:
  - 这里为什么非特效不可
  - 普通画面手段或保守转场为什么不够
  - 特效是服务情绪、时空、世界观还是主观感知
  - 若删掉特效，是否仍可成立
patch_contract:
  target_slot: fx_decision
  required_elements:
    - fx_needed_or_not
    - fx_purpose
    - restraint_rule
  optional_elements:
    - fx_gate_reason
    - non_fx_fallback
merge_policy:
  preserve_first:
    - narrative necessity
    - restraint
quality_gates:
  - 默认回答应优先是“不需要”
  - 只有在转场不足以完成桥接时才进入特效
  - 若需要，必须写清目的、触发条件与克制边界
  - 特效不得变成独立看点或替代上游事实
