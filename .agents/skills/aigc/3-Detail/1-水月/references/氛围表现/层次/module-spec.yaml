version: 1
module_id: watermoon-atmosphere-layering
module_level: leaf
branch_key: atmosphere
leaf_key: layering
purpose: 围绕场景桥段中的前景、中景、背景建立层次化空间支架，让动作承接、情绪托举和画面纵深都有明确落点。
triggers:
  - 需要补足场景桥段的前景/中景/背景层次
  - 当前 prose 只有整体气氛，没有空间分层支架
must_answer:
  - 近处先被感知的是什么
  - 中段承接动作的层是什么
  - 远处或边缘如何托住情绪
  - 前景/中景/背景各自承担什么叙事作用
patch_contract:
  target_slot: atmosphere_patch
  append_fields:
    - foreground_anchor
    - midground_action_plane
    - background_echo
    - layered_scene_role
merge_policy:
  keep:
    - 材质
    - 距离
    - 空气感
    - 前中后景职责分工
quality_gates:
  - 不得只剩“昏暗/空旷”一类平面描述
  - 不得把前景/中景/背景写成纯装饰分层
