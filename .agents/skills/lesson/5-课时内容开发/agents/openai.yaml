interface:
  display_name: "课时内容开发"
  short_description: "基于知识模型、目标蓝图和课程架构，开发每课时讲授内容、讲师稿、学员材料、案例解释、概念展开和媒体占位。"
  default_prompt: "Use $lesson-content-development when the user asks for 5-课时内容开发, lesson content development, per-lesson teaching content, instructor scripts, learner materials, case explanations, concept expansion, or media placeholders after lesson knowledge modeling, objectives, and course architecture. Default upstream inputs are stage 2 knowledge modeling outputs, stage 3 objectives/evaluation blueprint, and stage 4 teaching strategy/course architecture. Produce Markdown outputs under `projects/lesson/<项目名>/5-课时内容开发/`: lesson-content-pack.md, instructor-script.md, learner-materials.md, case-and-concept-notes.md, media-placeholders.md, and downstream-handoff.md. Do not generate a complete activity question bank, visual system, DOC/PPT/HTML deliverables, or scripted/template-generated lesson prose in this stage; creative lesson content must be authored through LLM-first judgment."
