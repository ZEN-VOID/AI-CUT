  - 中二感
  - 命名战斗
semantic_tags:
  - battle
  - upgrade
  - team-bond
  - victory-burst
  - oath
  - destiny
stage_projection:
  script_adaptation:
    focus:
      - 压制
      - 宣言
      - 反击
      - 宿命对决
  nine_blade_prompting:
    layout_bias:
      - impact burst
      - power splash
      - diagonal attack
      - ritual frame
  image_generation:
    render_bias:
      - speed line contrast
      - victory pose silhouette
      - symbolic marks
  animation_generation:
    motion_bias:
      - charge then strike
      - forward momentum
      - pre-release hold
  episode_poster:
    poster_bias:
      - 宣战
      - 反击
      - 不服输
      - 宿命对决
control_surface:
  conflict_engine:
    premise: 主角在更大的规则世界里被迫升级、立誓、结盟并翻盘。
    escalation_loop: 压制现状 -> 立场显形 -> 新理解或新代价 -> 关系/胜负改写。
    payoff: 突破必须同时兑现人格声明、关系位移和战力变化。
  role_matrix:
    protagonist: 主动求胜且短板可见的成长者。
    rival_or_counterforce: 既是战力镜像也是价值镜像的宿敌或秩序代表。
    allies: 提供战术补位、情绪锚点与价值纠偏的同伴团。
    observers_or_pressure: 观众、师长、世界规则承担见证与施压功能。
  page_turn_mechanism:
    setup_pattern: 先压制与蓄压，再把突破前的迟疑拉长。
    turn_trigger: 招式命名、宿敌惊讶、代价落身、逆转前摇。
    reveal_pattern: 翻页后先给姿态与结果，再补局部解释。
    carry_forward_rule: 每次翻页必须把力量变化落回关系或下一层门槛。
  panel_grammar:
    dominant_panel_shapes:
      - 斜切突进格
      - 爆点大跨页
      - 反应插格
    expansion_nodes:
      - 宣言
      - 初次反杀
      - 新地域显形
    compression_nodes:
      - 连招交换
      - 受伤确认
      - 旁观者反应
    negative_space_policy: 爆点前允许短暂留白，但不能长时间失去前冲势能。
  visual_carrier:
    primary:
      - 身体姿态
      - 速度轨迹
      - 宿敌对视
    secondary:
      - 符号印记
      - 武器轮廓
      - 受伤痕迹
    prohibited_shortcuts:
      - 只用术语解释升级
      - 只靠特效不靠动作逻辑
  dialogue_register:
    line_length: short
    monologue_density: low
    narration_role: minimal
    exposition_rule: 设定说明必须让位于宣言、动作结果和旁观反应。
  motif_system:
    recurring_motifs:
      - 誓言
      - 宿命双生
      - 代价印记
      - 破碎地貌
    payoff_rule: 母题要在突破、败北和再起时反复回返，而不是只做一次性装饰。
  failure_modes:
    - 打斗很长，但关系没有位移。
    - 设定说明压过动作因果。
    - 全程只有燃词，没有具体短板与门槛。
