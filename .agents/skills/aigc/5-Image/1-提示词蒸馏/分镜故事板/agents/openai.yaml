interface:
  display_name: "AIGC 5-Image 分镜故事板"
  short_description: "把分镜组蒸馏为多格 storyboard 图像请求 JSON"
  default_prompt: "Use $aigc-storyboard-sheet to read `projects/aigc/<项目名>/3-Detail/第N集.json`, lock one canonical storyboard group, consume `正文切分参考[]` plus each shot's `正文回指`, assemble the prompt as fixed English prefix + group design block + shot lines, fill the shared image request template, and write the canonical `第N集.json` under `projects/aigc/<项目名>/5-Image/分镜故事板/`."
