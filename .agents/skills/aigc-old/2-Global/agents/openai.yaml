interface:
  display_name: "AIGC 2-Global"
  short_description: "JSON-first 收束全局导演 seed，默认真人古装写实风格。"
  default_prompt: "Use $aigc-global to read the current episode grouping plus init presets, treat `.agents/skills/aigc/2-Global/templates/episode-root.template.json` as the only fill template, then write `projects/aigc/<项目名>/2-Global/第N集.json` as the only creative business output for that episode. Keep `validation-report.md` as a governance sidecar only. For `project_global.全局风格`, default to the live-action costume cinematic realism baseline: real skin and costume texture, natural hair, physical lighting, readable highlights and shadows, cinematic depth, restrained stable camera language, physically plausible action feedback, 4K HDR color grading, light film grain, and no anime linework/cel layering/exaggerated motion trails. If project-root `team.yaml` enables `roles.supervision`, consume that role only as pre-draft advisory; do not run post-write supervision refine from this stage contract. Do not generate legacy Markdown outputs."
