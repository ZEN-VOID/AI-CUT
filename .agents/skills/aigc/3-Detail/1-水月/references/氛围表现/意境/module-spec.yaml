version: 1
module_id: watermoon-atmosphere-imagery
module_level: leaf
branch_key: atmosphere
leaf_key: imagery
purpose: 在氛围渲染中组织情景交融，让情绪通过景物、光色、空气和距离感被看见，而不是停在抽象抒情。
triggers:
  - 分镜组需要情绪基调或抒情牵引
  - 需要让场景之情与人物之情彼此映照
must_answer:
  - 当前主感受偏冷、闷、悬还是柔
  - 这种感受通过哪个具体物象被看见
  - 哪句抒情必须删，换成什么可见细节
  - 景与情是怎样互相沾染而不是彼此分离的
patch_contract:
  target_slot: atmosphere_patch
  append_fields:
    - mood_temperature
    - image_carrier
    - scene_emotion_binding
merge_policy:
  keep:
    - 具体物象
    - 情景交融
  avoid:
    - 纯抽象感慨
    - 脱离场景的单向情绪喊话
quality_gates:
  - 必须有物象承载
  - 不得把意境写成空话
  - 意境必须体现景承情、情染景
