schema_version: 2
manifest_id: 0622-video-material-index
manifest_name: F1视频素材结构化选材索引
created_at: '2026-06-21'
updated_at: '2026-06-21'
base_dir: /Volumes/AIGC/AI-CUT/projects/0622/素材/视频
purpose: 为 F1 自动剪辑提供可用于选材、截段、拼接、字幕避让和 EDL 生成的结构化素材索引。
consumer_contract:
  primary_consumers:
  - F1
  read_phase: N1-INTAKE
  apply_phase: N5-VISUAL-PLAN
  verify_phase: N7-VERIFY
  authority: 素材事实索引与选材辅助层。
  not_authority:
  - 不得替代 ffprobe、抽帧验证、用户文案真源、旁白主时钟或最终 EDL 裁决。
  - 不得仅凭本 YAML 判定字幕不遮挡，必须在 final 或预览帧中验证。
  fallback: 若 YAML 缺失、解析失败、文件不存在、时长差异超过 0.25 秒或抽帧与描述冲突，F1 回退到 ffprobe + 抽帧人工观察，并在报告记录
    manifest_mismatch。
field_model:
  video_level_required:
  - id
  - file
  - category
  - role
  - media
  - content_profile
  - selection_profile
  - splicing_profile
  - subtitle_safe_zone
  - segments
  segment_level_required:
  - segment_id
  - start/end/duration_sec
  - visual_content
  - semantic_tags
  - shot_type/motion/action_intensity
  - text_overlay
  - best_for/avoid_for
  - splice_notes
global_editing_policy:
  path_resolution: videos[].file 均相对 base_dir 解析。
  default_audio_policy: 所有视频原音只作参考，F1 final 默认以用户旁白为主音轨。
  runtime_validation:
  - 每次执行前重新 ffprobe。
  - 每个入选素材至少抽 1 帧验证画面与 YAML 描述一致。
  - 若使用 subtitle_safe_zone.risk_level 为 high 的素材，必须抽最终字幕帧验证遮挡。
  default_clip_length_sec:
    operation_demo:
      min: 2.5
      ideal: 5.0
      max: 9.0
    tool_display:
      min: 2.5
      ideal: 4.0
      max: 7.0
    aigc_content:
      min: 2.0
      ideal: 4.5
      max: 8.0
  selection_priority:
  - 操作步骤、实操演示、前后对比、流程证明：优先 operation_demo。
  - AI 工具、提示词、生成流程、剪辑软件、导入导出、资产证明：优先 tool_display。
  - 剧情、打斗、玄幻、角色冲突、爆发、尾钩：优先 aigc_content。
