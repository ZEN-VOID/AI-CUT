    trigger: 命中朴赞郁视角、朴赞郁会怎么拍、Park Chan-wook perspective、像老男孩/小姐/分手的决心那样处理，或导演组需要处理复仇、禁忌欲望、侦探爱情、情色惊悚、黑色幽默、改编转译、精密美术与声音剪辑机关
