schema_version: "openai-agent-skill/v1"
skill:
  name: "aigc-image-storyboard-frame"
  path: ".agents/skills/aigc/6-图像/A-分镜画面"
interface:
  display_name: "AIGC 分镜画面"
  short_description: "从 4-分组生成四段式镜级生图 prompt、主体参照绑定与 imagegen 批量生成。"
  default_prompt: "使用 $aigc-image-storyboard-frame，从 projects/aigc/<项目名>/4-分组 提取镜级分镜，生成英文 AIGC 生图提示词，绑定角色/场景/道具图片参照，并按需调用 imagegen 批量生成。"
