name: aigc-storyboard-style
version: 1
description: AIGC 影片项目分镜节奏、镜头组合与连接风格协议制定阶段。
entrypoint: .agents/skills/aigc/2-美学/分镜风格/SKILL.md
interface:
  display_name: AIGC 2-美学/分镜风格
  short_description: 从剧本、画面基调、摄影风格或参考图/视频提取分镜节奏、景别流转、镜头组合、注意力/视点路由和声画节拍，制定约 100 字中文分镜风格 prompt
  default_prompt: "使用 $aigc-storyboard-style，基于 projects/aigc/<项目名>/1-分集/、2-美学/画面基调/全局风格协议.md、摄影风格或我提供的参考资料，提取分镜节奏、景别流转、镜头组合、注意力/视点路由、连接语法、信息揭示/声画节拍、信息密度和下游执行边界；若来源或目标明确为第N集，输出到 projects/aigc/<项目名>/2-美学/第N集/分镜风格/分镜风格协议.md，否则输出项目级基线 2-美学/分镜风格/分镜风格协议.md。最终 Storyboard Style Prompt 默认中文约 100 字，禁止具体分镜正文、镜头编号、剧情动作、资产设计、摄影参数和参考内容照搬。"
runtime:
  required_context:
    - .agents/skills/aigc/2-美学/分镜风格/SKILL.md
    - .agents/skills/aigc/2-美学/分镜风格/CONTEXT.md
  default_output_root: projects/aigc/<项目名>/2-美学/
  scope_output_roots:
    episode_scoped: projects/aigc/<项目名>/2-美学/第N集/分镜风格/
    series_baseline: projects/aigc/<项目名>/2-美学/分镜风格/
  llm_first: true
