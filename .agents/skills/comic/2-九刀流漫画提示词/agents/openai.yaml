interface:
  display_name: "九刀流漫画提示词"
  short_description: "优先消费上游漫画剧本结构化包；必要时再格式化原始剧本，并先按约 500 字原文切成 page-group，再分别蒸馏成一次生成 9 张、主角锚定、群像可区分、场景稳定且带右下角数字页码的连续漫画页提示词 JSON"
  default_prompt: "Use $comic-nine-blade-prompts to prefer the upstream formatted_source_script packet from $comic-script-adaptation, or normalize any raw script source into formatted_source_script when needed, then partition the canonical source into page-groups using roughly 500 original Chinese characters per 9-page rhythm unit while preserving scene, hook, and payoff boundaries. For each page-group, generate one nine_blade_comic_prompts.v1 JSON for one Seedream sequential request that creates exactly 9 separate vertical comic pages, injects one main_character_lock anchor into every page prompt, keeps active recurring characters visually consistent and clearly distinguishable, keeps scene continuity across pages and across groups, preserves one stable visual DNA across all groups, and places a bottom-right numeric page number 1-9 on every page."
