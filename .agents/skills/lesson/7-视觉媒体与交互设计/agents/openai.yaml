interface:
  display_name: "视觉媒体与交互设计"
  short_description: "基于 3-6 阶段设计课程视觉、媒体、图解、交互和无障碍约束。"
  default_prompt: "Use $lesson-visual-media-interaction when the user asks for 7-视觉媒体与交互设计, lesson visual system, media asset brief, diagram or infographic planning, interaction model, accessibility requirements, or PPT/HTML visual delivery constraints after stages 3-6. Consume learning objectives, course architecture, lesson content, activities, exercises, and assessments as upstream anchors. Produce visual-system.md, media-asset-brief.md, diagram-and-infographic-plan.md, interaction-model.md, accessibility-requirements.md, delivery-visual-constraints.md, and downstream-handoff.md under projects/lesson/<项目名>/7-视觉媒体与交互设计/ when project-bound. Do not generate final PPTX, HTML, DOCX, lesson scripts, question banks, or final deliverables in this stage; if actual HTML generation or redesign is requested, route to 8-多端交付生成/html and require .agents/skills/claude-design for the HTML artifact execution."
