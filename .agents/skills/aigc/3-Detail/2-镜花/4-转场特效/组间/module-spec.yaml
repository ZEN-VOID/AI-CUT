version: 1
module_id: jinghua-inter-group-transition
module_level: leaf
purpose: 为当前组尾出帧与下一组首入锚之间预埋组间衔接钩子，以最小送入而非预写下一组为原则。
triggers:
  - 当前组结尾承担情绪翻页、时间跳切、空间切换或感知收束任务
  - 当前组与下一组边界存在值得处理的衔接问题
  - 当前组尾出帧与下一组首入锚之间存在可识别的主导 delta
  - 组界需要通过依赖型、流动型、变形型或复合型语法组织送入
must_answer:
  - 当前组尾出帧与下一组首入锚之间的主导 delta 是什么
  - 组界送入更适合依赖型、流动型、变形型还是复合型
  - 尾出帧与首入锚之间是否存在需要说明的透视适应
  - 当前组边界要解决的是时间、空间、情绪还是视觉母题承接问题
  - 当前组该如何把观众送入下一组
  - 组间衔接靠保持干净直切、尾钩还是情绪、动作、视觉母题承接
  - 当前组是否需要留尾钩
patch_contract:
  target_slot: inter_group_hook
  required_elements:
    - outgoing_hook
    - transition_basis
    - next_group_readiness
  optional_elements:
    - boundary_problem_type
    - connection_type
    - exit_entry_delta
    - anchor_or_flow_basis
    - perspective_adaptation
    - cut_priority_note
    - interpolation_hint
merge_policy:
  preserve_first:
    - clean boundary
    - exit-entry anchoring
    - group boundary clarity
    - emotional carryover
quality_gates:
  - 先锁定尾出帧与首入锚的主导 delta，再决定是否需要显式尾钩
  - 先判断普通收尾或直切是否已足够
  - 若景别、位置或朝向明显变化，必须写出透视适应；若无变化，也应明确“保持一致”
  - 组间提示只能作为尾钩，不得吞掉当前组主线
  - 不得发明不存在的下一组事实
  - 不承担 `6.2.3` 的双向 `connection_optimization` 回填职责，只消费其方法语法
  - 四类连接只作为组界送入语法，不得膨胀成完整视频 prompt
  - 尾钩只保留最小但可感知的送入收益
