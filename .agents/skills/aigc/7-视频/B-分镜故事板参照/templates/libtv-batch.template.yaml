schema_version: "aigc.video.storyboard_reference.libtv_batch.v1"
project_name: "<项目名>"
episode_id: "第N集"
source_group_file: "projects/aigc/<项目名>/4-分组/第N集.md"
storyboard_reference_root: "projects/aigc/<项目名>/6-图像/B-分镜故事板/第N集"
output_root: "projects/aigc/<项目名>/7-视频/B-分镜故事板参照/第N集"
execution:
  provider: "libtv"
  background: true
  concurrency: 4
  queue_ledger: "projects/aigc/<项目名>/7-视频/B-分镜故事板参照/第N集/第N集-libtv-queue.md"
  result_file: "projects/aigc/<项目名>/7-视频/B-分镜故事板参照/第N集/第N集-libtv-results.json"
defaults:
  requested_model: ""
  duration_source: "group_yaml"
  duration_estimate_seconds: 12
  duration_rule: "clamp(duration_estimate_seconds, 4, 15)"
  duration_hint: 12
  duration: 12
  ratio: "16:9"
  video_resolution: "720p"
  enableSound: "on"
  poll: 45
  prompt_fidelity_mode: "strict_original"
  allow_libtv_prompt_optimization: false
  transport_only_projection: true
  slot_binding_phase: "draft"
  generation_slot_source: ""
jobs:
  - queue_id: "Q-001"
    group_id: "1-1-1"
    source_heading: "## 1-1-1"
    command_type: "libtv_session_with_uploaded_references"
    remote_prompt_contract_version: "storyboard_reference_direct_video_v1"
    remote_submission_path: "projects/aigc/<项目名>/7-视频/B-分镜故事板参照/第N集/prompts/1-1-1-libtv-submission.txt"
    reference_status: "found"
    reference_images:
      - path: "projects/aigc/<项目名>/6-图像/B-分镜故事板/第N集/images/1-1-1.png"
        uploaded_url: ""
        marker: "uploaded_url_binding"
        role: "storyboard_sheet"
        source: "6-图像/B-分镜故事板"
        oss_upload_index: 1
    storyboard_uploads:
      - group_id: "1-1-1"
        role: "storyboard_sheet"
        uploaded_url: ""
        note: "身份映射；不承载图1顺序真源。"
    generation_slots:
      - slot: 1
        imageList_index: 0
        uploaded_url: ""
        role: "storyboard_sheet"
        name: "故事板总参照"
        image_token: "{{Image 1}}"
        slot_source: "ui_thumbnail_order | post_submit_imageList | submit_plan_expected_order"
        note: "最终 reference_index=1 以 UI 图1 或本槽位为准。"
    reference_image_budget:
      max_images: 9
      selection_rule: "B 路线只允许单张故事板总参照进入 imageList；多候选必须唯一裁决或阻断。"
      excluded_due_to_budget: []
    prompt: |
      <draft: 直接粘贴 source-first YAML 分镜组全文且不写 reference_index/uploaded_url；final: 仅在 fenced YAML 内按 generation_slots 注入 故事板参照.reference_index/uploaded_url/image_token>
    remote_submission_required_opening: |
      【LibTV 调用锁定】
      provider: seedance2.0
      taskType: video
      modeType: singleImage2video
      imageList: ["<uploaded_url_1>"]
      imageList 单个分镜组最多 9 张图；B 路线有图时只允许 1 张故事板总参照；提交文本不得预设“参照图1/2/N”人工编号。
      源层规则：storyboard_uploads 只记录 group_id/storyboard_sheet -> uploaded_url；generation_slots 才记录 UI 图1/imageList[0] -> uploaded_url -> 故事板总参照；UI 槽位可观测时以 UI 图1 为准。
      duration: <duration_hint>
      duration_rule: 从当前分镜组时长估算计算；小于等于4秒按4秒，4到15秒之间按估算值，大于等于15秒按15秒。
      ratio: 16:9
      resolution: 720p
      enableSound: on
      prompt_fidelity_mode: strict_original
      allow_libtv_prompt_optimization: false
      transport_only_projection: true
      禁止提示词优化、禁止重新编排、禁止摘要、禁止改写、禁止补镜头。
      只允许执行 transport_only 投影：上传 URL、imageList、duration、ratio、resolution、enableSound。
    libtv:
      requested_model: ""
      duration_source: "group_yaml"
      duration_estimate_seconds: 12
      duration_rule: "clamp(duration_estimate_seconds, 4, 15)"
      duration_hint: 12
      duration: 12
      ratio: "16:9"
      video_resolution: "720p"
      enableSound: "on"
      poll: 45
      prompt_fidelity_mode: "strict_original"
      allow_libtv_prompt_optimization: false
      transport_only_projection: true
    output:
      session_id: ""
      project_uuid: ""
      project_url: ""
      download_dir: "projects/aigc/<项目名>/7-视频/B-分镜故事板参照/第N集"
      expected_video_path: "projects/aigc/<项目名>/7-视频/B-分镜故事板参照/第N集/1-1-1.mp4"
