interface:
  display_name: "AIGC 摄影"
  short_description: "基于 7-分镜 和 3-美学画面基调/摄影风格，为逐集分镜内联注入摄影·运镜手法。"
  default_prompt: "使用 $aigc-camera-movement-injection，默认读取 projects/aigc/<项目名>/7-分镜/第N集.md；如用户指定文稿则以指定文稿为 source。必须结合 projects/aigc/<项目名>/3-美学/画面基调/全局风格协议.md 与 3-美学/摄影风格/摄影风格协议.md，先理解题材、情节、剧本正文、画面基调、大师/作品参照和摄影风格，再逐个分镜点内联注入综合运镜手法。普通格式为 分镜N（N-N秒）：原有内容。镜头角度（如何变化），镜头类型，镜头速度，焦点（静止或变化）的综合运镜手法。一镜到底时以画面点为单位输出连续组合运镜。不得改剧情、对白、场景顺序、分镜编号、分镜秒数或原有分镜内容，不生成图像 prompt、视频 prompt、设备参数或剪辑方案。"
