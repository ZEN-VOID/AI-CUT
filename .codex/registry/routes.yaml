version: 1
repo: AIGC-FILM
last_updated: 2026-04-16

default_flow:
  - step: mandate
    owner: zhongshu
    carrier: .codex/templates/harness/mandate.yaml
  - step: mission_brief
    owner: zhongshu
    carrier: .codex/templates/harness/mission-brief.yaml
  - step: preflight
    owner: menxia
    carrier: .codex/templates/harness/preflight-verdict.yaml
  - step: execution
    owner: shangshu
    carrier: .codex/state/tasks/<task_id>/
    note: 通用默认执行账本；`aigc` 项目工作流以下方 `canonical_runtime_root` 声明的 `projects/aigc/<项目名>/` 为唯一真源
  - step: validation
    owner: menxia
    carrier: .codex/templates/harness/validation-report.md
  - step: learning
    owner: menxia
    carrier: .codex/templates/harness/learning-record.md

route_policies:
  - id: aigc-root-entry
    trigger: AIGC 创作项目初始化、阶段切换、续跑、总入口判定
    rule: "优先进入 `.agents/skills/aigc/SKILL.md`，由根技能路由到一个明确阶段"
  - id: aigc-project-runtime-canonical
    trigger: 命中 `.agents/skills/aigc/SKILL.md` 及其阶段技能
    rule: "`projects/aigc/<项目名>/` 是 AIGC 项目任务的运行时唯一真源；`.codex/state/tasks/<task_id>/` 只作为可选治理镜像"
  - id: aigc-bootstrap-compat-mode
    trigger: 命中 `.agents/skills/aigc/` 大规模重构、阶段合同重写、子路径迁移或 schema 重建
    rule: "当 `aigc.contract_mode=bootstrap_compat` 时，harness 只强制保留项目级 runtime / governance carriers、卫星技能入口与 review gate；不把当前阶段内细节视为冻结真源"
  - id: aigc-query-satellite-entry
    trigger: 命中项目状态查询、阶段产物取证、编导/主体/画面/视频资产定位或治理工件查证
    rule: "优先进入 `.agents/skills/aigc/query/SKILL.md`；若问题实为阶段内细节，再由 `query` 回接根技能或目标阶段"
  - id: aigc-resume-satellite-entry
    trigger: 命中中断项目续跑、阶段恢复、治理工件缺口补齐、重建最后稳定入口
    rule: "优先进入 `.agents/skills/aigc/resume/SKILL.md`；先修 canonical runtime 与治理工件，再回接根技能或目标阶段"
  - id: aigc-review-satellite-entry
    trigger: 命中高风险预审、阶段验收、项目级 validation-report 更新、learning bridge
    rule: "优先进入 `.agents/skills/aigc/review/SKILL.md`；由门下省侧卫星技能判定 mode 后再路由到 `preflight-review / acceptance-review / learning-bridge` 子技能"
  - id: aigc-image-stage-entry
    trigger: 命中 `5-Image`，或需要把 `3-Detail/第N集.json` / `4-Design` 资产组织成图像请求 JSON、引用绑定结果或 provider-ready 图像 handoff
    rule: "先进入 `.agents/skills/aigc/5-Image/SKILL.md`；再由阶段父级路由到 `1-提示词蒸馏`、`2-参照引用` 或 `3-图像生成`"
  - id: aigc-design-prop-panel-entry
    trigger: 命中 `4-Design/3-面板/道具`、道具面板、道具 panel layout、或批量 4-Design 道具面板生图
    rule: "进入 `.agents/skills/aigc/4-Design/3-面板/道具/SKILL.md`；默认先写 `PropPanel-layout.json`，再经 `.agents/skills/aigc/4-Design/3-面板/_shared/panel_auto_generate.py` 调用 `nano-banana/general`。批量 4-Design 上下文自动绑定设计已有图片，单文件或自然语言上下文默认不绑定参照。"
  - id: aigc-design-role-panel-entry
    trigger: 命中 `4-Design/3-面板/角色`、角色面板、CharacterPanel、角色 panel layout、或批量 4-Design 角色面板生图
    rule: "先进入 `.agents/skills/aigc/4-Design/3-面板/SKILL.md`，再路由到 `.agents/skills/aigc/4-Design/3-面板/角色/SKILL.md`；默认先写 `CharacterPanel-layout.json`，再调用 `.agents/skills/api/image/nano-banana/general`。批量 4-Design 上下文自动绑定对应已有设计图片，单文件或自然语言上下文默认无参照 T2I。"
  - id: aigc-design-scene-panel-entry
    trigger: 命中 `4-Design/3-面板/场景`、场景面板、场景九宫格、scene panel，或需要把场景设计 prompt 自动转成 layout JSON 后生图
    rule: "先进入 `.agents/skills/aigc/4-Design/3-面板/SKILL.md`，再路由到 `.agents/skills/aigc/4-Design/3-面板/场景/SKILL.md`；默认通过 SMART 桥调用 `.agents/skills/api/image/nano-banana/general`，单文件/自然语言直调默认不隐式带参考图"
  - id: aigc-video-stage-entry
    trigger: 命中 `6-Video` 或需要把 `3-Detail/第N集.json` 蒸馏成视频工具入参 JSON
    rule: "先进入 `.agents/skills/aigc/6-Video/SKILL.md`；若任务是按分镜组组织视频请求，默认路由 `1-提示词蒸馏/全能参照`"
  - id: aigc-shelved-stages
    trigger: 命中 `7-Cut / 7-后期`
    rule: "显式返回“搁浅”状态与补建落点，不得伪造执行链，也不计入当前可执行阶段审计失败"
  - id: bootstrap-governance-first
    trigger: 仓库初始化、架构升级、长流程治理、跨仓继承
    rule: "先走治理链，再扩业务 skill"
  - id: legacy-import-needs-mapping
    trigger: 从 AIGC-ZEN-VOID 引入任何目录、skill、脚本或规则
    rule: "必须先登记 heritage mapping，再进入执行"
  - id: high-risk-review-gate
    trigger: 涉及重构、批量迁移、状态修复、基础规则变更
    rule: "必须经过门下省预审"
  - id: comic-root-entry
    trigger: 命中漫画项目、完整漫画链路、从素材/小说到九页漫画图、或需要统一落盘到 `projects/comic/[项目名]/`
    rule: "优先进入 `.agents/skills/comic/SKILL.md`；先锁定 `project_name` 与 `projects/comic/[项目名]/` 项目根，再路由到 `1-漫画小说改编 / 2-九刀流漫画提示词 / 3-漫画生成 / 4-剧集海报`。"
  - id: comic-novel-adaptation-entry
    trigger: 命中文本、图片、视频、新闻事件或网络热搜，需要改编为后续漫画生成可用的小说底稿
    rule: "进入 `.agents/skills/comic/1-漫画小说改编/SKILL.md`；默认落到 `projects/comic/[项目名]/1-漫画小说改编/`，先做来源归一与事实边界裁决，再输出 `漫画小说主稿 + 漫画桥接包 + 思行裁决摘要`。"
  - id: comic-nine-blade-prompts-entry
    trigger: 命中九刀流漫画提示词、小说转 9 页漫画 prompt、一次生成 9 张漫画页的 JSON 提示词、或需要把漫画小说桥接包交给 Seedream 连续多图
    rule: "进入 `.agents/skills/comic/2-九刀流漫画提示词/SKILL.md`；默认落到 `projects/comic/[项目名]/2-九刀流漫画提示词/nine_blade_comic_prompts.json`，输出 `nine_blade_comic_prompts.v1` JSON，固定 9 页、9:16、单请求连续生成、非九宫格拼图、非同图九变体。"
  - id: comic-generation-entry
    trigger: 命中漫画生成、已有 `nine_blade_comic_prompts.v1` JSON 需要生图、或需要 Seedream 一次生成 9 张连续竖版漫画页
    rule: "进入 `.agents/skills/comic/3-漫画生成/SKILL.md`；先校验 2 号 JSON，再合成单次 master prompt 调用 `.agents/skills/api/image/seedream`，默认输出到 `projects/comic/[项目名]/3-漫画生成/`，并使用 `--max-images 9 --stream --size 2K`。"
  - id: comic-episode-poster-entry
    trigger: 命中剧集海报、漫画海报、episode poster、海报 JSON、短剧风漫画海报、或需要为当前集设计标题/主体/氛围/配色清晰的海报合同
    rule: "进入 `.agents/skills/comic/4-剧集海报/SKILL.md`；优先读取 `1-漫画小说改编` 与 `2-九刀流漫画提示词` 真源，必要时参考 `3-漫画生成` 图片，默认输出到 `projects/comic/[项目名]/4-剧集海报/第N集-剧集海报.json`。"
  - id: team-screenwriter-dazai-osamu-entry
    trigger: 命中太宰治视角、太宰会怎么写、Dazai perspective、人间失格式、斜阳式没落、道化、羞耻自白，或小说组/编剧组需要处理失败者叙事、第一人称旁白、家庭没落、女性旁观者、轻喜剧外壳下的绝望
    rule: "进入 `.agents/skills/team/小说组/太宰治/SKILL.md`；事实型问题先核对 `references/research/` 或联网来源，创作型问题必须输出面具、羞耻动作、自白罪证、家庭账目、女性旁观与边界提醒。"
  - id: team-screenwriter-watanabe-junichi-entry
    trigger: 命中渡边淳一视角、渡边淳一会怎么写、Watanabe Junichi perspective、失乐园式、钝感力、熟年恋爱、婚外恋题材、医学恋爱小说，或小说组/编剧组需要处理中年情欲、医疗题材、医生角色、身体真实、禁忌关系、情色边界与死亡结尾风险
    rule: "进入 `.agents/skills/team/小说组/渡边淳一/SKILL.md`；事实型问题先核对 `references/research/` 或联网来源，创作型问题必须输出身体事实、禁忌账单、熟年时间、医学/伦理边界、女性主体检查与死亡浪漫化风险提醒。"
  - id: team-actor-leslie-cheung-entry
    trigger: 命中张国荣、哥哥表演法、Leslie Cheung actor perspective，或演员组需要处理角色气质、镜头特写、亲密戏、性别表达、舞台/银幕魅力
    rule: "进入 `.agents/skills/team/演员组/张国荣/SKILL.md`；事实型问题先核对 `references/research/` 或联网来源，表演型问题必须输出角色核心、身体方案、镜头方案与安全边界。"
  - id: team-actor-anita-mui-entry
    trigger: 命中梅艳芳表演视角、梅姐会怎么演、Anita Mui performance、百变天后、香港女儿，或演员组需要处理强悍女性、舞台造型、告别式演出、喜剧骨气、悲剧克制与公众人物气场
    rule: "进入 `.agents/skills/team/演员组/梅艳芳/SKILL.md`；事实型问题先核对 `references/research/` 或联网来源，表演型问题必须输出一句判断、表演抓手、排练动作与不要做清单。"
  - id: team-actor-leung-ka-fai-entry
    trigger: 命中梁家辉表演视角、梁家辉会怎么演、Tony Leung Ka-fai actor perspective，或演员组需要处理跨类型角色、黑帮/警匪权力人物、喜剧变形、历史人物、父亲/丈夫角色
    rule: "进入 `.agents/skills/team/演员组/梁家辉/SKILL.md`；事实型问题先核对 `references/research/` 或联网来源，表演型问题必须输出生活底盘、类型重心、身体方案、对手/镜头关系与工种提醒。"
  - id: team-actor-maggie-cheung-entry
    trigger: 命中张曼玉表演视角、张曼玉会怎么演、Maggie Cheung performance、花样年华式留白，或演员组需要处理优雅克制、旗袍/造型、跨语言角色、女演员转型、影史女性气质
    rule: "进入 `.agents/skills/team/演员组/张曼玉/SKILL.md`；事实型问题先核对 `references/research/` 或联网来源，表演型问题必须输出一句判断、角色核心、身体方案、镜头方案、破口设计与不要做清单。"
  - id: team-actor-brigitte-lin-entry
    trigger: 命中林青霞表演视角、林青霞会怎么演、Brigitte Lin performance、东方不败气质、青霞式美感，或演员组需要处理冷艳、旧梦、雌雄同体、武侠女性、被凝视与反凝视、传奇退场
    rule: "进入 `.agents/skills/team/演员组/林青霞/SKILL.md`；事实型问题先核对 `references/research/` 或联网来源，表演型问题必须输出一句判断、角色核心、身体方案、造型/镜头方案、不要做清单与一句表演指令。"
