interface:
  display_name: "AIGC 摄影"
  short_description: "将逐集编导稿的画面性字段正文升级为融合画面描写与镜头语言的连续时间段。"
  default_prompt: "使用 $4-摄影，优先把 projects/aigc/<项目名>/3-运动/第N集.md 的画面性字段逐条升级为原字段标题下的 [0-2秒]、[2-3秒] 连续时间段；若用户明确跳过 3-运动，则回退读取 projects/aigc/<项目名>/2-编导/第N集.md。输出融合原画面事实、摄影、运镜、构图、光线和表演微动态；保留上游事实、对白、非画面字段、画面性字段标题和顺序，并利用连续时间段承接上下画面、摄影和运镜，不新增统一 分镜画面： 字段，输出到 projects/aigc/<项目名>/4-摄影/第N集.md。"
