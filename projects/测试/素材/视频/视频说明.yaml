        label: "黑龙与金色角色对撞"
        visual_content: "黑龙从右侧压迫，金色角色/能量与其正面对抗。"
        semantic_tags: ["黑龙", "对抗", "强敌", "能量碰撞"]
        shot_type: "wide_action"
        motion: "high"
        action_intensity: "high"
        text_overlay: "low"
        best_for: ["敌我冲突", "战力对撞", "高潮前半段"]
        avoid_for: ["工具解释"]
        splice_notes: "推荐切 3-6 秒，接 content-03 可形成龙战连续高潮。"
      - segment_id: "content-01-s04"
