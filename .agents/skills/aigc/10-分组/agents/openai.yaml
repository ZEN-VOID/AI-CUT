interface:
  display_name: "AIGC 分组"
  short_description: "将逐集光影稿切成带场景标题、全局风格、画面风格、首帧衔接/回龙帧和统计的完整分镜组。"
  default_prompt: "使用 $aigc-grouping，把 projects/aigc/<项目名>/9-光影/第N集.md 按真实集-场-组切成完整分镜组；只读消费 team.yaml.init_synthesis.stage_seed_summary.\"10-分组\"、init_handoff.grouping_seed 与 north_star.yaml.创作阶段不变量.分组，不调用 team 身份、旧 stage profile 或补造顾问问答。每组标题后重复当前场景标题，场景标题下方立即写“全局风格：”，字段内三行分别来自 3-美学/画面基调/全局风格协议.md：第 1 行固定前置词加 300 字以内当前组 Global Style Prompt 整理句，第 2 行引用或压缩 Visual Slogan / Design Principle，第 3 行引用或压缩 Visual Gene Profile / Negative Traits。随后写“画面风格：”，从组内镜头设计提炼构图方式、光源、色彩、摄影参数和观看位置，并放在第一个时间码分镜行上方；按完整分镜行和声画承托裁决约 15 秒分组，组内时间码从 0 连续递增，不新增剧情、不改对白、不输出连接件、分镜画面、画面构图、位置细节或旧字段；输出到 projects/aigc/<项目名>/10-分组/第N集.md。"
