version: 1
interface:
  display_name: "AIGC 分镜帧"
  short_description: "把单一分镜ID收束为知行合一节点驱动的单帧图像请求 JSON"
  default_prompt: "Use $aigc-storyboard-frame to read canonical `projects/aigc/<项目名>/3-Detail/第N集.json`, lock one `分镜ID` from `groups[].detail.分镜列表`, deterministically extract the existing shot-level fields into fixed English prefix + group design block + single shot line, and write one frame-level image request JSON under `projects/aigc/<项目名>/5-Image/分镜帧/第N集/第N集.json`."
