$schema: "https://json-schema.org/draft/2020-12/schema"
title: creative-skill-package-benchmark-suite
type: object
required:
  - suite_meta
  - target_profile
  - tasks
properties:
  suite_meta:
    type: object
    required:
      - suite_id
      - domain
      - version
    properties:
      suite_id:
        type: string
      domain:
        type: string
        const: creative-skill-package
      owner:
        type: string
      version:
        type: string
      canonical_report_template:
        type: string
      canonical_schema:
        type: string
  target_profile:
    type: object
    required:
      - target_name
      - target_paths
      - success_definition
    properties:
      target_name:
        type: string
      target_paths:
        type: array
        items:
          type: string
      runtime_kind:
        type: string
      success_definition:
        type: string
      comparison_baseline:
        type: string
  tasks:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - task_id
        - task_type
        - goal
        - input_profile
        - expected_properties
        - checks
        - pass_threshold
      properties:
        task_id:
          type: string
          pattern: "^[A-Za-z0-9._-]+$"
        task_type:
          type: string
          enum:
            - baseline
            - boundary
            - stress
            - adversarial
            - regression
        title:
          type: string
        goal:
          type: string
        input_profile:
          type: object
          required:
            - content_type
          properties:
            content_type:
              type: string
            constraints:
              type: array
              items:
                type: string
            context_package:
              type: array
              items:
                type: string
        expected_properties:
          type: array
          minItems: 1
          items:
            type: string
        checks:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - check_id
              - method
              - description
            properties:
              check_id:
                type: string
              method:
                type: string
                enum:
                  - manual
                  - script
                  - validator
              description:
                type: string
              weight:
                type: number
                minimum: 0
        pass_threshold:
          type: object
          required:
            - min_score
          properties:
            min_score:
              type: number
              minimum: 0
            required_checks:
              type: array
              items:
                type: string
        evidence_paths:
          type: array
          items:
            type: string
