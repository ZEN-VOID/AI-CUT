schema_version: "openai-agent-skill/v1"
skill:
  name: "aigc-image-storyboard-sheet"
  path: ".agents/skills/aigc/8-图像/B-分镜故事板"
interface:
  display_name: "AIGC 图像 / B-分镜故事板"
  short_description: "从6-分组原文批量生成组级多格故事板图像完整流程配置"
  default_prompt: "使用 $aigc-image-storyboard-sheet，从 projects/aigc/<项目名>/6-分组 提取分镜组原文，添加固定 storyboard 开头，绑定角色、场景、道具参照，并按分镜组批量调用 imagegen 生成。"
