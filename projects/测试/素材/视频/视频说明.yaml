videos:
  - id: "content-01"
    file: "content-01-ancient-male-dragon-battle.mp4"
    category: "aigc_content"
    role: "古装男主、黑龙与金色神力爆发的玄幻战斗素材。"
    media:
      duration_sec: 57.76
      fps: "25/1"
      resolution: "1280x720"
      codec: "h264"
      has_audio: true
    content_profile:
      visual_summary: "灰蓝冷色战场中，古装男主与黑龙/金色神力对抗，后段转入金色爆发和神像式人物特写。"
      setting: ["玄幻战场", "山门", "云雾天空", "金色神力空间"]
      main_subjects: ["古装男主", "黑龙", "金色神力", "神像式人物"]
      color_palette: ["灰蓝", "黑", "金色"]
      visual_density: "medium"
      motion_level: "high"
      action_intensity: "high"
      text_overlay_density: "low"
      continuity_group: "ancient-dragon-battle"
    selection_profile:
      best_for: ["玄幻爽点", "男主爆发", "力量觉醒", "龙战", "战斗高潮", "尾钩"]
      avoid_for: ["工具讲解", "软件界面说明", "现代都市段落", "轻松教程段"]
      keyword_triggers: ["大结局", "反转", "神力", "龙", "爆发", "战力", "碾压", "觉醒"]
      priority: 90
    splicing_profile:
      preferred_clip_sec: { min: 2.5, ideal: 4.5, max: 7.0 }
      suggested_cut_style: ["hard_cut_on_impact", "energy_flash_match_cut"]
      entry_affordance: "可从人物近景或能量爆点直接切入。"
      exit_affordance: "金色爆发和神像特写适合切出到结论或价格/承诺字幕。"
      speed_tolerance: "0.85x-1.25x"
      loopability: "low"
    subtitle_safe_zone:
      risk_level: "medium"
      existing_text_positions: ["lower_center occasionally"]
      recommended_f1_position: "bottom_center_with_margin_or_mid_low"
      notes: "局部底部已有小字幕，烧字幕前抽最长 cue 和高亮爆发帧。"
    segments:
      - segment_id: "content-01-s01"
        start: "00:00.000"
        end: "00:07.800"
        duration_sec: 7.8
        label: "男主近景开场"
        visual_content: "古装男主冷色近景，神情压迫，背景暗。"
        semantic_tags: ["男主登场", "强者", "铺垫", "冷启动"]
        shot_type: "close_up"
        motion: "low"
        action_intensity: "low"
        text_overlay: "minimal"
        best_for: ["身份介绍", "反转前铺垫", "低速口播开头"]
        avoid_for: ["高燃爆点"]
        splice_notes: "适合 2.5-4 秒切入，后接爆炸或龙战。"
      - segment_id: "content-01-s02"
        start: "00:07.800"
        end: "00:16.000"
        duration_sec: 8.2
        label: "山门爆炸与空间展开"
        visual_content: "山门/殿堂周围云雾和冲击波展开，场景规模变大。"
        semantic_tags: ["场面扩大", "冲突升级", "爆炸", "宗门"]
        shot_type: "wide"
        motion: "medium"
        action_intensity: "medium"
        text_overlay: "minimal"
        best_for: ["剧情进入主冲突", "世界观铺垫"]
        avoid_for: ["一句话强尾钩"]
        splice_notes: "可截 3-5 秒作为从人物到战斗的过渡。"
      - segment_id: "content-01-s03"
        start: "00:16.000"
        end: "00:24.000"
