interface:
  display_name: "AIGC 分组"
  short_description: "将逐集摄影稿切成带风格直引、补位画面和统计的完整分镜组。"
  default_prompt: "使用 $aigc-grouping，把 projects/aigc/<项目名>/3-摄影/第N集.md 按真实集-场-组切成完整分镜组，直引 0-初始化/north_star.yaml 的全局风格.全局风格提示词、类型元素.类型元素提示词、细分风格.画面风格，以隐藏标题字段的三行纯内容写入组头；每集首组省略入场画面段，第 2 组起添加入场画面和出场画面，输出到 projects/aigc/<项目名>/4-分组/第N集.md。"
