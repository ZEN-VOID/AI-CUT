version: 1
module_id: jinghua-camera-combination
module_level: leaf
purpose: 决定相邻镜头如何组合成交替、呼应、追随、揭示或递进关系，让默认运镜路线具备稳定观看流。
reference_paths:
  - 3-运镜手法/references/电影镜头调度-运镜判型.md
triggers:
  - 当前组包含对位、反应、追随或信息递进
  - 当前镜头关系需要通过运动语法建立连续观看主语
must_answer:
  - 哪些镜头要成对或成组出现
  - 默认路线更像 reveal chain、reaction chain、escort chain、power exchange、group split 还是 return-to-subject
  - 组合关系如何帮助观众理解动作、空间和情绪
  - 哪些运动语法可以吸收进组合关系，哪些会破坏既有构图与空间
  - 当前组合是否依赖越轴、错向、前景穿行或空间遮挡；若依赖，这种失衡是否真的有收益
  - 组合是否与构图、空间轴线和光色一致
  - 若比较更强变体，它是否仍服务同一表现目标
patch_contract:
  target_slot: shot_combination
  required_elements:
    - pairing_logic
    - continuity_link
    - escalation_pattern
  recommended_subelements:
    pairing_logic:
      - subject_handoff
      - combination_family
    continuity_link:
      - axis_guard
      - reveal_or_reaction_chain
    escalation_pattern:
      - same_goal_upgrade
      - return_to_subject_or_break
merge_policy:
  preserve_first:
    - reading-order stability
    - subject handoff clarity
    - continuity
    - escalation clarity
    - same-goal discipline
  trim_first:
    - formal pairing without narrative gain
    - axis-breaking combinations that confuse the viewer
quality_gates:
  - 镜头组合必须服务阅读顺序
  - 组合只能组织已有镜头关系，不得发明新镜头或重写主语
  - 必须先说清属于哪类连续关系，再允许升级为更复杂组合
  - 吸收运动语法时不得破坏既有构图、空间轴线与摄影基调
  - 越轴、错向、弧线或前景穿行只能在收益明确时使用
  - 不得为了炫技打乱信息优先级
