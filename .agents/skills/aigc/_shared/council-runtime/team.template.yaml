# team.yaml
#
# 角色：
# - 项目级智能顾问团真源
# - 由 `0-Init` 首次生成，供 `1-Planning / 2-Global / 3-Detail / 4-Design` 共同消费
# - 不替代各阶段 canonical，只提供顾问角色、成员与运行时调用规则

enabled: false

team_setup:
  team_mode: "disabled"  # `disabled` | `same_lineup` | `per_role`
  shared_agents: []

roles:
  planning:
    label: "策划"
    enabled: true
    members: []
    source_skill_refs:
      - ".agents/skills/aigc/1-Planning/SKILL.md"
      - ".agents/skills/aigc/4-Design/SKILL.md"
    operates_on:
      - "1-Planning"
      - "4-Design"
    intervention_mode: "pre_draft_advisory"
    focus:
      - "结构规划方向"
      - "角色/场景/道具池方向"
      - "对象与资产路线的前置裁剪"

  supervision:
    label: "监制"
    enabled: true
    members: []
    source_skill_refs:
      - ".agents/skills/aigc/2-Global/SKILL.md"
      - ".agents/skills/aigc/3-Detail/SKILL.md"
    operates_on:
      - "2-Global"
      - "3-Detail"
    intervention_mode: "pre_draft_advisory"
    focus:
      - "导演表达一致性"
      - "脚本可拍性与资源感"
      - "风格、节奏与执行成本对齐"

  review:
    label: "评审"
    enabled: true
    members: []
    source_skill_refs:
      - ".agents/skills/aigc/1-Planning/SKILL.md"
      - ".agents/skills/aigc/2-Global/SKILL.md"
      - ".agents/skills/aigc/3-Detail/SKILL.md"
      - ".agents/skills/aigc/4-Design/SKILL.md"
    intervention_mode: "pre_and_post_validation_gate"
    operates_on_final_stage_of:
      - stage: "1-Planning"
        gate_artifact: "projects/aigc/<项目名>/1-Planning/validation-report.md"
      - stage: "2-Global"
        gate_artifact: "projects/aigc/<项目名>/2-Global/validation-report.md"
      - stage: "3-Detail"
        gate_artifact: "projects/aigc/<项目名>/3-Detail/validation-report.md"
      - stage: "4-Design"
        gate_artifact: "projects/aigc/<项目名>/4-Design/validation-report.md"

runtime_policy:
  use_subagents_by_default: true
  ordinary_path_when_disabled_or_empty: true
  fallback_when_subagents_unavailable: "顺序读取 agent 文档并模拟顾问纪要"
  canonical_owner: "main_agent"
  review_timing: "before_and_after_stage_validation_report"

decision_policy:
  decision_owner: ""
  conflict_rule: "user_confirmed > review_gate > role_consensus > main_agent_inferred"
