interface:
  display_name: "AIGC 分镜"
  short_description: "从 5-导演或指定文稿生成逐集内联分镜稿，保留原文并注入镜头清单。"
  default_prompt: "使用 $aigc-storyboard-split，默认读取 projects/aigc/<项目名>/5-导演/第N集.md；如用户指定文稿则以指定文稿为 source。必须结合 projects/aigc/<项目名>/2-美学/画面基调/全局风格协议.md 与当前集优先的 2-美学/第N集/分镜风格/分镜风格协议.md，缺失时回退项目级分镜风格，先理解题材、情节、剧本正文、画面基调、大师/作品参照和分镜风格，再逐个画面点内联注入分镜列表。画面点包括 画面、动作画面、对白画面、音效画面、旁白画面、系统画面、心理反应、表演提示、氛围画面 等。每个画面点下方必须先写 节拍量化：beat=N（beat1: BT-xx 触发依据；beat2: BT-xx 触发依据），再写 分镜N（N-N秒）：景别，景深，构图形式，前景，中景，后景，主体站位。N-N秒 的 N 是 0.5 秒网格时间点，可为整数或 .5 小数，不要求整数秒；同一画面点内必须连续递增。beat=N 即有效画面节拍数，必须匹配 shot_count_decision 和实际分镜条数；BT 只作为各 beat 的触发依据。6-分镜负责静态画面结构，不把摄影机运动路径写成空间布局；7-摄影只能引用这些既有空间关系。每个画面点先解析 spatial_field_map；同一画面点多条分镜必须用 within_point_spatial_continuity_map 约束前景、中景、后景和主体站位连续变化。多人、对峙、追逐、进出门或转场承接时记录 screen left/right、主体朝向、入口/出口方向、视线轴线和上一镜交出点；前中后景、框架、遮挡或纵深应拆成可供 7-摄影 使用的空间条件。分镜数量由画面节拍法决定，时长按短剧 AIGC 时值规则和 0.5 秒颗粒量化，字段内和字段间保持连续性。不改剧情事实、对白、场景顺序或上游字段标题，不生成图像 prompt、视频请求或设备参数；分镜行必须以中文句号结尾。"
