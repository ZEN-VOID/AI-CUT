version: 1
module_id: watermoon-atmosphere-branch
module_level: branch
branch_key: atmosphere
purpose: 把场景的空气、层次、情绪温度和空间记忆感汇成单一 `atmosphere_patch`。
child_modules:
  - path: 3-氛围表现/层次/module-spec.yaml
  - path: 3-氛围表现/意境/module-spec.yaml
  - path: 3-氛围表现/空间诗学/module-spec.yaml
triggers:
  - 分镜组需要明确场感、情绪气候或环境压迫
must_answer:
  - 氛围主要由什么具体条件产生
  - 这种氛围如何承托人物和冲突
  - 哪个空间特征最值得被记住
patch_contract:
  target_slot: atmosphere_patch
  required_elements:
    - sensory_layer
    - mood_temperature
    - spatial_memory
merge_policy:
  combine_order:
    - 层次
    - 意境
    - 空间诗学
  preserve_first:
    - 可见/可触条件
    - 空间承载
  trim_first:
    - 空泛抒情句
quality_gates:
  - 意境不能脱离空间承载
  - 氛围不能压过信息清晰度
