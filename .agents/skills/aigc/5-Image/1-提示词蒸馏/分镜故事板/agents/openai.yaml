interface:
  display_name: "AIGC 5-Image 分镜故事板"
  short_description: "把分镜组蒸馏为多格 storyboard 图像请求 JSON"
  default_prompt: "Use $aigc-storyboard-sheet to read canonical `projects/aigc/<项目名>/3-Detail/第N集.json`, lock one storyboard group from `groups[]`, traverse `detail.分镜列表` in order, deterministically assemble fixed English prefix + group design block + shot lines, fill the shared image request template, and write the canonical `第N集.json` under `projects/aigc/<项目名>/5-Image/分镜故事板/`."
