version: 1
module_id: watermoon-character-action
module_level: leaf
branch_key: character
leaf_key: action_drama
purpose: 参照共享 `角色表现` 细则，把人物行为写成具备香港武侠动作电影黄金武指水准的角色化叙事动作链，让动作既体现这个人会怎么做，也真实改写局面。
triggers:
  - 上游文本存在明确动作或行动转换
  - 当前桥段的推进主要依赖人物行为而不是纯情绪停留
  - 当前桥段存在交手、逼近、拆解、脱身、夺取或压制等身体对抗
must_answer:
  - 这一步动作为何在这一拍爆发，它想达成什么
  - 这一拍的攻守转换、阻断或反制关系是什么
  - 角色借了什么人、物、势或环境去完成这一步动作
  - 这个角色会以怎样带有门路、身法、性格痕迹的方式完成这一步动作
  - 动作结果怎样改变局面、权力关系或人物距离
patch_contract:
  target_slot: character_patch
  append_fields:
    - action_intent
    - resistance_point
    - outcome_shift
    - characterized_action_style
merge_policy:
  keep:
    - 动词力度
    - 动作因果
    - 攻守拆解清晰度
    - 借势借物收益
    - 角色个性痕迹
  avoid:
    - 乱打式连续动词堆叠
    - 只有热闹没有反应的空连招
    - 空泛武侠形容词堆砌
    - 无目的动作堆叠
    - 镜头运动术语
quality_gates:
  - 行动必须推动叙事
  - 动作至少应能被还原成清楚的起手、应对、改局关系
  - 攻守转换必须可见，不得写成混乱乱打一团
  - 至少一拍要体现角色独有的门路、身法、狠劲、克制或机变
  - 动作描述不得沦为空转表演
  - 不得把动作戏写成任何人都能套用的通用动作模板
