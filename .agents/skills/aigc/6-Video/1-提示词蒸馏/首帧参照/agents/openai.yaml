interface:
  display_name: "AIGC 6-Video 首帧参照"
  short_description: "以知行合一思行网络锁定单一分镜ID，蒸馏帧级视频请求 JSON/TXT/manifest。"
  default_prompt: "Use $aigc-video-first-frame-reference to read `projects/aigc/<项目名>/3-Detail/第N集.json` only when `metadata.document_phase=ready`, and refuse to continue if the target shot's group still has `分镜切换 != len(分镜明细[])`. Lock one `分镜ID`, preserve `组间设计.全局风格` verbatim, distill `剧本正文` into the matching frame bridge through the local thinking-action network, and follow `.agents/skills/aigc/6-Video/_shared/image-to-video-prompt-principles.md` plus `prompt-assembly-spec.md` as the canonical sentence sources. Keep the style closer to image-to-video best practice: lock subject/clothing anchors, camera kickoff, visible action and spatial relation, then environment/light and visual enhancement, while still using only the current upstream fields. Keep the target shot anchored as `分镜 <ID> xx秒-xx秒` using the current group-local `时间段.开始秒 / 结束秒`, never write `分镜 <ID> 的 xx秒-xx秒`, and prioritize `时间段 / 运动表现 / 分镜构图 / 景别 / 运镜手法 / 镜头速度(if present) / 镜头视角` over lower-priority details when compressing. In single-shot mode, use the richer budget to increase current-shot detail density rather than emitting a thinned-down group-level prompt. Generate the frame-level JSON/TXT/manifest outputs without inventing reference images or upstream facts."
